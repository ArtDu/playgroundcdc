a.error : boolean = false\n      When 'snapshot.mode' is set as configuration_based, this setting permits to specify whenever the schema should be snapshotted or not in case of error.\n  snapshot.mode.configuration.based.snapshot.on.data.error : boolean = false\n      When 'snapshot.mode' is set as configuration_based, this setting permits to specify whenever the data should be snapshotted or not in case of error.\n  retriable.restart.connector.wait.ms : long = 10000\n      Time to wait before restarting connector after retriable exception occurs. Defaults to 10000ms.\n  query.fetch.size : int = 0\n      The maximum number of records that should be loaded into memory while streaming. A value of '0' uses the default JDBC fetch size.\n  errors.max.retries : int = -1\n      The maximum number of retries on connection errors before failing (-1 = no limit, 0 = disabled, > 0 = num of retries).\n  incremental.snapshot.watermarking.strategy : string = INSERT_INSERT\n      Specify the strategy used for watermarking during an incremental snapshot: 'insert_insert' both open and close signal is written into signal data collection (default); 'insert_delete' only open signal is written on signal data collection, the close will delete the relative open signal;\n  internal.log.position.check.enable : boolean = true\n      When enabled the connector checks if the position stored in the offset is still available in the log\n  internal.advanced.metrics.enable : boolean = false\n      When enabled the connector will emit advanced streaming metrics\n  connection.validation.timeout.ms : long = 60000\n      The maximum time in milliseconds to wait for connection validation to complete. Defaults to 60 seconds.\n  executor.shutdown.timeout.ms : long = 4000\n      The maximum time in milliseconds to wait for task executor to shut down.\n  openlineage.integration.enabled : boolean = false\n      Enable Debezium to emit data lineage metadata through OpenLineage API\n  openlineage.integration.config.file.path : string = ./openlineage.yml\n      Path to OpenLineage file configuration. See https://openlineage.io/docs/client/java/configuration\n  openlineage.integration.job.namespace : string\n      The job's namespace emitted by Debezium\n  openlineage.integration.job.description : string = Debezium change data capture job\n      The job's description emitted by Debezium\n  openlineage.integration.job.tags : list\n      The job's tags emitted by Debezium. A comma-separated list of key-value pairs.For example: k1=v1,k2=v2\n  openlineage.integration.job.owners : list\n      The job's owners emitted by Debezium. A comma-separated list of key-value pairs.For example: k1=v1,k2=v2\n  openlineage.integration.dataset.kafka.bootstrap.servers : string\n      The Kafka bootstrap server address used as input/output namespace/\n  extended.headers.enabled : boolean = true\n      Enable/Disable Debezium context headers that provides essential metadata for tracking and identifying the source of CDC events in downstream processing systems.\n  guardrail.collections.max : int = 0\n      The maximum number of collections or tables that can be captured by the connector. When this limit is exceeded, the action specified by 'guardrail.collections.limit.action' will be taken. Set to 0 to disable this guardrail.\n  guardrail.collections.limit.action : string = warn\n      Specify the action to take when a guardrail collections limit is exceeded: 'warn' (the default) logs a warning message and continues processing; 'fail' stops the connector with an error.\n  custom.sanitize.pattern : string = .*secret$|.*password$|.*sasl\\.jaas\\.config$|.*basic\\.auth\\.user\\.info|.*registry\\.auth\\.client-secret\n      Regular expression identifying configuration keys whose values should be masked. When set, this custom pattern replaces Debezium’s default password masking pattern.\n  replication.anonymous : boolean = true\n      Replication Anonymous flag\n  connect.adapter : string = tarantool\n      Type of target node\n  snapshot.mode : string = initial\n      The criteria for running a snapshot upon startup of the connector. Select one of the following snapshot options: 'initial' (default): If the connector does not detect any offsets for the logical server name, it runs a snapshot that captures the current full state of the configured spaces. After the snapshot completes, the connector begins to stream changes from the WAL. 'initial_only': The connector performs a snapshot as it does for the 'initial' option, but after the connector completes the snapshot, it stops, and does not stream changes from the transaction log.; \n  replication.start.lsn : int = 0\n      Start LSN\n  integer.handling.mode : string = int64\n      Determines how 'unsigned/integer' types will be processed by the connector. INT64 - types will be encoded as INT64. If the value range is outside range INT64 use DECIMAL. In this case the type will be encoded as 'org.apache.kafka.connect.data.Decimal'\n  datetime.zone.enabled : boolean = false\n      Determines whether to treat \"datetime/Time/Timestamp\" types as time with zone or convert it to UTC.\n- 'true' - encodes types into the following Kafka types:\n  - 'Datetime/datetime' - 'io.debezium.time.ZonedTimestamp',\n  - 'Time' - 'io.debezium.time.ZonedTime',\n  - 'Timestamp' - 'io.debezium.time.ZonedTimestamp'\n- 'false' - encodes types into the following Kafka types:\n  - 'Datetime/datetime' - 'io.debezium.time.MicroTimestamp',\n  - 'Time' - 'io.debezium.time.MicroTime',\n  - 'Timestamp' - 'io.debezium.time.MicroTimestamp'\n\n  spaces.output.format : string\n\n[Events]\n  converters : string\n      Optional list of custom converters that would be used instead of default ones. The converters are defined using '<converter.prefix>.type' config option and configured using options '<converter.prefix>.<option>'\n  post.processors : string\n      Optional list of post processors. The processors are defined using '<post.processor.prefix>.type' config option and configured using options '<post.processor.prefix.<option>'\n  tombstones.on.delete : boolean = true\n      Whether delete operations should be represented by a delete event and a subsequent tombstone event (true) or only by a delete event (false). Emitting the tombstone event (the default behavior) allows Kafka to completely delete all events pertaining to the given key once the source record got deleted.\n  heartbeat.interval.ms : int = 0\n      Length of an interval in milli-seconds in in which the connector periodically sends heartbeat messages to a heartbeat topic. Use 0 to disable heartbeat messages. Disabled by default.\n  heartbeat.topics.prefix : string = __debezium-heartbeat\n      The prefix that is used to name heartbeat topics.Defaults to __debezium-heartbeat.\n  signal.data.collection : list\n      The name of the data collection that is used to send signals/commands to Debezium. For multi-partition mode connectors, multiple signal data collections can be specified as a comma-separated list. Signaling is disabled when not set.\n  signal.poll.interval.ms : long = 5000\n      Interval for looking for new signals in registered channels, given in milliseconds. Defaults to 5 seconds.\n  signal.enabled.channels : list = [source]\n      List of channels names that are enabled. Source channel is enabled by default\n  topic.naming.strategy : class = class io.debezium.schema.SchemaTopicNamingStrategy\n      The name of the TopicNamingStrategy class that should be used to determine the topic name for data change, schema change, transaction, heartbeat event etc.\n  notification.enabled.channels : list\n      List of notification channels names that are enabled.\n  notification.sink.topic.name : string\n      The name of the topic for the notifications. This is required in case 'sink' is in the list of enabled channels\n  transaction.metadata.factory : class = class io.debezium.pipeline.txmetadata.DefaultTransactionMetadataFactory\n      Class to make transaction context & transaction struct/schemas\n  custom.metric.tags : list\n      The custom metric tags will accept key-value pairs to customize the MBean object name which should be appended the end of regular name, each key would represent a tag for the MBean object name, and the corresponding value would be the value of that tag the key is. For example: k1=v1,k2=v2\n  replication.idle.timeout : int = 2000\n      Define idle timeout for breaking connection in case of silence\n  spaces.include : list = []\n      A comma-separated list of regular expressions that match the space names for which changes are to be captured\n  spaces.exclude : list = []\n      A comma-separated list of regular expressions that match the space names for which changes are to be excluded\n  fields.include : list = []\n      Include fields\n  fields.exclude : list = []\n      Exclude fields", "--help-tqe-pg-docker-helm": "# ========== Runbook: helm deploy of preset tqe-pg-docker ==========\n# Deploys the CDC worker into k8s. DBs/queue are assumed to already run somewhere the\n# cluster can reach — this only brings up the worker pointed at them.\n#\n# --- 0. TQE cluster (separate `tqe` helm chart, appVersion 3.5.0) ---\n# SKIP THIS STEP if you already have a TQE cluster running in the namespace — just\n# point the worker's target below at your existing gRPC services. Only run it to\n# stand up a fresh cluster.\n# Download the chart bundle from the Tarantool customer zone and unpack it — it\n# extracts into a ./tqe dir with the tarantool + etcd sub-charts already vendored\n# under tqe/charts (no `git submodule` step needed):\n#   https://www.tarantool.io/en/accounts/customer_zone/packages/helm/helm-chart-tqe/helm-chart-tqe-3.5.0.tar.gz\n# curl -fSL -o helm-chart-tqe-3.5.0.tar.gz <url-above> && tar xf helm-chart-tqe-3.5.0.tar.gz\n# It brings up etcd + tarantool router/storage + gRPC api (producer/consumer/pubsub).\n#\n# The TQE image (message-queue-ee:v3.5.0) ships in the customer zone too\n#   https://www.tarantool.io/en/accounts/customer_zone/packages/message-queue-ee/release/linux/x86_64/v3.5.0/docker-message-queue-ee-v3.5.0.tar.gz\n# but it is already mirrored in our gitlab registry, so just repoint the images.\n#\n# tqe-values.yaml below is MINIMAL: it only overrides what the chart's default\n# values.yaml gets wrong for us. Everything already correct by default (all\n# replica/replicaset counts already 1, autoBootstrap on, credentials client/secret,\n# router/storage roles, tag v3.5.0) is left untouched. The overrides are:\n#   - image repositories: default repos (\"message-queue-ee\", \"tt\") carry no registry,\n#     so prefix them with our gitlab registry (api pods use image.repository verbatim;\n#     tarantool pods use tarantool.image.repository).\n#   - global.securityContext (runAsNonRoot/runAsUser/fsGroup: 1000): REQUIRED. The\n#     storage pod runs non-root; without fsGroup the kubelet leaves /data owned by\n#     root and tarantool dies on its first checkpoint with \"failed to create file\n#     '.../*.snap.inprogress': Permission denied\".\n#   - storageClass (storage + etcd): default is \"\" -> PVCs hang Pending.\n#   - the cdc/offsets queues (config.roles_cfg defaults to {}): the worker's queues\n#     are not created otherwise. Helm equivalent of the local stand's queue.yml.\n#   - pubsub.replicas 2->1 and etcd.replicaCount 3->1: single-node stand.\n#   - etcdDiscovery on so producer/consumer find the cluster topology from etcd.\n#   - metrics_export on so storage exposes prometheus /metrics (tnt_space_len),\n#     which the pg->tqe verify step below scrapes to confirm rows reached the queue.\nTQE_CHART=./tqe\ncat > tqe-values.yaml <<'EOF'\nglobal:\n  imagePullSecrets:\n    - name: registry-gitlab\n  securityContext:                             # inherited by every pod incl. storage\n    runAsNonRoot: true\n    runAsUser: 1000\n    fsGroup: 1000                              # kubelet chowns the PVC -> tarantool can write /data\n\nimage:                                         # api pods (producer/consumer/pubsub)\n  repository: registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/message-queue-ee\n\npubsub:\n  replicas: 1\n\netcdDiscovery:\n  enabled: true\n\ntarantool:\n  image:                                       # router/storage pods\n    repository: registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/message-queue-ee\n  metrics_export:\n    enabled: true                              # exposes prometheus /metrics on :8081 (tnt_space_len etc.)\n  autoBootstrap:\n    image:\n      repository: registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/tt\n  storage:\n    persistence:\n      storageClassName: <your-sc>              # `kubectl get storageclass`\n  config:\n    roles_cfg:\n      roles.tqe-storage:\n        queues:\n        - name: cdc                            # the data queue the worker reads/writes\n        - name: offsets                        # only used under the offset-tqe profile\n          deduplication_mode: keep_latest\n  etcd:\n    replicaCount: 1\n    image:\n      registry: \"gitlab.corp.mail.ru:443/tarantool/dependency_proxy/containers\"\n    persistence:\n      storageClass: <your-sc>\nEOF\nhelm --namespace transfer install tqe \"$TQE_CHART\" -f tqe-values.yaml\nkubectl -n transfer rollout status statefulset -l app.kubernetes.io/name=tarantool --timeout=180s\n# gRPC services created (release name 'tqe'), all on port 18182:\n#   tqe-tqe-api-producer     <- sink writes here (Producer)\n#   tqe-tqe-api-consumer-0   <- source reads here (Consumer)\n#   tqe-tqe-api-pubsub       <- pub/sub hybrid\n#\n# The chart ships in the CDC delivery bundle (helm-chart-cdc-*.tar.gz next to the image);\n# unpack it — it extracts into a ./cdc dir — and point CHART there. From a repo checkout\n# it is k8s/helm-chart-cdc. Values are inlined below.\n\nCHART=./cdc   # unpacked from the delivery bundle's helm-chart-cdc-*.tar.gz\n\ncat > cdc-values.yaml <<'EOF'\n# These addresses point at the source/sink stood up above (pg VMs by their cdc_net\n# IP, TQE by its in-cluster gRPC service). The root.* blocks feed the\n# application-<profile>.yml placeholders (pg.source.*, pg.sink.*, tqe.source.*,\n# tqe.sink.*), same as the --pg.source.host=... CLI overrides do locally.\nsources:\n  tarantool-queue:\n    common:\n      root:\n        tqe:\n          source:\n            target: tqe-tqe-api-consumer-0.transfer.svc:18182   # TQE Consumer gRPC (release 'tqe')\n            queue: cdc                        # queue the worker reads from\nsinks:\n  postgresql:\n    common:\n      # schema.evolution=basic lets the sink auto-create/alter target tables,\n      # same flag we pass locally as --sink.connector.schema.evolution=basic.\n      connector:\n        schema.evolution: basic\n      root:\n        pg:\n          sink:\n            url: jdbc:postgresql://postgresql-sinkdb-vm.cdc.local:5432/iot\n            user: iot\n            password: iot\n\nglobal:\n  imagePullSecrets:\n    - name: registry-gitlab\nimage:\n  # cdc-worker-all bundles every connector (pg + tqe); the pg-preset-only image does\n  # not carry the TQE connectors, so use the full image for tqe flows. The registry\n  # below is our internal gitlab mirror — repoint it at your own registry if you pull\n  # the image from elsewhere. The tag is an example: pick a published one from the\n  # registry / releases (1.0.0-SNAPSHOT is only a local build, not in the registry).\n  repository: registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/cdc-worker-all\n  tag: 1.0.0-SNAPSHOT\n  pullPolicy: IfNotPresent\n\nflow:\n  - source: tarantool-queue\n    sink: postgresql\n    resources:\n      requests: { cpu: 1500m, memory: 1Gi }\n      limits: { cpu: 2, memory: 3Gi }\n    env:\n      JAVA_OPTS: -XX:MaxDirectMemorySize=256M\n      PRESET: tqe-pg-docker-docker\nEOF\n\nhelm --namespace transfer install cdc \"$CHART\" -f cdc-values.yaml\n\n# --- Verify ---\nkubectl -n transfer rollout status deploy -l app.kubernetes.io/instance=cdc --timeout=120s\nkubectl -n transfer logs -l app.kubernetes.io/instance=cdc --tail=50 -f\n# The worker exposes actuator/prometheus on port 8000 in the pod; port-forward to check:\n#   kubectl -n transfer port-forward deploy/cdc 8000:8000 &\n#   curl -s localhost:8000/actuator/health\n# ========================================", "--help-tqe-pg-docker-helm --simple": "# The chart ships in the CDC delivery bundle (helm-chart-cdc-*.tar.gz next to the image);\n# unpack it — it extracts into a ./cdc dir — and point CHART there. From a repo checkout\n# it is k8s/helm-chart-cdc. Values are inlined below.\n\nCHART=./cdc   # unpacked from the delivery bundle's helm-chart-cdc-*.tar.gz\n\ncat > cdc-values.yaml <<'EOF'\n# These addresses point at the source/sink stood up above (pg VMs by their cdc_net\n# IP, TQE by its in-cluster gRPC service). The root.* blocks feed the\n# application-<profile>.yml placeholders (pg.source.*, pg.sink.*, tqe.source.*,\n# tqe.sink.*), same as the --pg.source.host=... CLI overrides do locally.\nsources:\n  tarantool-queue:\n    common:\n      root:\n        tqe:\n          source:\n            target: tqe-tqe-api-consumer-0.transfer.svc:18182   # TQE Consumer gRPC (release 'tqe')\n            queue: cdc                        # queue the worker reads from\nsinks:\n  postgresql:\n    common:\n      # schema.evolution=basic lets the sink auto-create/alter target tables,\n      # same flag we pass locally as --sink.connector.schema.evolution=basic.\n      connector:\n        schema.evolution: basic\n      root:\n        pg:\n          sink:\n            url: jdbc:postgresql://postgresql-sinkdb-vm.cdc.local:5432/iot\n            user: iot\n            password: iot\n\nglobal:\n  imagePullSecrets:\n    - name: registry-gitlab\nimage:\n  # cdc-worker-all bundles every connector (pg + tqe); the pg-preset-only image does\n  # not carry the TQE connectors, so use the full image for tqe flows. The registry\n  # below is our internal gitlab mirror — repoint it at your own registry if you pull\n  # the image from elsewhere. The tag is an example: pick a published one from the\n  # registry / releases (1.0.0-SNAPSHOT is only a local build, not in the registry).\n  repository: registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/cdc-worker-all\n  tag: 1.0.0-SNAPSHOT\n  pullPolicy: IfNotPresent\n\nflow:\n  - source: tarantool-queue\n    sink: postgresql\n    resources:\n      requests: { cpu: 1500m, memory: 1Gi }\n      limits: { cpu: 2, memory: 3Gi }\n    env:\n      JAVA_OPTS: -XX:MaxDirectMemorySize=256M\n      PRESET: tqe-pg-docker-docker\nEOF\n\nhelm --namespace transfer install cdc \"$CHART\" -f cdc-values.yaml", "--help-tqe-pg-docker": "# ========== Runbook: preset tqe-pg-docker ==========\n# Copy-paste to stand the stack up from scratch (bare docker/psql, no make).\n# The worker container tag below is an example — use your published tag.\n\n# --- 1. Docker network ---\ndocker network create stand-net 2>/dev/null || true\n\n# --- 2. Monitoring: Prometheus + Grafana (replaces `make monitoring-up`) ---\n# Prometheus config: scrape the worker's actuator endpoint. Two targets: 8000 for a\n# single worker, 8001 for a second one (the pg->tqe->pg pipeline runs two workers,\n# the tqe->pg side moved to 8001). A down target is simply skipped, so listing both\n# is harmless when you run only one worker.\nmkdir -p /tmp/cdc-mon/grafana-ds\ncat > /tmp/cdc-mon/prometheus.yml <<'EOF'\nglobal:\n  scrape_interval: 5s\n  evaluation_interval: 5s\nscrape_configs:\n  - job_name: \"cdc-worker\"\n    metrics_path: \"actuator/prometheus\"\n    static_configs:\n      - targets: [\"host.docker.internal:8000\", \"host.docker.internal:8001\"]\nEOF\n\n# Grafana datasource pointing at the Prometheus container.\ncat > /tmp/cdc-mon/grafana-ds/datasource.yml <<'EOF'\napiVersion: 1\ndatasources:\n  - name: Prometheus\n    type: prometheus\n    access: proxy\n    url: http://prometheus:9090\nEOF\n\ndocker run -d --rm --name prometheus \\\n    --network stand-net -p 9090:9090 \\\n    --add-host host.docker.internal:host-gateway \\\n    -v /tmp/cdc-mon/prometheus.yml:/etc/prometheus/prometheus.yml \\\n    prom/prometheus:v2.54.1\n\ndocker run -d --rm --name grafana \\\n    --network stand-net -p 3000:3000 \\\n    -e GF_AUTH_ANONYMOUS_ENABLED=true \\\n    -e GF_AUTH_ANONYMOUS_ORG_ROLE=Admin \\\n    -e GF_AUTH_BASIC_ENABLED=false \\\n    -v /tmp/cdc-mon/grafana-ds:/etc/grafana/provisioning/datasources \\\n    grafana/grafana:11.6.9\n# Grafana UI: http://localhost:3000  (Prometheus datasource is pre-wired).\n# Import dashboards from the repo: stands/local/monitoring/grafana/dashboard/*.json\n\n# --- 3. TQE cluster: api + storage master/replica (replaces the tqe compose) ---\nmkdir -p /tmp/cdc-tqe\ncat > /tmp/cdc-tqe/queue.yml <<'EOF'\ncredentials:\n  users:\n    user: { password: pass, roles: [ super ] }\n    replicator: { password: 'secret', roles: [ replication ] }\n    storage: { password: storage, roles: [ sharding ] }\nmemtx: { memory: 2147483648 }\niproto:\n  readahead: 41943040\n  advertise:\n    peer: { login: replicator }\n    sharding: { login: storage, password: storage }\nsharding: { bucket_count: 1000, rebalancer_mode: off }\nroles_cfg:\n  roles.metrics-export:\n    http:\n    - listen: 8081\n      endpoints:\n      - { format: prometheus, path: '/metrics' }\n  roles.tqe-storage:\n    queues:\n    - name: cdc\n      disabled_filters_by: [routing_key, sharding_key]\n      retention: { length: 50000, time: 0, policy: cleanup, options: { atomic_iteration: true } }\n    - name: cdc_public_User\n      disabled_filters_by: [routing_key, sharding_key]\n    - name: offsets\n      deduplication_mode: keep_latest\n      disabled_filters_by: [sharding_key]\n    - name: schema\n      deduplication_mode: keep_latest\n      disabled_filters_by: [sharding_key]\ngroups:\n  core:\n    replicasets:\n      storage:\n        replication: { failover: 'manual' }\n        sharding: { roles: [storage, router] }\n        roles: [ roles.metrics-export, roles.tqe-router, roles.tqe-storage ]\n        leader: tqe-storage-master\n        instances:\n          tqe-storage-master:\n            iproto: { listen: [ { uri: tqe-storage-master:3301 } ] }\n          tqe-storage-replica:\n            iproto: { listen: [ { uri: tqe-storage-replica:3301 } ] }\nEOF\n\ncat > /tmp/cdc-tqe/api.yml <<'EOF'\napp_name: MESSAGE_QUEUE_EE_API\ncore_host: 0.0.0.0\ncore_port: 18184\ngrpc_listen:\n- uri: 'tcp://0.0.0.0:18182'\ngrpc_options: { reflection_enabled: true }\nlog: { level: info }\nproducer:\n  enabled: true\n  local_routing: true\n  tarantool:\n    user: user\n    pass: pass\n    connections: { routers: [ tqe-storage-master:3301 ] }\nconsumer:\n  enabled: true\n  polling_timeout: 500ms\n  tarantool:\n    user: user\n    pass: pass\n    connections:\n      storages: [ tqe-storage-master:3301, tqe-storage-replica:3301 ]\nEOF\n\nTQE_IMG=registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/message-queue-ee:v3.5.0\ndocker run -d --rm --name tqe-storage-master --network stand-net \\\n    -e AUTO_BOOTSTRAP=true -e TARANTOOL_ADVERTISE_URI=tqe-storage-master \\\n    -e TARANTOOL_INSTANCE_NAME=tqe-storage-master -e TARANTOOL_WORKDIR=/var/lib/tarantool \\\n    -p 8481:8081 -v /tmp/cdc-tqe/queue.yml:/message-queue-ee/config.yml \\\n    \"$TQE_IMG\" tarantool --name tqe-storage-master --config config.yml\n\ndocker run -d --rm --name tqe-storage-replica --network stand-net \\\n    -e TARANTOOL_ADVERTISE_URI=tqe-storage-replica \\\n    -e TARANTOOL_INSTANCE_NAME=tqe-storage-replica -e TARANTOOL_WORKDIR=/var/lib/tarantool \\\n    -p 8482:8081 -v /tmp/cdc-tqe/queue.yml:/message-queue-ee/config.yml \\\n    \"$TQE_IMG\" tarantool --name tqe-storage-replica --config config.yml\n\ndocker run -d --rm --name tqe-api --network stand-net \\\n    -p 18184:18184 -p 18182:18182 \\\n    -v /tmp/cdc-tqe/api.yml:/message-queue-ee/config/grpc.config.yml \\\n    \"$TQE_IMG\" ./message-queue-ee -config=config/grpc.config.yml\n# Wait until the api gRPC port answers before starting the worker:\n#   until nc -z localhost 18182; do sleep 1; done\n\n# --- 4. Sink Postgres (JDBC target, port 5432) ---\ndocker run -d --rm --name target-postgres \\\n    --network stand-net -p 5432:5432 \\\n    -e POSTGRES_HOST_AUTH_METHOD=trust \\\n    postgres:16.4\n\n# --- 5. CDC Worker (TQE queue 'cdc' -> pg) ---\n# schema.evolution=basic lets the JDBC sink auto-create the target tables\n# from the incoming records (there is no pre-created schema on the sink).\n# --server.port=8001: in the pg->tqe->pg pipeline the pg->tqe worker already\n# holds actuator port 8000, so this second (tqe->pg) worker must use another\n# port. Drop the flag if you run this worker alone. Prometheus below scrapes\n# both 8000 and 8001.\n# The image tag below is an example (1.0.0-SNAPSHOT is a local build). To run a\n# released/dev build instead, swap it for a published tag from the registry, e.g.\n# cdc-worker-all:0.12.0 — see the registry / releases for available tags.\ndocker run --rm -p 8000:8000 --network stand-net \\\n    cdc-worker-all:1.0.0-SNAPSHOT \\\n    --preset=tqe-pg-docker \\\n    --sink.connector.schema.evolution=basic\n\n# --- 6. KNOWN LIMITATION: the queue must already contain debezium-format records ---\n# Unlike pg-tqe, this preset has NO Postgres feeding the queue: the worker only\n# READS from TQE queue 'cdc'. On a fresh cluster that queue is empty, so the sink\n# stays idle and no target tables appear. To see data flow end to end you need a\n# PRODUCER writing debezium-shaped records (carrying source.table so the sink SMT\n# can route them) into queue 'cdc'. Two realistic options:\n#   (a) Run the pg->tqe->pg pipeline: start a second worker with --preset=pg-tqe-local\n#       (or -docker) against a source Postgres, pointed at the SAME TQE queue 'cdc'.\n#       Its output becomes this worker's input. See --help-pg-tqe-local.\n#   (b) Push debezium-format messages into queue 'cdc' over gRPC yourself\n#       (routing_key = source table name), e.g. with a TQE producer client.\n\n# --- 7. Verify replication landed in the sink Postgres ---\n# Once records are in the queue (via option (a) or (b) above), the sink auto-creates\n# the target table(s) and upserts rows. List tables, then read one:\npsql -h localhost -p 5432 -U postgres -d postgres -c '\\dt'\npsql -h localhost -p 5432 -U postgres -d postgres \\\n    -c 'SELECT * FROM \"User\" ORDER BY id;'   # table name depends on the source\n\n# ========================================", "--help-tqe-pg-docker --simple": "# The image tag below is an example (1.0.0-SNAPSHOT is a local build). To run a\n# released/dev build instead, swap it for a published tag from the registry, e.g.\n# cdc-worker-all:0.12.0 — see the registry / releases for available tags.\ndocker run --rm -p 8000:8000 --network stand-net \\\n    cdc-worker-all:1.0.0-SNAPSHOT \\\n    --preset=tqe-pg-docker \\\n    --sink.connector.schema.evolution=basic", "--help-tqe-pg-local-helm": "# ========== Runbook: helm deploy of preset tqe-pg-local ==========\n# Deploys the CDC worker into k8s. DBs/queue are assumed to already run somewhere the\n# cluster can reach — this only brings up the worker pointed at them.\n#\n# --- 0. TQE cluster (separate `tqe` helm chart, appVersion 3.5.0) ---\n# SKIP THIS STEP if you already have a TQE cluster running in the namespace — just\n# point the worker's target below at your existing gRPC services. Only run it to\n# stand up a fresh cluster.\n# Download the chart bundle from the Tarantool customer zone and unpack it — it\n# extracts into a ./tqe dir with the tarantool + etcd sub-charts already vendored\n# under tqe/charts (no `git submodule` step needed):\n#   https://www.tarantool.io/en/accounts/customer_zone/packages/helm/helm-chart-tqe/helm-chart-tqe-3.5.0.tar.gz\n# curl -fSL -o helm-chart-tqe-3.5.0.tar.gz <url-above> && tar xf helm-chart-tqe-3.5.0.tar.gz\n# It brings up etcd + tarantool router/storage + gRPC api (producer/consumer/pubsub).\n#\n# The TQE image (message-queue-ee:v3.5.0) ships in the customer zone too\n#   https://www.tarantool.io/en/accounts/customer_zone/packages/message-queue-ee/release/linux/x86_64/v3.5.0/docker-message-queue-ee-v3.5.0.tar.gz\n# but it is already mirrored in our gitlab registry, so just repoint the images.\n#\n# tqe-values.yaml below is MINIMAL: it only overrides what the chart's default\n# values.yaml gets wrong for us. Everything already correct by default (all\n# replica/replicaset counts already 1, autoBootstrap on, credentials client/secret,\n# router/storage roles, tag v3.5.0) is left untouched. The overrides are:\n#   - image repositories: default repos (\"message-queue-ee\", \"tt\") carry no registry,\n#     so prefix them with our gitlab registry (api pods use image.repository verbatim;\n#     tarantool pods use tarantool.image.repository).\n#   - global.securityContext (runAsNonRoot/runAsUser/fsGroup: 1000): REQUIRED. The\n#     storage pod runs non-root; without fsGroup the kubelet leaves /data owned by\n#     root and tarantool dies on its first checkpoint with \"failed to create file\n#     '.../*.snap.inprogress': Permission denied\".\n#   - storageClass (storage + etcd): default is \"\" -> PVCs hang Pending.\n#   - the cdc/offsets queues (config.roles_cfg defaults to {}): the worker's queues\n#     are not created otherwise. Helm equivalent of the local stand's queue.yml.\n#   - pubsub.replicas 2->1 and etcd.replicaCount 3->1: single-node stand.\n#   - etcdDiscovery on so producer/consumer find the cluster topology from etcd.\n#   - metrics_export on so storage exposes prometheus /metrics (tnt_space_len),\n#     which the pg->tqe verify step below scrapes to confirm rows reached the queue.\nTQE_CHART=./tqe\ncat > tqe-values.yaml <<'EOF'\nglobal:\n  imagePullSecrets:\n    - name: registry-gitlab\n  securityContext:                             # inherited by every pod incl. storage\n    runAsNonRoot: true\n    runAsUser: 1000\n    fsGroup: 1000                              # kubelet chowns the PVC -> tarantool can write /data\n\nimage:                                         # api pods (producer/consumer/pubsub)\n  repository: registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/message-queue-ee\n\npubsub:\n  replicas: 1\n\netcdDiscovery:\n  enabled: true\n\ntarantool:\n  image:                                       # router/storage pods\n    repository: registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/message-queue-ee\n  metrics_export:\n    enabled: true                              # exposes prometheus /metrics on :8081 (tnt_space_len etc.)\n  autoBootstrap:\n    image:\n      repository: registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/tt\n  storage:\n    persistence:\n      storageClassName: <your-sc>              # `kubectl get storageclass`\n  config:\n    roles_cfg:\n      roles.tqe-storage:\n        queues:\n        - name: cdc                            # the data queue the worker reads/writes\n        - name: offsets                        # only used under the offset-tqe profile\n          deduplication_mode: keep_latest\n  etcd:\n    replicaCount: 1\n    image:\n      registry: \"gitlab.corp.mail.ru:443/tarantool/dependency_proxy/containers\"\n    persistence:\n      storageClass: <your-sc>\nEOF\nhelm --namespace transfer install tqe \"$TQE_CHART\" -f tqe-values.yaml\nkubectl -n transfer rollout status statefulset -l app.kubernetes.io/name=tarantool --timeout=180s\n# gRPC services created (release name 'tqe'), all on port 18182:\n#   tqe-tqe-api-producer     <- sink writes here (Producer)\n#   tqe-tqe-api-consumer-0   <- source reads here (Consumer)\n#   tqe-tqe-api-pubsub       <- pub/sub hybrid\n#\n# The chart ships in the CDC delivery bundle (helm-chart-cdc-*.tar.gz next to the image);\n# unpack it — it extracts into a ./cdc dir — and point CHART there. From a repo checkout\n# it is k8s/helm-chart-cdc. Values are inlined below.\n\nCHART=./cdc   # unpacked from the delivery bundle's helm-chart-cdc-*.tar.gz\n\ncat > cdc-values.yaml <<'EOF'\n# These addresses point at the source/sink stood up above (pg VMs by their cdc_net\n# IP, TQE by its in-cluster gRPC service). The root.* blocks feed the\n# application-<profile>.yml placeholders (pg.source.*, pg.sink.*, tqe.source.*,\n# tqe.sink.*), same as the --pg.source.host=... CLI overrides do locally.\nsources:\n  tarantool-queue:\n    common:\n      root:\n        tqe:\n          source:\n            target: tqe-tqe-api-consumer-0.transfer.svc:18182   # TQE Consumer gRPC (release 'tqe')\n            queue: cdc                        # queue the worker reads from\nsinks:\n  postgresql:\n    common:\n      # schema.evolution=basic lets the sink auto-create/alter target tables,\n      # same flag we pass locally as --sink.connector.schema.evolution=basic.\n      connector:\n        schema.evolution: basic\n      root:\n        pg:\n          sink:\n            url: jdbc:postgresql://postgresql-sinkdb-vm.cdc.local:5432/iot\n            user: iot\n            password: iot\n\nglobal:\n  imagePullSecrets:\n    - name: registry-gitlab\nimage:\n  # cdc-worker-all bundles every connector (pg + tqe); the pg-preset-only image does\n  # not carry the TQE connectors, so use the full image for tqe flows. The registry\n  # below is our internal gitlab mirror — repoint it at your own registry if you pull\n  # the image from elsewhere. The tag is an example: pick a published one from the\n  # registry / releases (1.0.0-SNAPSHOT is only a local build, not in the registry).\n  repository: registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/cdc-worker-all\n  tag: 1.0.0-SNAPSHOT\n  pullPolicy: IfNotPresent\n\nflow:\n  - source: tarantool-queue\n    sink: postgresql\n    resources:\n      requests: { cpu: 1500m, memory: 1Gi }\n      limits: { cpu: 2, memory: 3Gi }\n    env:\n      JAVA_OPTS: -XX:MaxDirectMemorySize=256M\n      PRESET: tqe-pg-local-docker\nEOF\n\nhelm --namespace transfer install cdc \"$CHART\" -f cdc-values.yaml\n\n# --- Verify ---\nkubectl -n transfer rollout status deploy -l app.kubernetes.io/instance=cdc --timeout=120s\nkubectl -n transfer logs -l app.kubernetes.io/instance=cdc --tail=50 -f\n# The worker exposes actuator/prometheus on port 8000 in the pod; port-forward to check:\n#   kubectl -n transfer port-forward deploy/cdc 8000:8000 &\n#   curl -s localhost:8000/actuator/health\n# ========================================", "--help-tqe-pg-local-helm --simple": "# The chart ships in the CDC delivery bundle (helm-chart-cdc-*.tar.gz next to the image);\n# unpack it — it extracts into a ./cdc dir — and point CHART there. From a repo checkout\n# it is k8s/helm-chart-cdc. Values are inlined below.\n\nCHART=./cdc   # unpacked from the delivery bundle's helm-chart-cdc-*.tar.gz\n\ncat > cdc-values.yaml <<'EOF'\n# These addresses point at the source/sink stood up above (pg VMs by their cdc_net\n# IP, TQE by its in-cluster gRPC service). The root.* blocks feed the\n# application-<profile>.yml placeholders (pg.source.*, pg.sink.*, tqe.source.*,\n# tqe.sink.*), same as the --pg.source.host=... CLI overrides do locally.\nsources:\n  tarantool-queue:\n    common:\n      root:\n        tqe:\n          source:\n            target: tqe-tqe-api-consumer-0.transfer.svc:18182   # TQE Consumer gRPC (release 'tqe')\n            queue: cdc                        # queue the worker reads from\nsinks:\n  postgresql:\n    common:\n      # schema.evolution=basic lets the sink auto-create/alter target tables,\n      # same flag we pass locally as --sink.connector.schema.evolution=basic.\n      connector:\n        schema.evolution: basic\n      root:\n        pg:\n          sink:\n            url: jdbc:postgresql://postgresql-sinkdb-vm.cdc.local:5432/iot\n            user: iot\n            password: iot\n\nglobal:\n  imagePullSecrets:\n    - name: registry-gitlab\nimage:\n  # cdc-worker-all bundles every connector (pg + tqe); the pg-preset-only image does\n  # not carry the TQE connectors, so use the full image for tqe flows. The registry\n  # below is our internal gitlab mirror — repoint it at your own registry if you pull\n  # the image from elsewhere. The tag is an example: pick a published one from the\n  # registry / releases (1.0.0-SNAPSHOT is only a local build, not in the registry).\n  repository: registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/cdc-worker-all\n  tag: 1.0.0-SNAPSHOT\n  pullPolicy: IfNotPresent\n\nflow:\n  - source: tarantool-queue\n    sink: postgresql\n    resources:\n      requests: { cpu: 1500m, memory: 1Gi }\n      limits: { cpu: 2, memory: 3Gi }\n    env:\n      JAVA_OPTS: -XX:MaxDirectMemorySize=256M\n      PRESET: tqe-pg-local-docker\nEOF\n\nhelm --namespace transfer install cdc \"$CHART\" -f cdc-values.yaml", "--help-tqe-pg-local": "# ========== Runbook: preset tqe-pg-local ==========\n# Copy-paste to stand the stack up from scratch (bare docker/psql, no make).\n# The worker container tag below is an example — use your published tag.\n\n# --- 1. Docker network ---\ndocker network create stand-net 2>/dev/null || true\n\n# --- 2. Monitoring: Prometheus + Grafana (replaces `make monitoring-up`) ---\n# Prometheus config: scrape the worker's actuator endpoint. Two targets: 8000 for a\n# single worker, 8001 for a second one (the pg->tqe->pg pipeline runs two workers,\n# the tqe->pg side moved to 8001). A down target is simply skipped, so listing both\n# is harmless when you run only one worker.\nmkdir -p /tmp/cdc-mon/grafana-ds\ncat > /tmp/cdc-mon/prometheus.yml <<'EOF'\nglobal:\n  scrape_interval: 5s\n  evaluation_interval: 5s\nscrape_configs:\n  - job_name: \"cdc-worker\"\n    metrics_path: \"actuator/prometheus\"\n    static_configs:\n      - targets: [\"host.docker.internal:8000\", \"host.docker.internal:8001\"]\nEOF\n\n# Grafana datasource pointing at the Prometheus container.\ncat > /tmp/cdc-mon/grafana-ds/datasource.yml <<'EOF'\napiVersion: 1\ndatasources:\n  - name: Prometheus\n    type: prometheus\n    access: proxy\n    url: http://prometheus:9090\nEOF\n\ndocker run -d --rm --name prometheus \\\n    --network stand-net -p 9090:9090 \\\n    --add-host host.docker.internal:host-gateway \\\n    -v /tmp/cdc-mon/prometheus.yml:/etc/prometheus/prometheus.yml \\\n    prom/prometheus:v2.54.1\n\ndocker run -d --rm --name grafana \\\n    --network stand-net -p 3000:3000 \\\n    -e GF_AUTH_ANONYMOUS_ENABLED=true \\\n    -e GF_AUTH_ANONYMOUS_ORG_ROLE=Admin \\\n    -e GF_AUTH_BASIC_ENABLED=false \\\n    -v /tmp/cdc-mon/grafana-ds:/etc/grafana/provisioning/datasources \\\n    grafana/grafana:11.6.9\n# Grafana UI: http://localhost:3000  (Prometheus datasource is pre-wired).\n# Import dashboards from the repo: stands/local/monitoring/grafana/dashboard/*.json\n\n# --- 3. TQE cluster: api + storage master/replica (replaces the tqe compose) ---\nmkdir -p /tmp/cdc-tqe\ncat > /tmp/cdc-tqe/queue.yml <<'EOF'\ncredentials:\n  users:\n    user: { password: pass, roles: [ super ] }\n    replicator: { password: 'secret', roles: [ replication ] }\n    storage: { password: storage, roles: [ sharding ] }\nmemtx: { memory: 2147483648 }\niproto:\n  readahead: 41943040\n  advertise:\n    peer: { login: replicator }\n    sharding: { login: storage, password: storage }\nsharding: { bucket_count: 1000, rebalancer_mode: off }\nroles_cfg:\n  roles.metrics-export:\n    http:\n    - listen: 8081\n      endpoints:\n      - { format: prometheus, path: '/metrics' }\n  roles.tqe-storage:\n    queues:\n    - name: cdc\n      disabled_filters_by: [routing_key, sharding_key]\n      retention: { length: 50000, time: 0, policy: cleanup, options: { atomic_iteration: true } }\n    - name: cdc_public_User\n      disabled_filters_by: [routing_key, sharding_key]\n    - name: offsets\n      deduplication_mode: keep_latest\n      disabled_filters_by: [sharding_key]\n    - name: schema\n      deduplication_mode: keep_latest\n      disabled_filters_by: [sharding_key]\ngroups:\n  core:\n    replicasets:\n      storage:\n        replication: { failover: 'manual' }\n        sharding: { roles: [storage, router] }\n        roles: [ roles.metrics-export, roles.tqe-router, roles.tqe-storage ]\n        leader: tqe-storage-master\n        instances:\n          tqe-storage-master:\n            iproto: { listen: [ { uri: tqe-storage-master:3301 } ] }\n          tqe-storage-replica:\n            iproto: { listen: [ { uri: tqe-storage-replica:3301 } ] }\nEOF\n\ncat > /tmp/cdc-tqe/api.yml <<'EOF'\napp_name: MESSAGE_QUEUE_EE_API\ncore_host: 0.0.0.0\ncore_port: 18184\ngrpc_listen:\n- uri: 'tcp://0.0.0.0:18182'\ngrpc_options: { reflection_enabled: true }\nlog: { level: info }\nproducer:\n  enabled: true\n  local_routing: true\n  tarantool:\n    user: user\n    pass: pass\n    connections: { routers: [ tqe-storage-master:3301 ] }\nconsumer:\n  enabled: true\n  polling_timeout: 500ms\n  tarantool:\n    user: user\n    pass: pass\n    connections:\n      storages: [ tqe-storage-master:3301, tqe-storage-replica:3301 ]\nEOF\n\nTQE_IMG=registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/message-queue-ee:v3.5.0\ndocker run -d --rm --name tqe-storage-master --network stand-net \\\n    -e AUTO_BOOTSTRAP=true -e TARANTOOL_ADVERTISE_URI=tqe-storage-master \\\n    -e TARANTOOL_INSTANCE_NAME=tqe-storage-master -e TARANTOOL_WORKDIR=/var/lib/tarantool \\\n    -p 8481:8081 -v /tmp/cdc-tqe/queue.yml:/message-queue-ee/config.yml \\\n    \"$TQE_IMG\" tarantool --name tqe-storage-master --config config.yml\n\ndocker run -d --rm --name tqe-storage-replica --network stand-net \\\n    -e TARANTOOL_ADVERTISE_URI=tqe-storage-replica \\\n    -e TARANTOOL_INSTANCE_NAME=tqe-storage-replica -e TARANTOOL_WORKDIR=/var/lib/tarantool \\\n    -p 8482:8081 -v /tmp/cdc-tqe/queue.yml:/message-queue-ee/config.yml \\\n    \"$TQE_IMG\" tarantool --name tqe-storage-replica --config config.yml\n\ndocker run -d --rm --name tqe-api --network stand-net \\\n    -p 18184:18184 -p 18182:18182 \\\n    -v /tmp/cdc-tqe/api.yml:/message-queue-ee/config/grpc.config.yml \\\n    \"$TQE_IMG\" ./message-queue-ee -config=config/grpc.config.yml\n# Wait until the api gRPC port answers before starting the worker:\n#   until nc -z localhost 18182; do sleep 1; done\n\n# --- 4. Sink Postgres (JDBC target, port 5432) ---\ndocker run -d --rm --name target-postgres \\\n    --network stand-net -p 5432:5432 \\\n    -e POSTGRES_HOST_AUTH_METHOD=trust \\\n    postgres:16.4\n\n# --- 5. CDC Worker (TQE queue 'cdc' -> pg) ---\n# schema.evolution=basic lets the JDBC sink auto-create the target tables\n# from the incoming records (there is no pre-created schema on the sink).\n# --server.port=8001: in the pg->tqe->pg pipeline the pg->tqe worker already\n# holds actuator port 8000, so this second (tqe->pg) worker must use another\n# port. Drop the flag if you run this worker alone. Prometheus below scrapes\n# both 8000 and 8001.\njava -jar cdc-worker.jar \\\n    --preset=tqe-pg-local \\\n    --sink.connector.schema.evolution=basic \\\n    --server.port=8001\n\n# --- 6. KNOWN LIMITATION: the queue must already contain debezium-format records ---\n# Unlike pg-tqe, this preset has NO Postgres feeding the queue: the worker only\n# READS from TQE queue 'cdc'. On a fresh cluster that queue is empty, so the sink\n# stays idle and no target tables appear. To see data flow end to end you need a\n# PRODUCER writing debezium-shaped records (carrying source.table so the sink SMT\n# can route them) into queue 'cdc'. Two realistic options:\n#   (a) Run the pg->tqe->pg pipeline: start a second worker with --preset=pg-tqe-local\n#       (or -docker) against a source Postgres, pointed at the SAME TQE queue 'cdc'.\n#       Its output becomes this worker's input. See --help-pg-tqe-local.\n#   (b) Push debezium-format messages into queue 'cdc' over gRPC yourself\n#       (routing_key = source table name), e.g. with a TQE producer client.\n\n# --- 7. Verify replication landed in the sink Postgres ---\n# Once records are in the queue (via option (a) or (b) above), the sink auto-creates\n# the target table(s) and upserts rows. List tables, then read one:\npsql -h localhost -p 5432 -U postgres -d postgres -c '\\dt'\npsql -h localhost -p 5432 -U postgres -d postgres \\\n    -c 'SELECT * FROM \"User\" ORDER BY id;'   # table name depends on the source\n\n# ========================================", "--help-tqe-pg-local --simple": "java -jar cdc-worker.jar \\\n    --preset=tqe-pg-local \\\n    --sink.connector.schema.evolution=basic \\\n    --server.port=8001", "--help-tqe-sink-params": "==============================================================================\nio.tarantool.connector.sink.TQESinkConnector  (sink, v1.0.0-SNAPSHOT)\n==============================================================================\n\n[Connector]\n  target : string\n      Url of TQE gRPC Publisher endpoint serving PublishBatch requests.\nShould be like <host>:<port>\n\n  queue : string = cdc\n      Name of queue in TQE.\n\n\n[Events]\n  batch.split.groups : int = 100\n      Tells how many chunks should be after splitting incoming events batch.\n\n  batch.split.groups.max.byte.size : long = 2097152\n      Max size of one split group in batch after serialization.\n\n  batch.publish.timeout.ms : long = 5000\n      Allowed timeout for PublishBatch requests on gRPC\nPublisher endpoint in milliseconds.\n\n  key.converter : string = org.apache.kafka.connect.json.JsonConverter\n      Classname of format Converter. This converter must implement KafkaConnect Converter\ninterface.\n\n  value.converter : string = org.apache.kafka.connect.json.JsonConverter\n      Classname of format Converter. This converter must implement KafkaConnect Converter\ninterface.\n\n  queue.from.record : boolean = false\n      Use topic of Connect record as queue name\n\n  use.kafka.partition.routing : boolean = false\n      If 'true', the TQE shard number to which the event will be sent will be calculated based on the\n`SinkRecord#kafkaPartition` parameter. If 'false', the shard number will be calculated based on the\npayload of event. Default value is `false`.\n\n  hash.seed : int = 9091\n      Hash seed for murmur3 hash function to route event between TQE shards\n  retry.delay.multiplier : double = 1.0\n      Multiplier for delay between retry attempts in milliseconds\n  retry.delay.initial : long = 500\n      Initial delay between retry attempts in milliseconds\n  retry.delay.max : long = 3000\n      Max delay between retry attempts in milliseconds\n  retry.attempts.max : int = 3\n      Max retry attempts after first try.\nIf '0', connector disables retries for gRPC requests\nand ConnectException will be thrown immediately without\nretry.\n\n  processing.streams : int = 8\n      To increase connector's throughput independent bidirectional\ngRPC-streams are used. Each batch of messages is routed to\na particualr stream. All streams are handled in parallel on TQE side.\nAll batches with the same split group id will be routed to the same\ngrpc stream.\n\n  max.inflight.messages : int = 8192\n      Amount of messages allowed to sent asynchronously without\nblocking to await acknowledges.\nIf count of sent message is higher then connector blocks\nto wait for responses (acks) for sent batches.\n\n\n[General]\n  put.timeout.ms : long = 5000\n      Allowed timeout for SinkTask.put() execution.\nIf time of call for SinkTask.put() method is more than timeout,\nconnector will throw exception.\n\n  processing.threads : int = 4\n      Each gRPC stream is being served by thread with event loop.\nOne event loop thread can serve one and more streams but\ntoo many streams for one thread in case of big workload can lead\nto lower I/O throughput, so, it is recommended to increase count\nof I/O threads.\n\n\n==============================================================================\nio.tarantool.connector.sink.TQESinkConnector  (sink, v1.0.0-SNAPSHOT)\n===== ing.streams : int = 8\n      To increase connector's throughput independent bidirectional\ngRPC-streams are used. Each batch of messages is routed to\na particualr stream. All streams are handled in parallel on TQE side.\nAll batches with the same split group id will be routed to the same\ngrpc stream.\n\n  max.inflight.messages : int = 8192\n      Amount of messages allowed to sent asynchronously without\nblocking to await acknowledges.\nIf count of sent message is higher then connector blocks\nto wait for responses (acks) for sent batches.\n\n\n[General]\n  put.timeout.ms : long = 5000\n      Allowed timeout for SinkTask.put() execution.\nIf time of call for SinkTask.put() method is more than timeout,\nconnector will throw exception.\n\n  processing.threads : int = 4\n      Each gRPC stream is being served by thread with event loop.\nOne event loop thread can serve one and more streams but\ntoo many streams for one thread in case of big workload can lead\nto lower I/O throughput, so, it is recommended to increase count\nof I/O threads.", "--help-tqe-source-params": "==============================================================================\nio.tarantool.connector.source.TQESourceConnector  (source, v1.0.0-SNAPSHOT)\n==============================================================================\n\n[Connector]\n  target : string\n      Url of TQE gRPC Publisher endpoint serving PublishBatch requests.\nShould be like <host>:<port>\n\n  queue : string = cdc\n      Name of queue in TQE.\n\n\n[Events]\n  key.converter : string = org.apache.kafka.connect.json.JsonConverter\n      Classname of format Converter. This converter must implement KafkaConnect Converter\ninterface.\n\n  value.converter : string = org.apache.kafka.connect.json.JsonConverter\n      Classname of format Converter. This converter must implement KafkaConnect Converter\ninterface.\n\n  max.queue.size : int = 8192\n      Maximum size of the queue for change events read from the database log but not yet recorded or forwarded. Defaults to 8192, and should always be larger than the maximum batch size.\n  max.batch.size : int = 2048\n      Maximum size of each batch of source records. Defaults to 2048.\n  poll.interval.ms : long = 500\n      Time to wait for new change events to appear after receiving no events, given in milliseconds. Defaults to 500 ms.\n  retry.delay.initial : long = 500\n      Initial delay between retry attempts in milliseconds\n  retry.delay.max : long = 3000\n      Max delay between retry attempts in milliseconds\n  retry.delay.multiplier : double = 1.0\n      Multiplier for delay between retry attempts in milliseconds\n  retry.attempts.max : int = 3\n      Max retry attempts after first try.\nIf '0', connector disables retries for gRPC requests\nand ConnectException will be thrown immediately without\nretry.\n\n\n==============================================================================\nio.tarantool.connector.source.TQESourceConnector  (source, v1.0.0-SNAPSHOT)\n==============================================================================\n\n[Connector]\n  target : string\n      Url of TQE gRPC Publisher endpoint serving PublishBatch requests.\nShould be like <host>:<port>\n\n  queue : string = cdc\n      Name of queue in TQE.\n\n\n[Events]\n  key.converter : string = org.apache.kafka.connect.json.JsonConverter\n      Classname of format Converter. This converter must implement KafkaConnect Converter\ninterface.\n\n  value.converter : string = org.apache.kafka.connect.json.JsonConverter\n      Classname of format Converter. This converter must implement KafkaConnect Converter\ninterface.\n\n  max.queue.size : int = 8192\n      Maximum size of the queue for change events read from the database log but not yet recorded or forwarded. Defaults to 8192, and should always be larger than the maximum batch size.\n  max.batch.size : int = 2048\n      Maximum size of each batch of source records. Defaults to 2048.\n  poll.interval.ms : long = 500\n      Time to wait for new change events to appear after receiving no events, given in milliseconds. Defaults to 500 ms.\n  retry.delay.initial : long = 500\n      Initial delay between retry attempts in milliseconds\n  retry.delay.max : long = 3000\n      Max delay between retry attempts in milliseconds\n  retry.delay.multiplier : double = 1.0\n      Multiplier for delay between retry attempts in milliseconds\n  retry.attempts.max : int = 3\n      Max retry attempts after first try.\nIf '0', connector disables retries for gRPC requests\nand ConnectException will be thrown immediately without\nretry.", "--help-transactions": "---\nid: \"0101\"\nstatus: Принят\n---\n\n# Транзакционная семантика доставки source → sink\n\n## Статус\n\n`Принят`\n\n## Контекст\n\nCDC Worker перекачивает изменения из источника (source) в приёмник (sink)\nнапрямую, без промежуточного брокера. Возникает вопрос, критичный для\nкорректности прикладных данных:\n\n- **Сохраняется ли граница транзакции** исходной БД при доставке в приёмник —\n  то есть применяются ли все изменения одной транзакции источника в приёмнике\n  атомарно (всё или ничего)?\n- **Как события одной транзакции попадают в sink** — единой пачкой или\n  «плоским» потоком отдельных записей?\n- **Возможны ли частичные применения** (half-applied transactions) — когда при\n  сбое часть изменений транзакции уже в приёмнике, а часть нет?\n\nОтвет определяет требования к схеме приёмника (нужна ли идемпотентность) и к\nдопущениям прикладной логики, читающей данные из sink.\n\nРазбор проведён по коду трёх звеньев конвейера: **source-коннектор → worker →\nsink-коннектор**, включая внешние коннекторы Debezium JDBC и ClickHouse.\n\n## Решение\n\nЗафиксировать фактическую (вытекающую из кода) семантику как контракт продукта:\n\n> **Границы транзакций между source и sink НЕ сохраняются.** Изменения\n> доставляются как упорядоченный плоский поток отдельных записей, нарезанный на\n> батчи по границе `poll()` (не по границе транзакции). Ни одно звено не\n> применяет транзакцию источника атомарно. Общая гарантия — **at-least-once**:\n> при сбое возможны повторная доставка (дубли) и частичное применение\n> (half-applied). **Корректность после сбоя обеспечивается идемпотентностью\n> схемы приёмника** (upsert по первичному ключу), а не транзакционностью\n> доставки.\n\nРазбор по звеньям.\n\n### Worker — transaction-agnostic (прозрачный конвейер)\n\nЕдиница работы — батч, возвращённый `poll()`, а не транзакция БД. Worker не\nсоздаёт, не хранит и не восстанавливает границу транзакции.\n\n- `CDCWorker.loop()` — однопоточный FIFO, одна виртуальная партиция\n  (`Constants.ZERO_PARTITION`). Порядок записей сохраняется, но атомарность\n  транзакции — нет.\n- Offset — монотонный виртуальный счётчик **на запись** (`Offsetter.submit`),\n  не на транзакцию.\n- Смещения источника продвигаются **строго после успешного `sink.put(batch)`**\n  (`commitTaskRecord` идёт после `put`). Провал `put` → offset не сдвинут →\n  после рестарта весь незакоммиченный батч переигрывается.\n- Retry — повтор **всего батча целиком** и только на `RetriableException`\n  (`RetryUtil.runWithRetry`). Прочее исключение или исчерпание попыток\n  (`ConnectException`) роняет worker.\n\n### Source — несёт ли запись границу транзакции\n\n| Source          | Граница tx в записи?        | Механизм                                                                                                                                                                                                                                                       |\n|-----------------|-----------------------------|----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|\n| **Tarantool**   | Да, пофакту в каждой записи | Поля envelope `source`: `tsn`, `start_lsn`, `is_commit` (+ `lsn`, `vclock`). Одна строка xlog = один `SourceRecord`; группировки транзакции в атомарную единицу нет — границу можно лишь реконструировать downstream по совпадающему `tsn` + флагу `is_commit` |\n| **Debezium PG** | Нет                         | `provide.transaction.metadata` не включён (дефолт `false`) → BEGIN/END-маркеры и блок `transaction` в envelope не эмитятся. Граница есть в WAL, но не переносится                                                                                              |\n| **TQE (v2/v3)** | Нет                         | Только `x-source-ts`/`x-connector-ts`/`x-queue-name` + passthrough `x-connect-header:*`. Своей tx-семантики не добавляет                                                                                                                                       |\n| **Kafka**       | Нет (passthrough)           | Пересылает записи как есть + ts-заголовки                                                                                                                                                                                                                      |\n\n### Sink — атомарен ли батч, возможны ли частичные применения\n\nНи один sink не оборачивает весь `put(records)` в единую транзакцию приёмника.\n\n| Sink                     | Батч `put()` атомарен? | Partial applies?   | Дубли при ретрае?                | Механизм / нюанс                                                                                                                                                                                   |\n|--------------------------|------------------------|--------------------|----------------------------------|----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|\n| **Tarantool**            | Нет                    | Да                 | Да                               | Пер-запись async (`insert/replace/update/delete`), нет `box.begin/commit`, futures ждутся `allOf().join()`                                                                                         |\n| **Elasticsearch**        | Нет                    | Да                 | Да                               | Пер-документ REST (не Bulk API), транзакций нет by design                                                                                                                                          |\n| **Kafka**                | Нет                    | Да                 | Да                               | Per-record `send`, идемпотентность и транзакции продюсера выключены                                                                                                                                |\n| **TQE v2/v3**            | Нет                    | Да                 | Да                               | Пачка бьётся на несколько независимых gRPC `ProduceRequest`; явно документировано at-least-once                                                                                                    |\n| **Ingestor**             | Нет                    | Да                 | Да                               | Несколько синхронных gRPC `store()` на один `put`                                                                                                                                                  |\n| **PG / JDBC** (Debezium) | Нет (целиком)          | Да (между флашами) | Идемпотентно по PK               | Реальные Hibernate/JDBC транзакции, но граница = один флаш под-батча одной таблицы (≤ `batch.size`, дефолт 500), не весь `put()`. Корректность держится на `insert.mode=upsert` + PK               |\n| **ClickHouse**           | Нет (целиком)          | Да                 | Да (дефолт) / нет (exactly-once) | 1 INSERT на (topic,partition)-группу; атомарность только в пределах блока/партиции CH. Дедуп через KeeperMap + `insert_deduplication_token` — только при `exactlyOnce=true` (по умолчанию **off**) |\n\n### Что осталось за бортом\n\n- Транзакционные приёмники (единый commit на батч) — не реализованы ни в одном\n  sink; JDBC ближе всех (per-flush транзакции), но не на уровне всего `put()`.\n- Сквозной перенос tx-метадаты (BEGIN/END) от source к sink — не делается;\n  worker её всё равно не интерпретирует.\n\n## Последствия\n\n**Положительные:**\n\n- Простой, быстрый, однопоточный конвейер без stateful-координации транзакций.\n- At-least-once + идемпотентная схема приёмника — надёжно и предсказуемо\n  восстанавливается после сбоя.\n\n**Отрицательные / что усложняется:**\n\n- **Схема приёмника обязана быть идемпотентна по первичному ключу** (upsert).\n  Иначе краш посреди батча оставит частично применённую «транзакцию» и/или\n  дубли при переигрывании.\n- Прикладная логика, читающая sink, **не может полагаться на атомарность\n  транзакции источника** — в приёмнике может быть виден промежуточный\n  (half-applied) снимок многострочной транзакции.\n- Для ClickHouse защита от дублей требует явного `exactlyOnce=true` (по\n  умолчанию — at-least-once с дублями).\n\n## Затрагиваемые модули/файлы\n\n- `cdc-worker/src/main/java/io/tarantool/cdc/CDCWorker.java` — `loop()`, порядок\n  put → commit → rewind.\n- `cdc-worker/src/main/java/io/tarantool/cdc/offsets/Offsetter.java` —\n  виртуальный offset на запись.\n- `cdc-worker/src/main/java/io/tarantool/cdc/sink/SinkTaskWrapper.java`,\n  `util/RetryUtil.java` — retry всего батча только на `RetriableException`.\n- Source-коннекторы: `tarantool-source-connector` (`ReplicaConsumer`,\n  `AbstractRecordTransformer`, `SchemaProvider`), `tarantool-mq-connector`,\n  `kafka-connector`; внешний Debezium PostgreSQL.\n- Sink-коннекторы: `tarantool-sink-connector`, `elasticsearch-sink-connector`,\n  `kafka-connector`, `tarantool-mq-connector`, `tarantool-ingestor-connector`;\n  внешние Debezium JDBC и ClickHouse.\n\n## Как поддерживается\n\n- Этот ADR — источник правды по гарантиям доставки; доступен из рабочего jar и\n  бандла командой `java -jar cdc-worker.jar --help-transactions` (печатает этот\n  файл; он копируется в classpath на сборке через `maven-resources-plugin` в\n  `cdc-worker/pom.xml`).\n- Требование идемпотентности схемы приёмника — предмет ревью конфигурации\n  связки: sink с не-upsert-семантикой при повторной доставке ломается.\n- Автоматической проверки (ArchUnit/линтер) на это правило нет — оно про\n  внешнее поведение коннекторов, а не про структуру кода.\n\n## Как исправлять нарушения\n\n- Наблюдаются дубли в приёмнике → убедиться, что целевая таблица имеет первичный\n  ключ и sink настроен на upsert (`insert.mode=upsert` для JDBC; `exactlyOnce`\n  или дедуп-ключ для ClickHouse).\n- Требуется атомарность транзакции источника в приёмнике → на текущей\n  архитектуре недостижима; нужен либо транзакционный sink (единый commit на\n  батч), либо перенос tx-границ source → worker → sink. Это отдельное\n  архитектурное решение — заводить новый ADR.\n\n## Ссылки\n\n- Связанные ADR: [`0100-secrets-from-k8s-secret.md`](0100-secrets-from-k8s-secret.md)\n- Механизм offset'ов CDC Worker — см. `CLAUDE.md`, раздел «Механизм работы\n  Offset-ов в CDC Worker».", "--help-transforms": "WARNING: A terminally deprecated method in sun.misc.Unsafe has been called\nWARNING: sun.misc.Unsafe::invokeCleaner has been called by nonapi.io.github.classgraph.utils.FileUtils (jar:nested:/Users/artyom.dubinin/tnt/tnt-cdc-second/cdc-worker/target/cdc-worker-1.0.0-SNAPSHOT.jar/!BOOT-INF/lib/classgraph-4.8.173.jar!/)\nWARNING: Please consider reporting this to the maintainers of class nonapi.io.github.classgraph.utils.FileUtils\nWARNING: sun.misc.Unsafe::invokeCleaner will be removed in a future release\nTransformations (SMT): 51\n  io.debezium.connector.jdbc.transforms.CollectionNameTransformation\n      params: collection.naming.prefix, collection.naming.suffix, collection.naming.style\n  io.debezium.connector.jdbc.transforms.FieldNameTransformation\n      params: column.n  bucket_count: 1000, rebalancer_mode: off }\nroles_cfg:\n  roles.metrics-export:\n    http:\n    - listen: 8081\n      endpoints:\n      - { format: prometheus, path: '/metrics' }\n  roles.tqe-storage:\n    queues:\n    - name: cdc\n      disabled_filters_by: [routing_key, sharding_key]\n      retention: { length: 50000, time: 0, policy: cleanup, options: { atomic_iteration: true } }\n    - name: cdc_public_User\n      disabled_filters_by: [routing_key, sharding_key]\n    - name: offsets\n      deduplication_mode: keep_latest\n      disabled_filters_by: [sharding_key]\n    - name: schema\n      deduplication_mode: keep_latest\n      disabled_filters_by: [sharding_key]\ngroups:\n  core:\n    replicasets:\n      storage:\n        replication: { failover: 'manual' }\n        sharding: { roles: [storage, router] }\n        roles: [ roles.metrics-export, roles.tqe-router, roles.tqe-storage ]\n        leader: tqe-storage-master\n        instances:\n          tqe-storage-master:\n            iproto: { listen: [ { uri: tqe-storage-master:3301 } ] }\n          tqe-storage-replica:\n            iproto: { listen: [ { uri: tqe-storage-replica:3301 } ] }\nEOF", "out": "\u001b[90m# записан файл /tmp/cdc-tqe/queue.yml\u001b[0m"}, {"note": "", "cmd": "cat > /tmp/cdc-tqe/api.yml <<'EOF'\napp_name: MESSAGE_QUEUE_EE_API\ncore_host: 0.0.0.0\ncore_port: 18184\ngrpc_listen:\n- uri: 'tcp://0.0.0.0:18182'\ngrpc_options: { reflection_enabled: true }\nlog: { level: info }\nproducer:\n  enabled: true\n  local_routing: true\n  tarantool:\n    user: user\n    pass: pass\n    connections: { routers: [ tqe-storage-master:3301 ] }\nconsumer:\n  enabled: true\n  polling_timeout: 500ms\n  tarantool:\n    user: user\n    pass: pass\n    connections:\n      storages: [ tqe-storage-master:3301, tqe-storage-replica:3301 ]\nEOF", "out": "\u001b[90m# записан файл /tmp/cdc-tqe/api.yml\u001b[0m"}, {"note": "", "cmd": "TQE_IMG=registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/message-queue-ee:v3.5.0", "out": "\u001b[90m# команда выполнена (симуляция)\u001b[0m"}, {"note": "", "cmd": "docker run -d --rm --name tqe-storage-master --network stand-net \\\n    -e AUTO_BOOTSTRAP=true -e TARANTOOL_ADVERTISE_URI=tqe-storage-master \\\n    -e TARANTOOL_INSTANCE_NAME=tqe-storage-master -e TARANTOOL_WORKDIR=/var/lib/tarantool \\\n    -p 8481:8081 -v /tmp/cdc-tqe/queue.yml:/message-queue-ee/config.yml \\\n    \"$TQE_IMG\" tarantool --name tqe-storage-master --config config.yml", "out": "Unable to find image locally\nlatest: Pulling from library ... done\na1b2c3d4e5f6789012345678901234567890abcdef1234567890abcdef123456\n\u001b[90m# запущен контейнер tqe-storage-master\u001b[0m"}, {"note": "", "cmd": "docker run -d --rm --name tqe-storage-replica --network stand-net \\\n    -e TARANTOOL_ADVERTISE_URI=tqe-storage-replica \\\n    -e TARANTOOL_INSTANCE_NAME=tqe-storage-replica -e TARANTOOL_WORKDIR=/var/lib/tarantool \\\n    -p 8482:8081 -v /tmp/cdc-tqe/queue.yml:/message-queue-ee/config.yml \\\n    \"$TQE_IMG\" tarantool --name tqe-storage-replica --config config.yml", "out": "Unable to find image locally\nlatest: Pulling from library ... done\na1b2c3d4e5f6789012345678901234567890abcdef1234567890abcdef123456\n\u001b[90m# запущен контейнер tqe-storage-replica\u001b[0m"}, {"note": "", "cmd": "docker run -d --rm --name tqe-api --network stand-net \\\n    -p 18184:18184 -p 18182:18182 \\\n    -v /tmp/cdc-tqe/api.yml:/message-queue-ee/config/grpc.config.yml \\\n    \"$TQE_IMG\" ./message-queue-ee -config=config/grpc.config.yml", "out": "Unable to find image locally\nlatest: Pulling from library ... done\na1b2c3d4e5f6789012345678901234567890abcdef1234567890abcdef123456\n\u001b[90m# запущен контейнер tqe-api\u001b[0m"}, {"note": "Wait until the api gRPC port answers before starting the worker:\nuntil nc -z localhost 18182; do sleep 1; done\n--- 4. Sink Postgres (JDBC target, port 5432) ---", "cmd": "docker run -d --rm --name target-postgres \\\n    --network stand-net -p 5432:5432 \\
