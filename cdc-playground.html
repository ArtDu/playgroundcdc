ать** часть\nданных источника и повторно применить их в sink. Причины: залили битую\nтрансформацию, потеряли/повредили target, добавили новый sink и нужно его\nнаполнить, поменяли SMT-логику и хотим прогнать историю заново.\n\nВопрос: **что именно и как мы можем переиграть**, и что при этом происходит с\nдублями и потерями.\n\nКлючевое наблюдение из кода: **отдельного механизма reprocessing в продукте\nнет.** Нет флага «сбросить offset», нет `--from-lsn`, нет управляющего API. Всё\nпереигрывание собирается из двух готовых кирпичей:\n\n1. **offset-снимок** (см. [`0104`](0104-offset-management.md)) — его правка/удаление\n   двигает стартовую позицию streaming;\n2. **рычаги стартовой позиции самого source-коннектора** (snapshot.mode, start\n   LSN/SCN, cursor, `auto.offset.reset`).\n\nПоэтому reprocessing удобно разложить на **две фазы жизненного цикла**\nконнектора — **snapshot** и **streaming**, — потому что переигрывать их можно\nразными средствами и с разными последствиями.\n\nСквозная защита от дублей одна на обе фазы (следствие at-least-once из\n[`0101`](0101-transaction-semantics.md) и [`0107`](0107-delivery-guarantees.md)):\n**идемпотентный sink (upsert по PK)**. Reprocessing всегда порождает дубли по\nопределению — сходимость обеспечивает только идемпотентность target, а не сам\nмеханизм переигрывания.\n\n## Решение\n\n### Фаза 1 — Snapshot: переиграть «полное состояние»\n\nSnapshot читает **текущее состояние** источника (весь спейс/таблицу), а не\nжурнал. «Переиграть snapshot» = снять слепок заново. Средства зависят от\nконнектора.\n\n| Коннектор | Как переиграть snapshot | Гранулярность | Последствие |\n|---|---|---|---|\n| **Debezium PG/Oracle** | (a) `snapshot.mode=always` — snapshot при **каждом** старте; (b) **incremental snapshot** сигналом `execute-snapshot` — на лету, без рестарта; (c) `snapshot.mode=initial` + удалить offset-снимок | (b) — по таблицам и по строкам (`additional-conditions`) | полный/выборочный перечит текущего состояния |\n| **tarantool-source (TDB/TDG2)** | `snapshot.mode=initial` + очистить offset-снимок (нет `always`); либо `initial_only` для разового слепка | весь спейс (нет чанков/фильтра) | перечит всего спейса |\n| **tarantool-mq / kafka** | ❌ snapshot нет — «полное состояние» отсутствует, только поток | — | переигрывается только как streaming (фаза 2) |\n\nРекомендации по фазе snapshot:\n\n- **Точечно и без простоя** → incremental snapshot (только Debezium): сигналом\n  `execute-snapshot` с `data-collections` и `additional-conditions` можно\n  переснять **конкретные таблицы и даже диапазон строк**, пока streaming идёт.\n  Watermark-окна гарантируют, что онлайн-изменения победят снапшот-строки.\n  Прогресс чанка резюмируется (см. [`0103`](0103-initial-load-and-streaming.md),\n  вариант B+) — падение в середине не начинает заново.\n- **Разово, весь источник** → `snapshot.mode=always` (Debezium) или очистка\n  offset-снимка + `initial` (все). Тяжело на больших таблицах, блокирует старт\n  streaming до конца снапшота (кроме incremental).\n- **`initial_only`** — снять слепок и остановиться (миграционный перенос без\n  немедленного догоняющего streaming).\n\n### Фаза 2 — Streaming: сдвинуть позицию по журналу\n\nStreaming читает **журнал изменений** (WAL/redo/xlog/очередь) с сохранённой\nпозиции. «Переиграть streaming» = поставить стартовую позицию **назад** (перечит\nистории) или **вперёд** (пропуск). Механизм — правка offset-снимка и/или стартовый\nрычаг коннектора.\n\n| Source | Позиция в offset | Как сдвинуть **назад** (reprocess) | Предел «назад» | Как сдвинуть **вперёд** (skip) |\n|---|---|---|---|---|\n| **Debezium PG** | LSN | offset-снимок + **confirmed LSN слота**: WAL можно перечитать только до confirmed LSN слота — глубже WAL уже удалён | **confirmed LSN слота** (не наш offset!) — за него только через snapshot | сдвинуть LSN в offset вперёд |\n| **Debezium Oracle** | SCN | правка SCN в offset-снимке; читать redo/archived с нужного SCN | глубина archived redo (ретеншен) | SCN вперёд |\n| **tarantool-source** | vclock/LSN | `replication.start.lsn` = нужный LSN (+ `replication.anonymous`), либо правка vclock в снимке | глубина xlog (`wal_retention`) | start.lsn вперёд |\n| **TQE (v2/v3)** | cursor | правка/сброс `cursor` в offset-снимке; при пустом cursor — с начала доступного в очереди | ретеншен очереди TQE | cursor вперёд |\n| **Kafka source** | topic offset | правка offset в снимке; при пустом — `auto.offset.reset=earliest` (жёстко earliest) читает топик с начала | ретеншен топика | offset вперёд / `latest` |\n\nКак физически править offset-снимок (для всех «правка снимка» выше) — по типу\nхранилища из [`0104`](0104-offset-management.md):\n\n- **file** — остановить worker, отредактировать/удалить `offsets.dat`, запустить.\n  Удаление = «нет offset» → source стартует по своему дефолту (snapshot `initial`\n  или `earliest`/начало очереди).\n- **tqe/tqe2** — снимок это compacted-ключ `connection.id` (keep_latest);\n  «сбросить» = запись нового снимка или смена `connection.id` (тогда worker не\n  найдёт старый и стартует с дефолта). Прямого «удалить ключ» из очереди нет.\n- **kafka** — снимок в compacted-топике; правится записью нового значения по\n  ключу партиции.\n\n### Сводно: два рычага × две фазы\n\n```\n                 SNAPSHOT-фаза                    STREAMING-фаза\n              (текущее состояние)                 (журнал изменений)\n   ┌──────────────────────────────────┬──────────────────────────────────┐\n   │ Debezium: snapshot.mode=always /  │ правка offset-снимка (LSN/SCN/    │\n   │ execute-snapshot (incremental,    │ cursor/offset) + стартовый рычаг  │\n   │ по таблицам/строкам, resumable)   │ source (start.lsn / auto.offset.  │\n   │ tnt-source: initial + сброс снимка│ reset / anonymous)                │\n   │ tqe/kafka: нет snapshot           │ предел «назад» = ретеншен журнала │\n   │                                   │ (PG — confirmed LSN слота!)       │\n   └──────────────────────────────────┴──────────────────────────────────┘\n                    общая защита от дублей: idempotent sink (upsert по PK)\n```\n\n### Что можно было бы добавить (не реализовано)\n\nРаздел-заготовка — если появится спрос на «reprocessing из коробки»:\n\n- `--reset-offsets` — удалить/сбросить offset-снимок перед стартом (аккуратно для\n  всех backing store, включая tqe/kafka, где «удалить» нетривиально).\n- `--from-lsn` / `--from-scn` / `--from-cursor` — унифицированный стартовый рычаг\n  поверх коннектор-специфичных (сейчас у каждого свой ключ).\n\nПока **не заводим** — YAGNI: текущих ручных средств хватает, а унификация\nстартовых позиций разнородных источников — отдельная задача с риском.\n\n## Последствия\n\n- Reprocessing выполним **сегодня**, но это **ручная операторская процедура**\n  (правка снимка + конфиг коннектора), а не кнопка. Это надо честно\n  задокументировать в admin-доке.\n- **Дубли при reprocessing неизбежны** — обязателен идемпотентный sink. Для\n  ClickHouse — `exactlyOnce=true`, иначе повторы осядут (см. [`0107`](0107-delivery-guarantees.md)).\n- **Предел «назад» для PG — не наш offset, а confirmed LSN слота.** Оператор,\n  ожидающий «перечитать всё с нуля» простым сбросом offset, упрётся в удалённый\n  WAL — глубже только snapshot. Это частая ловушка, вынесена явно.\n- Для очередей (TQE/Kafka) предел «назад» — ретеншен очереди/топика; исторические\n  данные за ним недостижимы через streaming.\n\n## Затрагиваемые модули/файлы\n\n- Стартовая позиция source: `connectors/tarantool-source-connector/.../config/TarantoolConnectorConfig.java`\n  (`replication.start.lsn`, `replication.anonymous`, `snapshot.mode`);\n  `connectors/kafka-connector/.../source/KafkaSourceConnectorConfig.java`\n  (`auto.offset.reset=earliest`);\n  `connectors/tarantool-mq-connector/.../source/TQESourceTask.java` (`cursor`).\n- Snapshot/incremental: Debezium `PostgresConnectorConfig`/`OracleConnectorConfig`\n  (`snapshot.mode`), signals (`execute-snapshot`) — см. [`0103`](0103-initial-load-and-streaming.md).\n- offset-снимок и его хранилища — [`0104`](0104-offset-management.md),\n  `tarantool-cdc-storage/.../OffsetBackingStoreFactory.java`.\n- PG confirmed-LSN слота: Debezium `PostgresConnectorConfig` (slot offset\n  validation, `no_validation`/`trust_slot`/…).\n\n## Как поддерживается\n\nДокумент описательный; печатается флагом `--help-reprocessing`. Автоматической\nпроверки нет — reprocessing это операторская процедура. При появлении встроенного\nмеханизма (`--reset-offsets` и т.п.) — обновить раздел «Что можно было бы\nдобавить» и завести тест на сброс снимка для каждого backing store.\n\n## Как исправлять нарушения\n\n- **Переиграл streaming, но данных за нужный период нет** → упёрлись в предел\n  «назад»: PG — confirmed LSN слота, Oracle — archived redo retention, tnt —\n  `wal_retention`, очереди — retention. Глубже — только snapshot-фаза.\n- **После reprocessing в target дубли/мусор** → sink не идемпотентен: включить\n  upsert по PK / `exactlyOnce` (ClickHouse).\n- **Сбросил offset-файл, а snapshot не пошёл** → у source `snapshot.mode` не\n  `initial`/`always`, либо это tqe/kafka (snapshot нет) — переигрывается только\n  как streaming.\n\n## Ссылки\n\n- Связанные ADR: [`0104-offset-management.md`](0104-offset-management.md)\n  (offset-снимок и хранилища), [`0103-initial-load-and-streaming.md`](0103-initial-load-and-streaming.md)\n  (snapshot-фаза, incremental/B+), [`0101-transaction-semantics.md`](0101-transaction-semantics.md)\n  и [`0107-delivery-guarantees.md`](0107-delivery-guarantees.md) (at-least-once,\n  почему нужна идемпотентность).\n- Механизм offset-ов — `CLAUDE.md`, раздел «Механизм работы Offset-ов».", "--help-rpo-rto": "---\nid: \"0109\"\nstatus: Черновик\n---\n\n# RPO / RTO: от чего зависят и как ими управлять\n\n## Статус\n\n`Черновик`\n\n## Контекст\n\nПри внедрении CDC-связки в прод всегда всплывают два эксплуатационных вопроса:\n\n> - **RPO** (Recovery Point Objective) — сколько данных максимум «отъедет назад»\n>   при сбое, т.е. какой объём придётся **переиграть** после рестарта?\n> - **RTO** (Recovery Time Objective) — за какое время worker после падения\n>   снова догонит источник и выйдет на актуальные данные?\n\nЭти вопросы смежны с гарантиями доставки ([`0107`](0107-delivery-guarantees.md))\nи управлением offset-ами ([`0104`](0104-offset-management.md)), но **отдельны**:\n0107 отвечает «теряем ли мы данные» (нет — at-least-once без потерь), а этот\nдокумент — «**на сколько назад** нас откинет и **как долго** мы догоняем».\n\nВажная развязка от 0107: поскольку гарантия — at-least-once с идемпотентным sink,\n**RPO здесь измеряется в объёме переигрывания (дубли), а не в потерянных\nзаписях**. «Потеря» появляется только в одном месте — когда позиция отстала\nдальше **ретеншена журнала источника** (WAL/redo/xlog/очередь): тогда данные за\nгоризонтом ретеншена физически недостижимы через streaming (см. предел «назад» в\n[`0108`](0108-reprocessing.md)).\n\nРазбор проведён по коду `cdc-worker` (Offsetter, CDCWorker.loop, shutdown),\nконнекторов и helm-samples. Дефолты приведены фактические.\n\n## Решение\n\n### Модель: RPO ≈ «непродвинутый хвост», RTO ≈ «детект + рестарт + догон»\n\n```\n      сбой                                              снова онлайн\n        │                                                     │\n        ▼                                                     ▼\n  ┌───────────┐   ┌──────────┐   ┌──────┐   ┌──────────────┐\n  │  детект   │──▶│ рестарт  │──▶│ seek │──▶│ догоняющее   │──▶ актуален\n  │ (пробы)   │   │  пода    │   │offset│   │ чтение (лаг)  │\n  └───────────┘   └──────────┘   └──────┘   └──────────────┘\n        └────────────────────  RTO  ──────────────────────────┘\n\n  RPO = данные с последнего flush offset  ──►  переигрываются (дубли)\n        (при ЧИСТОМ shutdown = 0, есть финальный flush)\n```\n\n### 1. Что определяет RPO (объём переигрывания)\n\nRPO = сколько записей окажется **непродвинутым** на момент сбоя. Складывается из:\n\n| Фактор | Параметр (дефолт) | Где | Влияние на RPO |\n|---|---|---|---|\n| Интервал flush offset | `offset.flush.interval.ms` = **5000** (5 c) | `application.yaml:106`; `Offsetter.flushOffsets()` под `@Scheduled` | Верхняя граница «непродвинутого хвоста»: до 5 c данных переиграется при аварийном краше |\n| Тайм-аут flush | `offset.flush.timeout.ms` = **2500** | `application.yaml:107` | Долгий/зависший flush → снимок не обновился в срок → хвост длиннее |\n| Размер source-батча | `max.batch.size` (Debezium дефолт **2048**, в проде задан явно), `max.queue.size` (**8192**/20000) | `TarantoolConnectorConfig`, `k8s/samples/cdc-common.yaml:61` | Непродвинутый батч переигрывается целиком (put-then-commit, 0107) |\n| **Чистый** shutdown | финальный flush в `Offsetter.destroy()` | `Offsetter.java:136` (`\"final commit offsets\"`) | **RPO → 0** при graceful stop: перед выходом offset вылит полностью |\n\n**Ключевой вывод по RPO:** аварийный краш (kill -9, OOM, потеря узла) → RPO ≤\n`flush.interval.ms` (+ размер незакоммиченного батча). **Плановый рестарт**\n(SIGTERM в пределах `shutdown.timeout.ms`) → RPO ≈ **0**, потому что\n`Offsetter.destroy()` делает финальный flush. Уменьшить RPO при краше =\nуменьшить `offset.flush.interval.ms` (ценой более частых записей в offset\nstorage).\n\n### 2. Что определяет RTO (время возврата в онлайн)\n\nRTO = детект падения + рестарт процесса/пода + seek + догоняющее чтение до нуля\nлага. Разложение:\n\n| Стадия RTO | Параметр (дефолт) | Где | Комментарий |\n|---|---|---|---|\n| **Детект** | k8s `livenessProbe`: `timeoutSeconds:15`, `failureThreshold:15` | `k8s/samples/cdc-common.yaml:22` | До ~N·таймаут секунд, прежде чем k8s перезапустит под |\n| **Рестарт пода** | `strategy: Recreate`, `replicas: 1` | helm (0104) | `Recreate` = старый под должен отпустить PVC (для `file`) до старта нового — добавляет задержку; для tqe/kafka тома нет |\n| **Старт worker** | `source.startup.timeout` = **15s**, `sink.startup.timeout` = **15s** | `WorkerParams.java:70,92` | Подключение к source/sink |\n| **Seek offset** | чтение снимка из storage + `seek()` | `OffsetsResolver.seek()` (`connectors/kafka-connector/.../OffsetsResolver.java`) | Быстро; для `tqe` v3 старт синхронно ждёт загрузку снимка |\n| **Догоняющее чтение** | зависит от накопленного лага, скорости sink, throttler | ниже | **Обычно доминирует в RTO** |\n\n**Догоняющее чтение — главный вклад в RTO.** Его скорость определяют:\n\n- **Объём накопленного лага** = как долго worker лежал × поток изменений\n  источника. Чем дольше простой, тем больше догонять.\n- **Throttler**: `throttle.throttler.max.rps` = **-1** (по умолчанию БЕЗ\n  ограничения, `WorkerParams.java:157`). Если выставлен `> 0` — worker\n  **искусственно замедлен**, catch-up растягивается, эффективный RTO растёт.\n  Держать `-1` для быстрого догона; лимит ставить только ради защиты sink.\n- **Доступность и скорость sink**: `sink.retry.count` = **5**,\n  `sink.retry.backoff` = **200ms**, `sink.retry.timeout` = **5s**\n  (`WorkerParams.java:107`). Недоступный sink → повторы с backoff → лаг не\n  сокращается, RTO не наступает, пока sink не поднимется. **RTO снизу\n  ограничен доступностью sink** — если sink лежит, никакой catch-up невозможен.\n\n### 3. Предел «догоняющего чтения» = ретеншен журнала источника\n\nRTO конечен, только если данные за время простоя ещё **есть** в журнале\nисточника. За горизонтом ретеншена streaming уже не догонит — остаётся только\nsnapshot-фаза (см. [`0108`](0108-reprocessing.md)). Это же — граница, за которой\nat-least-once превращается в реальную потерю.\n\n| Source | Позиция | «Floor» догона (ретеншен) | Что при выходе за floor |\n|---|---|---|---|\n| **Debezium PG** | LSN | **confirmed_flush_lsn слота** (WAL держится слотом, пока worker не подтвердит) | Пока worker лежит, WAL **копится** (слот не двигается) → диск PG под угрозой; данные не теряются, но растёт WAL |\n| **Debezium Oracle/OLR** | SCN | archived redo retention | За горизонтом redo — только snapshot |\n| **tarantool-source** | vclock/LSN | `wal_retention` источника | xlog за горизонтом недостижим |\n| **TQE (mq)** | cursor | `retention.length` очереди (напр. `50000`, `k8s/samples/tqe.yaml:20`) | Cursor отстал дальше length → **потеря** сообщений |\n| **Kafka source** | topic offset | topic retention брокера | За retention — `auto.offset.reset=earliest` прыгнет на начало доступного (пропуск дыры) |\n\n**Асимметрия PG vs очереди.** Для PG простой worker **не** ведёт к потере\n(слот держит WAL) — но раздувает WAL на источнике, что опасно для диска PG.\nДля очередей (TQE/Kafka) наоборот: журнал чистится по своему retention\n**независимо** от worker, поэтому долгий простой = реальная потеря за горизонтом\nretention. Это определяет допустимое окно простоя: для PG его ограничивает диск\nпод WAL, для очередей — `retention.length`/topic retention.\n\n### 4. Наблюдаемость: чем мерить RPO/RTO в рантайме\n\n| Метрика | Что показывает | Где |\n|---|---|---|\n| `cdc_offsets_uncommitable`, «commitable but not committed» | Прямой индикатор невылитого хвоста = текущий RPO-риск | `Offsetter.java:99` (gauges) |\n| `cdc_trip_time` (p50/p95/p99), `cdc_connector_trip_time`, `cdc_connector_hold_time` | Сквозной лаг source→sink по заголовкам `x-*-ts` (SMT `lag-track`) | `CDCLagReporter.java`; SMT в цепочке `application.yaml:77` |\n| `cdc_worker_throttling_time` | Сколько loop простоял в throttler (замедление catch-up) | `CDCWorker.java:95` |\n| actuator `health` (liveness/readiness) | Детект падения для k8s | `application.yaml:29` |\n\n`cdc_trip_time` — это фактический **лаг**, т.е. индикатор незавершённого RTO\n(растёт при простое, падает по мере догона). `cdc_offsets_uncommitable` —\nиндикатор текущего **RPO-хвоста**.\n\n## Последствия\n\n- **RPO управляется одним рычагом:** `offset.flush.interval.ms` (дефолт 5 c).\n  При плановом рестарте RPO≈0 (финальный flush), при краше RPO ≤ этот интервал.\n  Меньше интервал → меньше RPO, но чаще запись в offset storage.\n- **RTO доминируется догоняющим чтением**, а оно ограничено снизу доступностью\n  sink и (если включён) throttler-лимитом. Держать `throttle.throttler.max.rps\n  = -1` для быстрого catch-up.\n- **Допустимое окно простоя — не бесконечно** и определяется ретеншеном\n  источника: для PG — диском под растущий WAL (слот держит), для TQE/Kafka —\n  `retention.length`/topic retention (за ним — потеря). Это надо закладывать в\n  SLA простоя.\n- Дефолты PG/Oracle (slot, wal/redo retention, `max.batch.size`) — **нативные\n  Debezium/OLR**, в CDC-коде своих дефолтов нет; тюнятся в пресетах.\n\n## Затрагиваемые модули/файлы\n\n- RPO-хвост и flush: `cdc-worker/.../offsets/Offsetter.java` (`flushOffsets()`\n  `@Scheduled`, `destroy()` финальный flush), `OffsetProperties.java`,\n  `application.yaml` (`offset.flush.interval.ms/timeout.ms`).\n- RTO-стадии: `cdc-worker/.../CDCWorker.java` (`stop()`/`@PreDestroy`,\n  `shutdown.timeout.ms`), `scanner/WorkerParams.java` (`source/sink.startup.timeout`,\n  `sink.retry.*`, `throttle.throttler.max.rps`), `throttle/NaiveThrottler.java`.\n- Seek на старте: `connectors/kafka-connector/.../source/offsets/OffsetsResolver.java`;\n  tarantool-source resume по vclock — `TarantoolConnectorTask.java`.\n- Ретеншен/floor: слот PG (Debezium `PostgresConnectorConfig`),\n  `TarantoolConnectorConfig.java` (`replication.*`), `TQEv2SourceTask.java`/\n  `TQESourceTask.java` (`cursor`), `k8s/samples/tqe.yaml` (`retention.length`).\n- Метрики: `cdc-worker/.../CDCLagReporter.java`, `Offsetter.java` (gauges),\n  actuator в `application.yaml`.\n\n## Как поддерживается\n\nДокумент описательный; печатается флагом `--help-rpo-rto`. RPO-инвариант\n(финальный flush при graceful stop, flush по расписанию) — предмет регрессии при\nправках `Offsetter`/`CDCWorker.stop()`: если пропадёт финальный flush,\nплановый рестарт перестанет давать RPO≈0. Метрики `cdc_offsets_uncommitable` и\n`cdc_trip_time` позволяют мониторить RPO/RTO в проде без изменения кода.\n\n## Как исправлять нарушения\n\n- **RPO больше ожидаемого при краше** → уменьшить `offset.flush.interval.ms`;\n  проверить, что flush не упирается в `offset.flush.timeout.ms` (зависший storage).\n- **Плановый рестарт теряет позицию** (RPO не 0) → проверить, что worker\n  получает SIGTERM и укладывается в `cdc.shutdown.timeout.ms` (иначе dirty stop\n  без финального flush) — см. `CDCWorker.stop()`.\n- **RTO огромный, лаг не сокращается** → sink недоступен/медленный (смотреть\n  `sink.retry.*` и метрики sink) или включён `throttle.throttler.max.rps > 0` —\n  снять лимит.\n- **PG: диск пухнет во время простоя** → WAL держится слотом (это ожидаемо);\n  сократить простой или увеличить диск; не удалять слот (иначе потеря позиции).\n- **TQE/Kafka: после долгого простоя пропали данные** → cursor/offset ушёл за\n  `retention.length`/topic retention — за горизонтом только snapshot-фаза (0108).\n\n## Ссылки\n\n- Связанные ADR: [`0107-delivery-guarantees.md`](0107-delivery-guarantees.md)\n  (at-least-once, почему RPO = переигрывание, а не потеря),\n  [`0104-offset-management.md`](0104-offset-management.md) (offset-снимок и его\n  хранилища — что seek'ается при рестарте), [`0108-reprocessing.md`](0108-reprocessing.md)\n  (предел «назад» = ретеншен источника; тот же floor, что и для догона),\n  [`0103-initial-load-and-streaming.md`](0103-initial-load-and-streaming.md)\n  (incremental snapshot resume по чанкам — влияет на RTO снапшот-фазы).\n- Механизм offset-ов — `CLAUDE.md`, раздел «Механизм работы Offset-ов».", "--help-tnt-sink-params": "==============================================================================\nio.tarantool.connector.TarantoolSinkConnector  (sink, v1.0.0-SNAPSHOT)\n==============================================================================\n\n[Connector]\n  tarantool.connection.groups : list\n      Connection groups description. Must be filled in using the URL template:\n'tarantool://<host><:><port>/?<param1=value1&param2=value2&...>, ...'\nExample: 'tarantool://localhost:3301/?user=artyom&password=pass, tarantool://localhost:3302/?user=vasya'\n\n  tarantool.batch.size : int = 100\n      Batch size for send messages to Tarantool with batch\n  tarantool.connect.timeout : int\n      Connect timeout for Tarantool client in milliseconds\n  primary.key.mode : string = record_value\n      The primary key mode\n  primary.key.fields : string\n      A comma-separated list of primary key field names. This is interpreted differently depending on primary.key.mode.\n  delete.enabled : boolean = false\n      Means whether to enable deletion of records in sink tables\n  insert.mode : string = insert\n      The insertion mode to use. 'insert' - the default mode, uses insert semantics; 'replace' - uses replace semantics\n  decimal.handling.mode : string = precise\n      The variable decimal handling mode to use.'precise' - the default mode, uses BigDecimal for handling; 'double' - will be casted to double representation'plain_string' - will be casted to plain string representation'engineer_string' - will be casted to string with engineer representation\n  datetime.handling.mode : string = datetime\n      The date and time handling mode to use. 'datetime' - write date and time types into tarantool 'datetime' type (default). 'string' - write date and time types into tarantool 'string' type. 'numeric' - write date and time types into tarantool 'integer' type.\n  datetime.infinity.handling.enabled : boolean = false\n      Indicates whether to enable handling of 'infinity' and '-infinity' values when 'datetime.handling.mode=datetime|numeric'. If this parameter is true, then when 'datetime.handling.mode=datetime|numeric': 'infinity' -> 'OffsetDateTime.MAX', '-infinity' -> 'OffsetDateTime.MIN'.Default: false\n  truncate.enabled : boolean = false\n      Means whether to enable truncation of sink spaces\n\n[General]\n  client.type : string\n      Specifies the client type to use for connecting to Tarantool. Valid values are 'tdg2' for Tarantool Data Grid 2 or 'crud' for tarantool/crud operations.\n  topic.prefix : string\n      Topic prefix that identifies and provides a namespace for the particular database server/cluster is capturing changes. The topic prefix should be unique across all other connectors, since it is used as a prefix for all Kafka topic names that receive events emitted by this connector. Only alphanumeric characters, hyphens, dots and underscores must be accepted.\n  retriable.restart.connector.wait.ms : long = 10000\n      Time to wait before restarting connector after retriable exception occurs. Defaults to 10000ms.\n  tombstones.on.delete : boolean = true\n      Whether delete operations should be represented by a delete event and a subsequent tombstone event (true) or only by a delete event (false). Emitting the tombstone event (the default behavior) allows Kafka to completely delete all events pertaining to the given key once the source record got deleted.\n  max.queue.size : int = 8192\n      Maximum size of the queue for change events read from the database log but not yet recorded or forwarded. Defaults to 8192, and should always be larger than the maximum batch size.\n  max.batch.size : int = 2048\n      Maximum size of each batch of source records. Defaults to 2048.\n  poll.interval.ms : long = 500\n      Time to wait for new change events to appear after receiving no events, given in milliseconds. Defaults to 500 ms.\n  max.queue.size.in.bytes : long = 0\n      Maximum size of the queue in bytes for change events read from the database log but not yet recorded or forwarded. Defaults to 0. Mean the feature is not enabled\n  snapshot.delay.ms : long = 0\n      A delay period before a snapshot will begin, given in milliseconds. Defaults to 0 ms.\n  snapshot.fetch.size : int\n      The maximum number of records that should be loaded into memory while performing a snapshot.\n  incremental.snapshot.chunk.size : int = 1024\n      The maximum size of chunk (number of documents/rows) for incremental snapshotting\n  incremental.snapshot.allow.schema.changes : boolean = false\n      Detect schema change during an incremental snapshot and re-select a current chunk to avoid locking DDLs. Note that changes to a primary key are not supported and can cause incorrect results if performed during an incremental snapshot. Another limitation is that if a schema change affects only columns' default values, then the change won't be detected until the DDL is processed from the binlog stream. This doesn't affect the snapshot events' values, but the schema of snapshot events may have outdated defaults.\n  snapshot.include.collection.list : list\n      This setting must be set to specify a list of tables/collections whose snapshot must be taken on creating or restarting the connector.\n  provide.transaction.metadata : boolean = false\n      Enables transaction metadata extraction together with event counting\n  transaction.metadata.factory : class = class io.debezium.pipeline.txmetadata.DefaultTransactionMetadataFactory\n      Class to make transaction context & transaction struct/schemas\n  event.processing.failure.handling.mode : string = fail\n      Specify how failures during processing of events (i.e. when encountering a corrupted event) should be handled, including: 'fail' (the default) an exception indicating the problematic event and its position is raised, causing the connector to be stopped; 'warn' the problematic event and its position will be logged and the event will be skipped; 'ignore' the problematic event will be skipped.\n  converters : string\n      Optional list of custom converters that would be used instead of default ones. The converters are defined using '<converter.prefix>.type' config option and configured using options '<converter.prefix>.<option>'\n  post.processors : string\n      Optional list of post processors. The processors are defined using '<post.processor.prefix>.type' config option and configured using options '<post.processor.prefix.<option>'\n  skipped.operations : list = [t]\n      The comma-separated list of operations to skip during streaming, defined as: 'c' for inserts/create; 'u' for updates; 'd' for deletes, 't' for truncates, and 'none' to indicate nothing skipped. By default, only truncate operations will be skipped.\n  skip.messages.without.change : boolean = false\n      Enable to skip publishing messages when there is no change in included columns.This would essentially filter messages to be sent when there is no change in columns included as per column.include.list/column.exclude.list.For Postgres - this would require REPLICA IDENTITY of table to be FULL.\n  binary.handling.mode : string = bytes\n      Specify how binary (blob, binary, etc.) columns should be represented in change events, including: 'bytes' represents binary data as byte array (default); 'base64' represents binary data as base64-encoded string; 'base64-url-safe' represents binary data as base64-url-safe-encoded string; 'hex' represents binary data as hex-encoded (base16) string\n  schema.name.adjustment.mode : string = none\n      Specify how schema names should be adjusted for compatibility with the message converter used by the connector, including: 'avro' replaces the characters that cannot be used in the Avro type name with underscore; 'avro_unicode' replaces the underscore or characters that cannot be used in the Avro type name with corresponding unicode like _uxxxx. Note: _ is an escape sequence like backslash in Java;'none' does not apply any adjustment (default)\n  field.name.adjustment.mode : string = none\n      Specify how field names should be adjusted for compatibility with the message converter used by the connector, including: 'avro' replaces the characters that cannot be used in the Avro type name with underscore; 'avro_unicode' replaces the underscore or characters that cannot be used in the Avro type name with corresponding unicode like _uxxxx. Note: _ is an escape sequence like backslash in Java;'none' does not apply any adjustment (default)\n  query.fetch.size : int = 0\n      The maximum number of records that should be loaded into memory while streaming. A value of '0' uses the default JDBC fetch size.\n  snapshot.max.threads : int = 1\n      The maximum number of threads used to perform the snapshot. Defaults to 1.\n  snapshot.max.threads.multiplier : int = 1\n      The factor used to scale the number of snapshot chunks per table. The default behavior is to take 'row_count/snapshot.max.threads' to compute the number of rows per chunks. This may not be ideal for larger tables, and using the multiplier, the formula is adjusted to increase the number of chunks by using 'row_count/(snapshot.max.threads * snapshot.max.threads.multiplier).\n  internal.legacy.snapshot.max.threads : boolean = false\n      When enabled, uses the legacy table-per-thread parallel snapshot algorithm. When set to false (the default), tables are split into chunks and processed across all snapshot threads, allowing for higher concurrency for snapshots.\n  signal.data.collection : list\n      The name of the data collection that is used to send signals/commands to Debezium. For multi-partition mode connectors, multiple signal data collections can be specified as a comma-separated list. Signaling is disabled when not set.\n  signal.poll.interval.ms : long = 5000\n      Interval for looking for new signals in registered channels, given in milliseconds. Defaults to 5 seconds.\n  signal.enabled.channels : list = [source]\n      List of channels names that are enabled. Source channel is enabled by default\n  topic.naming.strategy : class = class io.debezium.schema.SchemaTopicNamingStrategy\n      The name of the TopicNamingStrategy class that should be used to determine the topic name for data change, schema change, transaction, heartbeat event etc.\n  internal.custom.retriable.exception : string\n      Provide a temporary workaround for an error that should be retriable. If set a stacktrace of non-retriable exception is traversed and messages are matched against this regular expression. If matched the error is changed to retriable.\n  notification.enabled.channels : list\n      List of notification channels names that are enabled.\n  sourceinfo.struct.maker : class\n      The name of the SourceInfoStructMaker class that returns SourceInfo schema and struct.\n  errors.max.retries : int = -1\n      The maximum number of retries on connection errors before failing (-1 = no limit, 0 = disabled, > 0 = num of retries).\n  custom.metric.tags : list\n      The custom metric tags will accept key-value pairs to customize the MBean object name which should be appended the end of regular name, each key would represent a tag for the MBean object name, and the corresponding value would be the value of that tag the key is. For example: k1=v1,k2=v2\n  incremental.snapshot.watermarking.strategy : string = INSERT_INSERT\n      Specify the strategy used for watermarking during an incremental snapshot: 'insert_insert' both open and close signal is written into signal data collection (default); 'insert_delete' only open signal is written on signal data collection, the close will delete the relative open signal;\n  snapshot.mode.custom.name : string\n      When 'snapshot.mode' is set as custom, this setting must be set to specify a the name of the custom implementation provided in the 'name()' method. The implementations must implement the 'Snapshotter' interface and is called on each app boot to determine whether to do a snapshot.\n  event.converting.failure.handling.mode : string = warn\n      Specify how failures during converting of event should be handled, including: 'fail' throw an exception that the column of event conversion is failed with unmatched schema type, causing the connector to be stopped. it could need schema recovery to covert successfully; 'warn' (the default) the value of column of event that conversion failed will be null and be logged with warn level; 'skip' the value of column of event that conversion failed will be null and be logged with debug level.\n  streaming.delay.ms : long = 0\n      A delay period after the snapshot is completed and the streaming begins, given in milliseconds. Defaults to 0 ms.\n  snapshot.locking.mode.custom.name : string\n      When 'snapshot.locking.mode' is set as custom, this setting must be set to specify a the name of the custom implementation provided in the 'name()' method. The implementations must implement the 'SnapshotterLocking' interface and is called to determine how to lock tables during schema snapshot.\n  snapshot.query.mode : string = select_all\n      Controls query used during the snapshot\n  snapshot.query.mode.custom.name : string\n      When 'snapshot.query.mode' is set as custom, this setting must be set to specify a the name of the custom implementation provided in the 'name()' method. The implementations must implement the 'SnapshotterQuery' interface and is called to determine how to build queries during snapshot.\n  snapshot.mode.configuration.based.snapshot.data : boolean = false\n      When 'snapshot.mode' is set as configuration_based, this setting permits to specify whenever the data should be snapshotted or not.\n  snapshot.mode.configuration.based.snapshot.schema : boolean = false\n      When 'snapshot.mode' is set as configuration_based, this setting permits to specify whenever the schema should be snapshotted or not.\n  snapshot.mode.configuration.based.start.stream : boolean = false\n      When 'snapshot.mode' is set as configuration_based, this setting permits to specify whenever the stream should start or not after snapshot.\n  snapshot.mode.configuration.based.snapshot.on.schema.error : boolean = false\n      When 'snapshot.mode' is set as configuration_based, this setting permits to specify whenever the schema should be snapshotted or not in case of error.\n  snapshot.mode.configuration.based.snapshot.on.data.error : boolean = false\n      When 'snapshot.mode' is set as configuration_based, this setting permits to specify whenever the data should be snapshotted or not in case of error.\n  internal.log.position.check.enable : boolean = true\n      When enabled the connector checks if the position stored in the offset is still available in the log\n  internal.advanced.metrics.enable : boolean = false\n      When enabled the connector will emit advanced streaming metrics\n  connection.validation.timeout.ms : long = 60000\n      The maximum time in milliseconds to wait for connection validation to complete. Defaults to 60 seconds.\n  executor.shutdown.timeout.ms : long = 4000\n      The maximum time in milliseconds to wait for task executor to shut down.\n  openlineage.integration.enabled : boolean = false\n      Enable Debezium to emit data lineage metadata through OpenLineage API\n  openlineage.integration.config.file.path : string = ./openlineage.yml\n      Path to OpenLineage file configuration. See https://openlineage.io/docs/client/java/configuration\n  openlineage.integration.job.namespace : string\n      The job's namespace emitted by Debezium\n  openlineage.integration.job.description : string = Debezium change data capture job\n      The job's description emitted by Debezium\n  openlineage.integration.job.tags : list\n      The job's tags emitted by Debezium. A comma-separated list of key-value pairs.For example: k1=v1,k2=v2\n  openlineage.integration.job.owners : list\n      The job's owners emitted by Debezium. A comma-separated list of key-value pairs.For example: k1=v1,k2=v2\n  openlineage.integration.dataset.kafka.bootstrap.servers : string\n      The Kafka bootstrap server address used as input/output namespace/\n  custom.sanitize.pattern : string = .*secret$|.*password$|.*sasl\\.jaas\\.config$|.*basic\\.auth\\.user\\.info|.*registry\\.auth\\.client-secret\n      Regular expression identifying configuration keys whose values should be masked. When set, this custom pattern replaces Debezium’s default password masking pattern.\n  extended.headers.enabled : boole
