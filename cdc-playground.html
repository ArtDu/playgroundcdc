extracts into a ./cdc dir — and point CHART there. From a repo checkout\n# it is k8s/helm-chart-cdc. Values are inlined below.\n\nCHART=./cdc   # unpacked from the delivery bundle's helm-chart-cdc-*.tar.gz\n\ncat > cdc-values.yaml <<EOF\n# These addresses point at the source/sink stood up above (pg VMs by their cdc_net\n# IP, TQE by its in-cluster gRPC service). The root.* blocks feed the\n# application-<profile>.yml placeholders (pg.source.*, pg.sink.*, tqe.source.*,\n# tqe.sink.*), same as the --pg.source.host=... CLI overrides do locally.\nsources:\n  postgresql:\n    common:\n      root:\n        pg:\n          source:\n            host: $SRC_INTERNAL_IP\n            port: \"5433\"\n            tables: public.User,public.debezium_signal\nsinks:\n  postgresql:\n    common:\n      # schema.evolution=basic lets the sink auto-create/alter target tables,\n      # same flag we pass locally as --sink.connector.schema.evolution=basic.\n      connector:\n        schema.evolution: basic\n      root:\n        pg:\n          sink:\n            url: jdbc:postgresql://$SINK_INTERNAL_IP:5432/postgres\n\nglobal:\n  imagePullSecrets:\n    - name: registry-gitlab\nimage:\n  # cdc-worker-all bundles every connector (pg + tqe); the pg-preset-only image does\n  # not carry the TQE connectors, so use the full image for tqe flows. The registry\n  # below is our internal gitlab mirror — repoint it at your own registry if you pull\n  # the image from elsewhere. The tag is an example: pick a published one from the\n  # registry / releases (1.0.0-SNAPSHOT is only a local build, not in the registry).\n  repository: registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/cdc-worker-all\n  tag: 1.0.0-SNAPSHOT\n  pullPolicy: IfNotPresent\n\nflow:\n  - source: postgresql\n    sink: postgresql\n    resources:\n      requests: { cpu: 1500m, memory: 1Gi }\n      limits: { cpu: 2, memory: 3Gi }\n    env:\n      JAVA_OPTS: -XX:MaxDirectMemorySize=256M\n      PRESET: pg-pg-local-docker\nEOF\n\nhelm --namespace transfer install cdc \"$CHART\" -f cdc-values.yaml", "--help-pg-pg-local": "# ========== Runbook: preset pg-pg-local ==========\n# Copy-paste to stand the stack up from scratch (bare docker/psql, no make).\n# The worker container tag below is an example — use your published tag.\n\n# --- 1. Docker network ---\ndocker network create stand-net 2>/dev/null || true\n\n# --- 2. Monitoring: Prometheus + Grafana (replaces `make monitoring-up`) ---\n# Prometheus config: scrape the worker's actuator endpoint. Two targets: 8000 for a\n# single worker, 8001 for a second one (the pg->tqe->pg pipeline runs two workers,\n# the tqe->pg side moved to 8001). A down target is simply skipped, so listing both\n# is harmless when you run only one worker.\nmkdir -p /tmp/cdc-mon/grafana-ds\ncat > /tmp/cdc-mon/prometheus.yml <<'EOF'\nglobal:\n  scrape_interval: 5s\n  evaluation_interval: 5s\nscrape_configs:\n  - job_name: \"cdc-worker\"\n    metrics_path: \"actuator/prometheus\"\n    static_configs:\n      - targets: [\"host.docker.internal:8000\", \"host.docker.internal:8001\"]\nEOF\n\n# Grafana datasource pointing at the Prometheus container.\ncat > /tmp/cdc-mon/grafana-ds/datasource.yml <<'EOF'\napiVersion: 1\ndatasources:\n  - name: Prometheus\n    type: prometheus\n    access: proxy\n    url: http://prometheus:9090\nEOF\n\ndocker run -d --rm --name prometheus \\\n    --network stand-net -p 9090:9090 \\\n    --add-host host.docker.internal:host-gateway \\\n    -v /tmp/cdc-mon/prometheus.yml:/etc/prometheus/prometheus.yml \\\n    prom/prometheus:v2.54.1\n\ndocker run -d --rm --name grafana \\\n    --network stand-net -p 3000:3000 \\\n    -e GF_AUTH_ANONYMOUS_ENABLED=true \\\n    -e GF_AUTH_ANONYMOUS_ORG_ROLE=Admin \\\n    -e GF_AUTH_BASIC_ENABLED=false \\\n    -v /tmp/cdc-mon/grafana-ds:/etc/grafana/provisioning/datasources \\\n    grafana/grafana:11.6.9\n# Grafana UI: http://localhost:3000  (Prometheus datasource is pre-wired).\n# Import dashboards from the repo: stands/local/monitoring/grafana/dashboard/*.json\n\n# --- 3. Source Postgres (logical WAL, port 5433) ---\ndocker run -d --rm --name source-postgres \\\n    --network stand-net -p 5433:5432 \\\n    -e POSTGRES_HOST_AUTH_METHOD=trust \\\n    postgres:16.4 \\\n    postgres -c wal_level=logical -c max_connections=500\n\n# --- 4. Target Postgres (sink, port 5432) ---\ndocker run -d --rm --name target-postgres \\\n    --network stand-net -p 5432:5432 \\\n    -e POSTGRES_HOST_AUTH_METHOD=trust \\\n    postgres:16.4\n\n# --- 5. CDC Worker ---\njava -jar cdc-worker.jar \\\n    --preset=pg-pg-local --profile=pg-source-table-user \\\n    --sink.connector.schema.evolution=basic\n\n# --- 6. Create the source table & insert sample rows ---\npsql -h localhost -p 5433 -U postgres -d postgres <<'EOF'\nCREATE TABLE \"User\" (\n    \"id\" BIGINT PRIMARY KEY,\n    \"name\" VARCHAR(128) NOT NULL,\n    \"surname\" VARCHAR(128),\n    \"gender\" VARCHAR(100) NOT NULL,\n    \"birthDate\" DATE NOT NULL,\n    \"timestamp\" TIMESTAMPTZ,\n    \"datetime\" TIMESTAMPTZ,\n    \"age\" BIGINT,\n    \"metadata\" JSONB,\n    \"description\" TEXT,\n    \"enabled\" BOOLEAN\n);\nINSERT INTO \"User\" (\"id\",\"name\",\"surname\",\"gender\",\"birthDate\",\"timestamp\",\"datetime\",\"age\",\"metadata\",\"description\",\"enabled\") VALUES\n  (1,'Alice','Johnson','female','1990-03-15','2026-07-02 10:00:00+00','2026-07-02 10:00:00+00',36,'{\"role\":\"admin\",\"tags\":[\"a\",\"b\"]}','First user',true),\n  (2,'Bob','Smith','male','1985-11-02','2026-07-01 08:30:00+00','2026-07-01 08:30:00+00',40,'{\"role\":\"user\"}','Second user',false),\n  (3,'Carol',NULL,'female','2000-06-21',NULL,NULL,NULL,NULL,NULL,NULL);\nEOF\n\n# --- 7. Verify replication landed in the target ---\npsql -h localhost -p 5432 -U postgres -d postgres \\\n    -c 'SELECT id, name, surname, gender, \"birthDate\", age, enabled FROM \"User\" ORDER BY id;'\n\n# --- 8. (optional) Load generator: upsert the same rows in a loop ---\n# 500 rows x 400 batches = 200k UPDATE events, in batches of 500 with a 0.3s pause.\npsql -h localhost -p 5433 -U postgres -d postgres <<'EOF'\nDO $$\nDECLARE\n  key_space CONSTANT int := 500;   -- how many unique ids to cycle (id 1..500)\n  batches   CONSTANT int := 400;   -- how many batches to run\nBEGIN\n  FOR b IN 1..batches LOOP\n    INSERT INTO \"User\" (\"id\",\"name\",\"gender\",\"birthDate\")\n    SELECT g,\n           'Artyom_' || b,          -- vary the value so each upsert is a real UPDATE\n           'male',\n           DATE '1990-01-01'\n    FROM generate_series(1, key_space) AS g\n    ON CONFLICT (\"id\") DO UPDATE\n      SET \"name\" = EXCLUDED.\"name\";\n    COMMIT;\n    PERFORM pg_sleep(0.3);\n  END LOOP;\nEND $$;\nEOF\n\n# ========================================", "--help-pg-pg-local --simple": "java -jar cdc-worker.jar \\\n    --preset=pg-pg-local --profile=pg-source-table-user \\\n    --sink.connector.schema.evolution=basic", "--help-pg-source-params": "==============================================================================\nio.debezium.connector.postgresql.PostgresConnector  (source, v3.5.0.Final)\n==============================================================================\n\n[Postgres]\n  topic.prefix : string\n      Topic prefix that identifies and provides a namespace for the particular database server/cluster is capturing changes. The topic prefix should be unique across all other connectors, since it is used as a prefix for all Kafka topic names that receive events emitted by this connector. Only alphanumeric characters, hyphens, dots and underscores must be accepted.\n  database.hostname : string\n      Resolvable hostname or IP address of the database server.\n  database.port : int = 5432\n      Port of the database server.\n  database.user : string\n      Name of the database user to be used when connecting to the database.\n  database.password : password\n      Password of the database user to be used when connecting to the database.\n  database.dbname : string\n      The name of the database from which the connector should capture changes\n  database.query.timeout.ms : int = 600000\n      Time to wait for a query to execute, given in milliseconds. Defaults to 600 seconds (600,000 ms); zero means there is no limit.\n  plugin.name : string = decoderbufs\n      The name of the Postgres logical decoding plugin installed on the server. Supported values are 'decoderbufs' and 'pgoutput'. Defaults to 'decoderbufs'.\n  slot.name : string = debezium\n      The name of the Postgres logical decoding slot created for streaming changes from a plugin. Defaults to 'debezium\n  publication.name : string = dbz_publication\n      The name of the Postgres 10+ publication used for streaming changes from a plugin. Defaults to 'dbz_publication'\n  publication.autocreate.mode : string = all_tables\n      Applies only when streaming changes using pgoutput.Determine how creation of a publication should work, the default is all_tables.DISABLED - The connector will not attempt to create a publication at all. The expectation is that the user has created the publication up-front. If the publication isn't found to exist upon startup, the connector will throw an exception and stop.ALL_TABLES - If no publication exists, the connector will create a new publication for all tables. Note this requires that the configured user has access. If the publication already exists, it will be used. i.e CREATE PUBLICATION <publication_name> FOR ALL TABLES;FILTERED - If no publication exists, the connector will create a new publication for all those tables matchingthe current filter configuration (see table/database include/exclude list properties). If the publication already exists, it will be used. i.e CREATE PUBLICATION <publication_name> FOR TABLE <tbl1, tbl2, etc>\n  replica.identity.autoset.values : string\n      Applies only when streaming changes using pgoutput.Determines the value for Replica Identity at table level. This option will overwrite the existing value in databaseA comma-separated list of regular expressions that match fully-qualified tables and Replica Identity value to be used in the table. Each expression must match the pattern '<fully-qualified table name>:<replica identity>', where the table names could be defined as (SCHEMA_NAME.TABLE_NAME), and the replica identity values are: DEFAULT - Records the old values of the columns of the primary key, if any. This is the default for non-system tables.INDEX index_name - Records the old values of the columns covered by the named index, that must be unique, not partial, not deferrable, and include only columns marked NOT NULL. If this index is dropped, the behavior is the same as NOTHING.FULL - Records the old values of all columns in the row.NOTHING - Records no information about the old row. This is the default for system tables.\n  slot.drop.on.stop : boolean = false\n      Whether or not to drop the logical replication slot when the connector finishes orderly. By default the replication is kept so that on restart progress can resume from the last recorded location\n  slot.failover : boolean = false\n      Whether or not to create a failover slot. This is only supported when connecting to a primary server of a Postgres cluster, version 17 or newer. When not specified, or when not connecting to a Postgres 17+ primary, no failover slot will be created.\n  slot.stream.params : string\n      Any optional parameters used by logical decoding plugin. Semi-colon separated. E.g. 'add-tables=public.table,public.table2;include-lsn=true'\n  database.initial.statements : string\n      A semicolon separated list of SQL statements to be executed when a JDBC connection to the database is established. Note that the connector may establish JDBC connections at its own discretion, so this should typically be used for configuration of session parameters only, but not for executing DML statements. Use doubled semicolon (';;') to use a semicolon as a character and not as a delimiter.\n  database.sslmode : string = prefer\n      Whether to use an encrypted connection to Postgres. Options include: 'disable' (the default) to use an unencrypted connection; 'allow' to try and use an unencrypted connection first and, failing that, a secure (encrypted) connection; 'prefer' (the default) to try and use a secure (encrypted) connection first and, failing that, an unencrypted connection; 'require' to use a secure (encrypted) connection, and fail if one cannot be established; 'verify-ca' like 'required' but additionally verify the server TLS certificate against the configured Certificate Authority (CA) certificates, or fail if no valid matching CA certificates are found; or 'verify-full' like 'verify-ca' but additionally verify that the server certificate matches the host to which the connection is attempted.\n  database.sslcert : string\n      File containing the SSL Certificate for the client. See the Postgres SSL docs for further information\n  database.sslpassword : password\n      Password to access the client private key from the file specified by 'database.sslkey'. See the Postgres SSL docs for further information\n  database.sslrootcert : string\n      File containing the root certificate(s) against which the server is validated. See the Postgres JDBC SSL docs for further information\n  database.sslkey : string\n      File containing the SSL private key for the client. See the Postgres SSL docs for further information\n  slot.max.retries : int = 6\n      How many times to retry connecting to a replication slot when an attempt fails.\n  slot.retry.delay.ms : long = 10000\n      Time to wait between retry attempts when the connector fails to connect to a replication slot, given in milliseconds. Defaults to 10 seconds (10,000 ms).\n  database.sslfactory : string\n      A name of class to that creates SSL Sockets. Use org.postgresql.ssl.NonValidatingFactory to disable SSL validation in development environments\n  status.update.interval.ms : int = 10000\n      Frequency for sending replication connection status updates to the server, given in milliseconds. Defaults to 10 seconds (10,000 ms).\n  lsn.flush.timeout.ms : long = 30000\n      Maximum time in milliseconds to wait for LSN flush operation to complete. If the flush operation does not complete within this timeout, the action specified by lsn.flush.timeout.action will be taken. Defaults to 30 seconds.\n  lsn.flush.timeout.action : string = fail\n      Action to take when an LSN flush timeout occurs. Options include: 'fail' (default) to fail the connector; 'warn' to log a warning and continue processing; 'ignore' to continue processing and ignore the timeout.\n  database.tcpKeepAlive : boolean = true\n      Enable or disable TCP keep-alive probe to avoid dropping TCP connection\n  xmin.fetch.interval.ms : long = 0\n      Specify how often (in ms) the xmin will be fetched from the replication slot. This xmin value is exposed by the slot which gives a lower bound of where a new replication slot could start from. The lower the value, the more likely this value is to be the current 'true' value, but the bigger the performance cost. The bigger the value, the less likely this value is to be the current 'true' value, but the lower the performance penalty. The default is set to 0 ms, which disables tracking xmin.\n  skipped.operations : list = [t]\n      The comma-separated list of operations to skip during streaming, defined as: 'c' for inserts/create; 'u' for updates; 'd' for deletes, 't' for truncates, and 'none' to indicate nothing skipped. By default, only truncate operations will be skipped.\n  lsn.flush.mode : string\n      Determines the LSN flushing strategy. Options include: 'connector' (default) for Debezium managed LSN flushing (replaces deprecated flush.lsn.source=true); 'manual' for externally managed LSN flushing (replaces deprecated flush.lsn.source=false); 'connector_and_driver' for Debezium managed LSN flushing with the pgjdbc driver flushing unmonitored LSNsusing server keepalive LSN, which prevents WAL growth on low-activity databases.\n  flush.lsn.source : boolean = true\n      (Deprecated) Boolean to determine if Debezium should flush LSN in the source postgres database. Use 'lsn.flush.mode' instead. A value of 'true' maps to 'connector' mode, 'false' maps to 'manual' mode.\n\n[Connector]\n  event.processing.failure.handling.mode : string = fail\n      Specify how failures during processing of events (i.e. when encountering a corrupted event) should be handled, including: 'fail' (the default) an exception indicating the problematic event and its position is raised, causing the connector to be stopped; 'warn' the problematic event and its position will be logged and the event will be skipped; 'ignore' the problematic event will be skipped.\n  max.batch.size : int = 2048\n      Maximum size of each batch of source records. Defaults to 2048.\n  max.queue.size : int = 8192\n      Maximum size of the queue for change events read from the database log but not yet recorded or forwarded. Defaults to 8192, and should always be larger than the maximum batch size.\n  poll.interval.ms : long = 500\n      Time to wait for new change events to appear after receiving no events, given in milliseconds. Defaults to 500 ms.\n  max.queue.size.in.bytes : long = 0\n      Maximum size of the queue in bytes for change events read from the database log but not yet recorded or forwarded. Defaults to 0. Mean the feature is not enabled\n  provide.transaction.metadata : boolean = false\n      Enables transaction metadata extraction together with event counting\n  snapshot.delay.ms : long = 0\n      A delay period before a snapshot will begin, given in milliseconds. Defaults to 0 ms.\n  streaming.delay.ms : long = 0\n      A delay period after the snapshot is completed and the streaming begins, given in milliseconds. Defaults to 0 ms.\n  snapshot.include.collection.list : list\n      This setting must be set to specify a list of tables/collections whose snapshot must be taken on creating or restarting the connector.\n  snapshot.fetch.size : int\n      The maximum number of records that should be loaded into memory while performing a snapshot.\n  snapshot.max.threads : int = 1\n      The maximum number of threads used to perform the snapshot. Defaults to 1.\n  snapshot.max.threads.multiplier : int = 1\n      The factor used to scale the number of snapshot chunks per table. The default behavior is to take 'row_count/snapshot.max.threads' to compute the number of rows per chunks. This may not be ideal for larger tables, and using the multiplier, the formula is adjusted to increase the number of chunks by using 'row_count/(snapshot.max.threads * snapshot.max.threads.multiplier).\n  internal.legacy.snapshot.max.threads : boolean = false\n      When enabled, uses the legacy table-per-thread parallel snapshot algorithm. When set to false (the default), tables are split into chunks and processed across all snapshot threads, allowing for higher concurrency for snapshots.\n  snapshot.mode.custom.name : string\n      When 'snapshot.mode' is set as custom, this setting must be set to specify a the name of the custom implementation provided in the 'name()' method. The implementations must implement the 'Snapshotter' interface and is called on each app boot to determine whether to do a snapshot.\n  snapshot.mode.configuration.based.snapshot.data : boolean = false\n      When 'snapshot.mode' is set as configuration_based, this setting permits to specify whenever the data should be snapshotted or not.\n  snapshot.mode.configuration.based.snapshot.schema : boolean = false\n      When 'snapshot.mode' is set as configuration_based, this setting permits to specify whenever the schema should be snapshotted or not.\n  snapshot.mode.configuration.based.start.stream : boolean = false\n      When 'snapshot.mode' is set as configuration_based, this setting permits to specify whenever the stream should start or not after snapshot.\n  snapshot.mode.configuration.based.snapshot.on.schema.error : boolean = false\n      When 'snapshot.mode' is set as configuration_based, this setting permits to specify whenever the schema should be snapshotted or not in case of error.\n  snapshot.mode.configuration.based.snapshot.on.data.error : boolean = false\n      When 'snapshot.mode' is set as configuration_based, this setting permits to specify whenever the data should be snapshotted or not in case of error.\n  retriable.restart.connector.wait.ms : long = 10000\n      Time to wait before restarting connector after retriable exception occurs. Defaults to 10000ms.\n  query.fetch.size : int = 0\n      The maximum number of records that should be loaded into memory while streaming. A value of '0' uses the default JDBC fetch size.\n  errors.max.retries : int = -1\n      The maximum number of retries on connection errors before failing (-1 = no limit, 0 = disabled, > 0 = num of retries).\n  incremental.snapshot.watermarking.strategy : string = INSERT_INSERT\n      Specify the strategy used for watermarking during an incremental snapshot: 'insert_insert' both open and close signal is written into signal data collection (default); 'insert_delete' only open signal is written on signal data collection, the close will delete the relative open signal;\n  internal.log.position.check.enable : boolean = true\n      When enabled the connector checks if the position stored in the offset is still available in the log\n  internal.advanced.metrics.enable : boolean = false\n      When enabled the connector will emit advanced streaming metrics\n  connection.validation.timeout.ms : long = 60000\n      The maximum time in milliseconds to wait for connection validation to complete. Defaults to 60 seconds.\n  executor.shutdown.timeout.ms : long = 4000\n      The maximum time in milliseconds to wait for task executor to shut down.\n  openlineage.integration.enabled : boolean = false\n      Enable Debezium to emit data lineage metadata through OpenLineage API\n  openlineage.integration.config.file.path : string = ./openlineage.yml\n      Path to OpenLineage file configuration. See https://openlineage.io/docs/client/java/configuration\n  openlineage.integration.job.namespace : string\n      The job's namespace emitted by Debezium\n  openlineage.integration.job.description : string = Debezium change data capture job\n      The job's description emitted by Debezium\n  openlineage.integration.job.tags : list\n      The job's tags emitted by Debezium. A comma-separated list of key-value pairs.For example: k1=v1,k2=v2\n  openlineage.integration.job.owners : list\n      The job's owners emitted by Debezium. A comma-separated list of key-value pairs.For example: k1=v1,k2=v2\n  openlineage.integration.dataset.kafka.bootstrap.servers : string\n      The Kafka bootstrap server address used as input/output namespace/\n  extended.headers.enabled : boolean = true\n      Enable/Disable Debezium context headers that provides essential metadata for tracking and identifying the source of CDC events in downstream processing systems.\n  guardrail.collections.max : int = 0\n      The maximum number of collections or tables that can be captured by the connector. When this limit is exceeded, the action specified by 'guardrail.collections.limit.action' will be taken. Set to 0 to disable this guardrail.\n  guardrail.collections.limit.action : string = warn\n      Specify the action to take when a guardrail collections limit is exceeded: 'warn' (the default) logs a warning message and continues processing; 'fail' stops the connector with an error.\n  custom.sanitize.pattern : string = .*secret$|.*password$|.*sasl\\.jaas\\.config$|.*basic\\.auth\\.user\\.info|.*registry\\.auth\\.client-secret\n      Regular expression identifying configuration keys whose values should be masked. When set, this custom pattern replaces Debezium’s default password masking pattern.\n  decimal.handling.mode : string = precise\n      Specify how DECIMAL and NUMERIC columns should be represented in change events, including: 'precise' (the default) uses java.math.BigDecimal to represent values, which are encoded in the change events using a binary representation and Kafka Connect's 'org.apache.kafka.connect.data.Decimal' type; 'string' uses string to represent values; 'double' represents values using Java's 'double', which may not offer the precision but will be far easier to use in consumers.\n  time.precision.mode : string = adaptive\n      Time, date, and timestamps can be represented with different kinds of precisions, including: 'adaptive' (the default) bases the precision of time, date, and timestamp values on the database column's precision; 'adaptive_time_microseconds' like 'adaptive' mode, but TIME fields always use microseconds precision; 'connect' always represents time, date, and timestamp values using Kafka Connect's built-in representations for Time, Date, and Timestamp, which uses millisecond precision regardless of the database columns' precision.\n  snapshot.lock.timeout.ms : long = 10000\n      The maximum number of millis to wait for table locks at the beginning of a snapshot. If locks cannot be acquired in this time frame, the snapshot will be aborted. Defaults to 10 seconds\n  snapshot.mode : string = initial\n      The criteria for running a snapshot upon startup of the connector. Select one of the following snapshot options: 'always': The connector runs a snapshot every time that it starts. After the snapshot completes, the connector begins to stream changes from the transaction log.; 'initial' (default): If the connector does not detect any offsets for the logical server name, it runs a snapshot that captures the current full state of the configured tables. After the snapshot completes, the connector begins to stream changes from the transaction log. 'initial_only': The connector performs a snapshot as it does for the 'initial' option, but after the connector completes the snapshot, it stops, and does not stream changes from the transaction log.; 'never': The connector does not run a snapshot. Upon first startup, the connector immediately begins reading from the beginning of the transaction log. 'exported': This option is deprecated; use 'initial' instead.; 'custom': The connector loads a custom class  to specify how the connector performs snapshots. For more information, see Custom snapshotter SPI in the PostgreSQL connector documentation.\n  snapshot.isolation.mode : string = serializable\n      Controls which transaction isolation level is used. The default is 'serializable', which means that serializable isolation level is used. When 'repeatable_read' is specified, connector runs the initial snapshot in REPEATABLE READ isolation level. When 'read_committed' is specified, connector runs the initial snapshot in READ COMMITTED isolation level. In 'read_uncommitted' is specified, connector runs the initial snapshot in READ UNCOMMITTED isolation level.\n  snapshot.query.mode : string = select_all\n      Controls query used during the snapshot\n  snapshot.query.mode.custom.name : string\n      When 'snapshot.query.mode' is set as custom, this setting must be set to specify a the name of the custom implementation provided in the 'name()' method. The implementations must implement the 'SnapshotterQuery' interface and is called to determine how to build queries during snapshot.\n  snapshot.locking.mode.custom.name : string\n      When 'snapshot.locking.mode' is set as custom, this setting must be set to specify a the name of the custom implementation provided in the 'name()' method. The implementations must implement the 'SnapshotterLocking' interface and is called to determine how to lock tables during schema snapshot.\n  snapshot.locking.mode : string = none\n      Controls how the connector holds locks on tables while performing the schema snapshot. The 'shared' which means the connector will hold a table lock that prevents exclusive table access for just the initial portion of the snapshot while the database schemas and other metadata are being read. The remaining work in a snapshot involves selecting all rows from each table, and this is done using a flashback query that requires no locks. However, in some cases it may be desirable to avoid locks entirely which can be done by specifying 'none'. This mode is only safe to use if no schema changes are happening while the snapshot is taken.\n  hstore.handling.mode : string = json\n      Specify how HSTORE columns should be represented in change events, including: 'json' represents values as string-ified JSON (default); 'map' represents values as a key/value map\n  binary.handling.mode : string = bytes\n      Specify how binary (blob, binary, etc.) columns should be represented in change events, including: 'bytes' represents binary data as byte array (default); 'base64' represents binary data as base64-encoded string; 'base64-url-safe' represents binary data as base64-url-safe-encoded string; 'hex' represents binary data as hex-encoded (base16) string\n  schema.name.adjustment.mode : string = none\n      Specify how schema names should be adjusted for compatibility with the message converter used by the connector, including: 'avro' replaces the characters that cannot be used in the Avro type name with underscore; 'avro_unicode' replaces the underscore or characters that cannot be used in the Avro type name with corresponding unicode like _uxxxx. Note: _ is an escape sequence like backslash in Java;'none' does not apply any adjustment (default)\n  interval.handling.mode : string = numeric\n      Specify how INTERVAL columns should be represented in change events, including: 'string' represents values as an exact ISO formatted string; 'numeric' (default) represents values using the inexact conversion into microseconds\n  schema.refresh.mode : string = columns_diff\n      Specify the conditions that trigger a refresh of the in-memory schema for a table. 'columns_diff' (the default) is the safest mode, ensuring the in-memory schema stays in-sync with the database table's schema at all times. 'columns_diff_exclude_unchanged_toast' instructs the connector to refresh the in-memory schema cache if there is a discrepancy between it and the schema derived from the incoming message, unless unchanged TOASTable data fully accounts for the discrepancy. This setting can improve connector performance significantly if there are frequently-updated tables that have TOASTed data that are rarely part of these updates. However, it is possible for the in-memory schema to become outdated if TOASTable columns are dropped from the table.\n  incremental.snapshot.chunk.size : int = 1024\n      The maximum size of chunk (number of documents/rows) for incremental snapshotting\n  unavailable.value.placeholder : string = __debezium_unavailable_value\n      Specify the constant that will be provided by Debezium to indicate that the original value is a toasted value not provided by the database. If starts with 'hex:' prefix it is expected that the rest of the string represents hexadecimal encoded octets.\n  message.prefix.include.list : list\n      A comma-separated list of regular expressions that match the logical decoding message prefixes to be monitored. All prefixes are monitored by default.\n  message.prefix.exclude.list : list\n      A comma-separated list of regular expressions that match the logical decoding message prefixes to be excluded from monitoring.\n  publish.via.partition.root : boolean = false\n      A boolean that determines whether the connector should publish changes via the partition root. When true, changes are published through partition root. When false, changes are published directly.\n\n[Events]\n  converters : string\n      Optional list of custom converters that would be used instead of default ones. The converters are defined using '<converter.prefix>.type' config option and configured using options '<converter.prefix>.<option>'\n  post.processors : string\n      Optional list of post processors. The processors are defined using '<post.processor.prefix>.type' config option and configured using options '<post.processor.prefix.<option>'\n  tombstones.on.delete : boolean = true\n      Whether delete operations should be represented by a delete event and a subsequent tombstone event (true) or only by a delete event (false). Emitting the tombstone event (the default behavior) allows Kafka to completely delete all events pertaining to the given key once the source record got deleted.\n  heartbeat.interval.ms : int = 0\n      Length of an interval in milli-seconds in in which the connector periodically sends heartbeat messages to a heartbeat topic. Use 0 to disable heartbeat messages. Disabled by default.\n  heartbeat.topics.prefix : string = __debezium-heartbeat\n      The prefix that is used to name heartbeat topics.Defaults to __debezium-heartbeat.\n  signal.data.collection : list\n      The name of the data collection that is used to send signals/commands to Debezium. For multi-partition mode connectors, multiple signal data collections can be specified as a comma-separated list. Signaling is disabled when not set.\n  signal.poll.interval.ms : long = 5000\n      Interval for looking for new signals in registered channels, given in milliseconds. Defaults to 5 seconds.\n  signal.enabled.channels : list = [source]\n      List of channels names that are enabled. Source channel is enabled by default\n  topic.naming.strategy : class = class io.debezium.schema.SchemaTopicNamingStrategy\n      The name of the TopicNamingStrategy class that should be used to determine the topic name for data change, schema change, transaction, heartbeat event etc.\n  notification.enabled.channels : list\n      List of notification channels names that are enabled.\n  notification.sink.topic.name : string\n      The name of the topic for the notifications. This is required in case 'sink' is in the list of enabled channels\n  transaction.metadata.factory : class = class io.debezium.pipeline.txmetadata.DefaultTransactionMetadataFactory\n      Class to make transaction context & transaction struct/schemas\n  custom.metric.tags : list\n      The custom metric tags will accept key-value pairs to customize the MBean object name which should be appended the end of regular name, each key would represent a tag for the MBean object name, and the corresponding value would be the value of that tag the key is. For example: k1=v1,k2=v2\n  column.include.list : list\n      Regular expressions matching columns to include in change events\n  column.exclude.list : list\n      Regular expressions matching columns to exclude from change events\n  table.include.list : list\n      The tables for which changes are to be captured\n  table.exclude.list : list\n      A comma-separated list of regular expressions that match the fully-qualified names of tables to be excluded from monitoring\n  table.ignore.builtin : boolean = true\n      Flag specifying whether built-in tables should be ignored.\n  schema.include.list : list\n      The schemas for which events should be captured\n  schema.exclude.list : list\n      The schemas for which events must not be captured\n  message.key.columns : string\n      A semicolon-separated list of expressions that match fully-qualified tables and column(s) to be used as message key. Each expression must match the pattern '<fully-qualified table name>:<key columns>', where the table names could be defined as (DB_NAME.TABLE_NAME) or (SCHEMA_NAME.TABLE_NAME), depending on the specific connector, and the key columns are a comma-separated list of columns representing the custom key. For any table without an explicit key configuration the table's primary key column(s) will be used as message key. Example: dbserver1.inventory.orderlines:orderId,orderLineId;dbserver1.inventory.orders:id\n  snapshot.select.statement.overrides : string\n       This property contains a comma-separated list of fully-qualified tables (DB_NAME.TABLE_NAME) or (SCHEMA_NAME.TABLE_NAME), depending on the specific connectors. Select statements for the individual tables are specified in further configuration properties, one for each table, identified by the id 'snapshot.select.statement.overrides.[DB_NAME].[TABLE_NAME]' or 'snapshot.select.statement.overrides.[SCHEMA_NAME].[TABLE_NAME]', respectively. The value of those properties is the select statement to use when retrieving data from the specific table during snapshotting. A possible use case for large append-only tables is setting a specific point where to start (resume) snapshotting, in case a previous snapshotting was interrupted.\n  column.mask.hash.([^.]+).with.salt.(.+) : string\n      A comma-separated list of regular expressions matching fully-qualified names of columns that should be masked by hashing the input. Using the specified hash algorithms and salt.\n  column.mask.with.(d+).chars : string\n      A comma-separated list of regular expressions matching fully-qualified names of columns that should be masked with configured amount of asterisk ('*') characters.\n  column.truncate.to.(d+).chars : int\n      A comma-separated list of regular expressions matching fully-qualified names of columns that should be truncated to the configured amount of characters.\n  include.schema.comments : boolean = false\n      Whether the connector parse table and column's comment to metadata object. Note: Enable this option will bring the implications on memory usage. The number and size of ColumnImpl objects is what largely impacts how much memory is consumed by the Debezium connectors, and adding a String to each of them can potentially be quite heavy. The default is 'false'.\n  column.propagate.source.type : list\n      A comma-separated list of regular expressions matching fully-qualified names of columns that adds the column’s original type and original length as parameters to the corresponding field schemas in the emitted change records.\n  datatype.propagate.source.type : list\n      A comma-separated list of regular expressions matching the database-specific data type names that adds the data type's original type and original length as parameters to the corresponding field schemas in the emitted change records.\n  internal.snapshot.scan.all.columns.force : boolean = false\n      Restore pre 1.5 behaviour and scan all tables to discover columns. If you are excluding one table then turning this on may improve performance. If you are excluding a lot of tables the default behavior should work well.\n  snapshot.tables.order.by.row.count : string = disabled\n      Controls the order in which tables are processed in the initial snapshot. A `descending` value will order the tables by row count descending. A `ascending` value will order the tables by row count ascending. A value of `disabled` (the default) will disable ordering by row count.\n  heartbeat.action.query : string\n      The query executed with every heartbeat.\n  include.unknown.datatypes : boolean = false\n      Specify whether the fields of data type not supported by Debezium should be processed: 'false' (the default) omits the fields; 'true' converts the field into an implementation dependent binary representation.\n  sourceinfo.struct.maker : class = class io.debezium.connector.postgresql.PostgresSourceInfoStructMaker\n      The name of the SourceInfoStructMaker class that returns SourceInfo schema and struct.\n\n[General]\n  internal.slot.seek.to.known.offset.on.start : boolean = false\n      (Deprecated) Whether or not to seek to the last known offset on the replication slot. Use 'offset.mismatch.strategy' instead. A value of 'true' maps to 'trust_offset' strategy, 'false' maps to 'no_validation' strategy.\n  offset.mismatch.strategy : string = no_validation\n      Determines behavior when the connector's stored offset LSN differs from the replication slot's confirmed LSN. 'no_validation' (default) uses offset without validation, may fail if WAL unavailable; 'trust_offset' validates and advances slot to offset, detects slot recreation (prevents data loss when slot can't be trusted); 'trust_slot' slot is authoritative, advances offset to slot. (recommended when slot is durable, even through primary-replica failover); 'trust_greater_lsn' uses max(offset, slot) for automatic self-healing in either direction.\n  internal.create.slot.command.timeout : long = 90\n      The timeout in seconds for the creation of the replication slot.\n  money.fraction.digits : short\n      Number of fractional digits when money type is converted to 'precise' decimal number.\n  read.only : boolean = false\n      Switched connector to use alternative methods to deliver signals to Debezium instead of writing to signaling table\n  database.include.list : list\n      The databases for which changes are to be captured\n  database.exclude.list : list\n      A comma-separated list of regular expressions that match database names to be excluded from monitoring\n  include.schema.changes : boolean = true\n      Whether the connector should publish changes in the database schema to a Kafka topic with the same name as the database server ID. Each schema change will be recorded using a key that contains the database name and whose value include logical description of the new schema and optionally the DDL statement(s). The default is 'true'. This is independent of how the connector internally records database schema history.\n  incremental.snapshot.allow.schema.changes : boolean = false\n      Detect schema change during an incremental snapshot and re-select a current chunk to avoid locking DDLs. Note that changes to a primary key are not supported and can cause incorrect results if performed during an incremental snapshot. Another limitation is that if a schema change affects only columns' default values, then the change won't be detected until the DDL is processed from the binlog stream. This doesn't affect the snapshot events' values, but the schema of snapshot events may have outdated defaults.\n  skip.messages.without.change : boolean = false\n      Enable to skip publishing messages when there is no change in included columns.This would essentially filter messages to be sent when there is no change in columns included as per column.include.list/column.exclude.list.For Postgres - this would require REPLICA IDENTITY of table to be FULL.\n  field.name.adjustment.mode : string = none\n      Specify how field names should be adjusted for compatibility with the message converter used by the connector, including: 'avro' replaces the characters that cannot be used in the Avro type name with underscore; 'avro_unicode' replaces the underscore or characters that cannot be used in the Avro type name with corresponding unicode like _uxxxx. Note: _ is an escape sequence like backslash in Java;'none' does not apply any adjustment (default)\n  internal.custom.retriable.exception : string\n      Provide a temporary workaround for an error that should be retriable. If set a stacktrace of non-retriable exception is traversed and messages are matched against this regular expression. If matched the error is changed to retriable.\n  event.converting.failure.handling.mode : string = warn\n      Specify how failures during converting of event should be handled, including: 'fail' throw an exception that the column of event conversion is failed with unmatched schema type, causing the connector to be stopped. it could need schema recovery to covert successfully; 'warn' (the default) the value of column of event that conversion failed will be null and be logged with warn level; 'skip' the value of column of event that conversion failed will be null and be logged with debug level.", "--help-pg-tqe-docker-helm": "# ========== Runbook: helm deploy of preset pg-tqe-docker ==========\n# Deploys the CDC worker into k8s. DBs/queue are assumed to already run somewhere the\n# cluster can reach — this only brings up the worker pointed at them.\n#\n# --- 0. TQE cluster (separate `tqe` helm chart, appVersion 3.5.0) ---\n# SKIP THIS STEP if you already have a TQE cluster running in the namespace — just\n# point the worker's target below at your existing gRPC services. Only run it to\n# stand up a fresh cluster.\n# Download the chart bundle from the Tarantool customer zone and unpack it — it\n# extracts into a ./tqe dir with the tarantool + etcd sub-charts already vendored\n# under tqe/charts (no `git submodule` step needed):\n#   https://www.tarantool.io/en/accounts/customer_zone/packages/helm/helm-chart-tqe/helm-chart-tqe-3.5.0.tar.gz\n# curl -fSL -o helm-chart-tqe-3.5.0.tar.gz <url-above> && tar xf helm-chart-tqe-3.5.0.tar.gz\n# It brings up etcd + tarantool router/storage + gRPC api (producer/consumer/pubsub).\n#\n# The TQE image (message-queue-ee:v3.5.0) ships in the customer zone too\n#   https://www.tarantool.io/en/accounts/customer_zone/packages/message-queue-ee/release/linux/x86_64/v3.5.0/docker-message-queue-ee-v3.5.0.tar.gz\n# but it is already mirrored in our gitlab registry, so just repoint the images.\n#\n# tqe-values.yaml below is MINIMAL: it only overrides what the chart's default\n# values.yaml gets wrong for us. Everything already correct by default (all\n# replica/replicaset counts already 1, autoBootstrap on, credentials client/secret,\n# router/storage roles, tag v3.5.0) is left untouched. The overrides are:\n#   - image repositories: default repos (\"message-queue-ee\", \"tt\") carry no registry,\n#     so prefix them with our gitlab registry (api pods use image.repository verbatim;\n#     tarantool pods use tarantool.image.repository).\n#   - global.securityContext (runAsNonRoot/runAsUser/fsGroup: 1000): REQUIRED. The\n#     storage pod runs non-root; without fsGroup the kubelet leaves /data owned by\n#     root and tarantool dies on its first checkpoint with \"failed to create file\n#     '.../*.snap.inprogress': Permission denied\".\n#   - storageClass (storage + etcd): default is \"\" -> PVCs hang Pending.\n#   - the cdc/offsets queues (config.roles_cfg defaults to {}): the worker's queues\n#     are not created otherwise. Helm equivalent of the local stand's queue.yml.\n#   - pubsub.replicas 2->1 and etcd.replicaCount 3->1: single-node stand.\n#   - etcdDiscovery on so producer/consumer find the cluster topology from etcd.\n#   - metrics_export on so storage exposes prometheus /metrics (tnt_space_len),\n#     which the pg->tqe verify step below scrapes to confirm rows reached the queue.\nTQE_CHART=./tqe\ncat > tqe-values.yaml <<'EOF'\nglobal:\n  imagePullSecrets:\n    - name: registry-gitlab\n  securityContext:                             # inherited by every pod incl. storage\n    runAsNonRoot: true\n    runAsUser: 1000\n    fsGroup: 1000                              # kubelet chowns the PVC -> tarantool can write /data\n\nimage:                                         # api pods (producer/consumer/pubsub)\n  repository: registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/message-queue-ee\n\npubsub:\n  replicas: 1\n\netcdDiscovery:\n  enabled: true\n\ntarantool:\n  image:                                       # router/storage pods\n    repository: registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/message-queue-ee\n  metrics_export:\n    enabled: true                              # exposes prometheus /metrics on :8081 (tnt_space_len etc.)\n  autoBootstrap:\n    image:\n      repository: registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/tt\n  storage:\n    persistence:\n      storageClassName: <your-sc>              # `kubectl get storageclass`\n  config:\n    roles_cfg:\n      roles.tqe-storage:\n        queues:\n        - name: cdc                            # the data queue the worker reads/writes\n        - name: offsets                        # only used under the offset-tqe profile\n          deduplication_mode: keep_latest\n  etcd:\n    replicaCount: 1\n    image:\n      registry: \"gitlab.corp.mail.ru:443/tarantool/dependency_proxy/containers\"\n    persistence:\n      storageClass: <your-sc>\nEOF\nhelm --namespace transfer install tqe \"$TQE_CHART\" -f tqe-values.yaml\nkubectl -n transfer rollout status statefulset -l app.kubernetes.io/name=tarantool --timeout=180s\n# gRPC services created (release name 'tqe'), all on port 18182:\n#   tqe-tqe-api-producer     <- sink writes here (Producer)\n#   tqe-tqe-api-consumer-0   <- source reads here (Consumer)\n#   tqe-tqe-api-pubsub       <- pub/sub hybrid\n#\n# The chart ships in the CDC delivery bundle (helm-chart-cdc-*.tar.gz next to the image);\n# unpack it — it extracts into a ./cdc dir — and point CHART there. From a repo checkout\n# it is k8s/helm-chart-cdc. Values are inlined below.\n\nCHART=./cdc   # unpacked from the delivery bundle's helm-chart-cdc-*.tar.gz\n\ncat > cdc-values.yaml <<'EOF'\n# These addresses point at the source/sink stood up above (pg VMs by their cdc_net\n# IP, TQE by its in-cluster gRPC service). The root.* blocks feed the\n# application-<profile>.yml placeholders (pg.source.*, pg.sink.*, tqe.source.*,\n# tqe.sink.*), same as the --pg.source.host=... CLI overrides do locally.\nsources:\n  postgresql:\n    common:\n      root:\n        pg:\n          source:\n            host: postgresql-sourcedb-vm.cdc.local\n            port: \"5432\"\n            user: iot\n            password: iot\n            dbname: iot\n            tables: public.User,public.debezium_signal\nsinks:\n  tarantool-queue:\n    common:\n      root:\n        tqe:\n          sink:\n            # gRPC Producer service of the TQE release. Change host/namespace if your\n            # release name is not 'tqe' or it lives outside the 'transfer' namespace.\n            target: tqe-tqe-api-producer.transfer.svc:18182   # TQE Producer gRPC (release 'tqe')\n            queue: cdc                        # queue the worker writes to (change to your queue name)\n\nglobal:\n  imagePullSecrets:\n    - name: registry-gitlab\nimage:\n  # cdc-worker-all bundles every connector (pg + tqe); the pg-preset-only image does\n  # not carry the TQE connectors, so use the full image for tqe flows. The registry\n  # below is our internal gitlab mirror — repoint it at your own registry if you pull\n  # the image from elsewhere. The tag is an example: pick a published one from the\n  # registry / releases (1.0.0-SNAPSHOT is only a local build, not in the registry).\n  repository: registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/cdc-worker-all\n  tag: 1.0.0-SNAPSHOT\n  pullPolicy: IfNotPresent\n\nflow:\n  - source: postgresql\n    sink: tarantool-queue\n    resources:\n      requests: { cpu: 1500m, memory: 1Gi }\n      limits: { cpu: 2, memory: 3Gi }\n    env:\n      JAVA_OPTS: -XX:MaxDirectMemorySize=256M\n      PRESET: pg-tqe-docker-docker\nEOF\n\nhelm --namespace transfer install cdc \"$CHART\" -f cdc-values.yaml\n\n# --- Verify ---\nkubectl -n transfer rollout status deploy -l app.kubernetes.io/instance=cdc --timeout=120s\nkubectl -n transfer logs -l app.kubernetes.io/instance=cdc --tail=50 -f\n# The worker exposes actuator/prometheus on port 8000 in the pod; port-forward to check:\n#   kubectl -n transfer port-forward deploy/cdc 8000:8000 &\n#   curl -s localhost:8000/actuator/health\n# ========================================", "--help-pg-tqe-docker-helm --simple": "# The chart ships in the CDC delivery bundle (helm-chart-cdc-*.tar.gz next to the image);\n# unpack it — it extracts into a ./cdc dir — and point CHART there. From a repo checkout\n# it is k8s/helm-chart-cdc. Values are inlined below.\n\nCHART=./cdc   # unpacked from the delivery bundle's helm-chart-cdc-*.tar.gz\n\ncat > cdc-values.yaml <<'EOF'\n# These addresses point at the source/sink stood up above (pg VMs by their cdc_net\n# IP, TQE by its in-cluster gRPC service). The root.* blocks feed the\n# application-<profile>.yml placeholders (pg.source.*, pg.sink.*, tqe.source.*,\n# tqe.sink.*), same as the --pg.source.host=... CLI overrides do locally.\nsources:\n  postgresql:\n    common:\n      root:\n        pg:\n          source:\n            host: postgresql-sourcedb-vm.cdc.local\n            port: \"5432\"\n            user: iot\n            password: iot\n            dbname: iot\n            tables: public.User,public.debezium_signal\nsinks:\n  tarantool-queue:\n    common:\n      root:\n        tqe:\n          sink:\n            # gRPC Producer service of the TQE release. Change host/namespace if your\n            # release name is not 'tqe' or it lives outside the 'transfer' namespace.\n            target: tqe-tqe-api-producer.transfer.svc:18182   # TQE Producer gRPC (release 'tqe')\n            queue: cdc                        # queue the worker writes to (change to your queue name)\n\nglobal:\n  imagePullSecrets:\n    - name: registry-gitlab\nimage:\n  # cdc-worker-all bundles every connector (pg + tqe); the pg-preset-only image does\n  # not carry the TQE connectors, so use the full image for tqe flows. The registry\n  # below is our internal gitlab mirror — repoint it at your own registry if you pull\n  # the image from elsewhere. The tag is an example: pick a published one from the\n  # registry / releases (1.0.0-SNAPSHOT is only a local build, not in the registry).\n  repository: registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/cdc-worker-all\n  tag: 1.0.0-SNAPSHOT\n  pullPolicy: IfNotPresent\n\nflow:\n  - source: postgresql\n    sink: tarantool-queue\n    resources:\n      requests: { cpu: 1500m, memory: 1Gi }\n      limits: { cpu: 2, memory: 3Gi }\n    env:\n      JAVA_OPTS: -XX:MaxDirectMemorySize=256M\n      PRESET: pg-tqe-docker-docker\nEOF\n\nhelm --namespace transfer install cdc \"$CHART\" -f cdc-values.yaml", "--help-pg-tqe-docker": "# ========== Runbook: preset pg-tqe-docker ==========\n# Copy-paste to stand the stack up from scratch (bare docker/psql, no make).\n# The worker container tag below is an example — use your published tag.\n\n# --- 1. Docker network ---\ndocker network create stand-net 2>/dev/null || true\n\n# --- 2. Monitoring: Prometheus + Grafana (replaces `make monitoring-up`) ---\n# Prometheus config: scrape the worker's actuator endpoint. Two targets: 8000 for a\n# single worker, 8001 for a second one (the pg->tqe->pg pipeline runs two workers,\n# the tqe->pg side moved to 8001). A down target is simply skipped, so listing both\n# is harmless when you run only one worker.\nmkdir -p /tmp/cdc-mon/grafana-ds\ncat > /tmp/cdc-mon/prometheus.yml <<'EOF'\nglobal:\n  scrape_interval: 5s\n  evaluation_interval: 5s\nscrape_configs:\n  - job_name: \"cdc-worker\"\n    metrics_path: \"actuator/prometheus\"\n    static_configs:\n      - targets: [\"host.docker.internal:8000\", \"host.docker.internal:8001\"]\nEOF\n\n# Grafana datasource pointing at the Prometheus container.\ncat > /tmp/cdc-mon/grafana-ds/datasource.yml <<'EOF'\napiVersion: 1\ndatasources:\n  - name: Prometheus\n    type: prometheus\n    access: proxy\n    url: http://prometheus:9090\nEOF\n\ndocker run -d --rm --name prometheus \\\n    --network stand-net -p 9090:9090 \\\n    --add-host host.docker.internal:host-gateway \\\n    -v /tmp/cdc-mon/prometheus.yml:/etc/prometheus/prometheus.yml \\\n    prom/prometheus:v2.54.1\n\ndocker run -d --rm --name grafana \\\n    --network stand-net -p 3000:3000 \\\n    -e GF_AUTH_ANONYMOUS_ENABLED=true \\\n    -e GF_AUTH_ANONYMOUS_ORG_ROLE=Admin \\\n    -e GF_AUTH_BASIC_ENABLED=false \\\n    -v /tmp/cdc-mon/grafana-ds:/etc/grafana/provisioning/datasources \\\n    grafana/grafana:11.6.9\n# Grafana UI: http://localhost:3000  (Prometheus datasource is pre-wired).\n# Import dashboards from the repo: stands/local/monitoring/grafana/dashboard/*.json\n\n# --- 3. TQE cluster: api + storage master/replica (replaces the tqe compose) ---\nmkdir -p /tmp/cdc-tqe\ncat > /tmp/cdc-tqe/queue.yml <<'EOF'\ncredentials:\n  users:\n    user: { password: pass, roles: [ super ] }\n    replicator: { password: 'secret', roles: [ replication ] }\n    storage: { password: storage, roles: [ sharding ] }\nmemtx: { memory: 2147483648 }\niproto:\n  readahead: 41943040\n  advertise:\n    peer: { login: replicator }\n    sharding: { login: storage, password: storage }\nsharding: { bucket_count: 1000, rebalancer_mode: off }\nroles_cfg:\n  roles.metrics-export:\n    http:\n    - listen: 8081\n      endpoints:\n      - { format: prometheus, path: '/metrics' }\n  roles.tqe-storage:\n    queues:\n    - name: cdc\n      disabled_filters_by: [routing_key, sharding_key]\n      retention: { length: 50000, time: 0, policy: cleanup, options: { atomic_iteration: true } }\n    - name: cdc_public_User\n      disabled_filters_by: [routing_key, sharding_key]\n    - name: offsets\n      deduplication_mode: keep_latest\n      disabled_filters_by: [sharding_key]\n    - name: schema\n      deduplication_mode: keep_latest\n      disabled_filters_by: [sharding_key]\ngroups:\n  core:\n    replicasets:\n      storage:\n        replication: { failover: 'manual' }\n        sharding: { roles: [storage, router] }\n        roles: [ roles.metrics-export, roles.tqe-router, roles.tqe-storage ]\n        leader: tqe-storage-master\n        instances:\n          tqe-storage-master:\n            iproto: { listen: [ { uri: tqe-storage-master:3301 } ] }\n          tqe-storage-replica:\n            iproto: { listen: [ { uri: tqe-storage-replica:3301 } ] }\nEOF\n\ncat > /tmp/cdc-tqe/api.yml <<'EOF'\napp_name: MESSAGE_QUEUE_EE_API\ncore_host: 0.0.0.0\ncore_port: 18184\ngrpc_listen:\n- uri: 'tcp://0.0.0.0:18182'\ngrpc_options: { reflection_enabled: true }\nlog: { level: info }\nproducer:\n  enabled: true\n  local_routing: true\n  tarantool:\n    user: user\n    pass: pass\n    connections: { routers: [ tqe-storage-master:3301 ] }\nconsumer:\n  enabled: true\n  polling_timeout: 500ms\n  tarantool:\n    user: user\n    pass: pass\n    connections:\n      storages: [ tqe-storage-master:3301, tqe-storage-replica:3301 ]\nEOF\n\nTQE_IMG=registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/message-queue-ee:v3.5.0\ndocker run -d --rm --name tqe-storage-master --network stand-net \\\n    -e AUTO_BOOTSTRAP=true -e TARANTOOL_ADVERTISE_URI=tqe-storage-master \\\n    -e TARANTOOL_INSTANCE_NAME=tqe-storage-master -e TARANTOOL_WORKDIR=/var/lib/tarantool \\\n    -p 8481:8081 -v /tmp/cdc-tqe/queue.yml:/message-queue-ee/config.yml \\\n    \"$TQE_IMG\" tarantool --name tqe-storage-master --config config.yml\n\ndocker run -d --rm --name tqe-storage-replica --network stand-net \\\n    -e TARANTOOL_ADVERTISE_URI=tqe-storage-replica \\\n    -e TARANTOOL_INSTANCE_NAME=tqe-storage-replica -e TARANTOOL_WORKDIR=/var/lib/tarantool \\\n    -p 8482:8081 -v /tmp/cdc-tqe/queue.yml:/message-queue-ee/config.yml \\\n    \"$TQE_IMG\" tarantool --name tqe-storage-replica --config config.yml\n\ndocker run -d --rm --name tqe-api --network stand-net \\\n    -p 18184:18184 -p 18182:18182 \\\n    -v /tmp/cdc-tqe/api.yml:/message-queue-ee/config/grpc.config.yml \\\n    \"$TQE_IMG\" ./message-queue-ee -config=config/grpc.config.yml\n# Wait until the api gRPC port answers before starting the worker:\n#   until nc -z localhost 18182; do sleep 1; done\n\n# --- 4. Source Postgres (logical WAL, port 5433) ---\ndocker run -d --rm --name source-postgres \\\n    --network stand-net -p 5433:5432 \\\n    -e POSTGRES_HOST_AUTH_METHOD=trust \\\n    postgres:16.4 \\\n    postgres -c wal_level=logical -c max_connections=500\n\n# --- 5. CDC Worker (pg -> TQE queue 'cdc') ---\n# The image tag below is an example (1.0.0-SNAPSHOT is a local build). To run a\n# released/dev build instead, swap it for a published tag from the registry, e.g.\n# cdc-worker-all:0.12.0 — see the registry / releases for available tags.\ndocker run --rm -p 8000:8000 --network stand-net \\\n    cdc-worker-all:1.0.0-SNAPSHOT \\\n    --preset=pg-tqe-docker --profile=pg-source-table-user\n\n# --- 6. Create the source table & insert sample rows ---\npsql -h localhost -p 5433 -U postgres -d postgres <<'EOF'\nCREATE TABLE \"User\" (\n    \"id\" BIGINT PRIMARY KEY,\n    \"name\" VARCHAR(128) NOT NULL,\n    \"gender\" VARCHAR(100) NOT NULL,\n    \"birthDate\" DATE NOT NULL\n);\nINSERT INTO \"User\" (\"id\",\"name\",\"gender\",\"birthDate\") VALUES\n  (1,'Alice','female','1990-03-15'),\n  (2,'Bob','male','1985-11-02'),\n  (3,'Carol','female','2000-06-21');\nEOF\n\n# --- 7. Verify rows landed in the TQE queue ---\n# tnt_space_len on a storage node reports the queue length per space. After the inserts\n# above the queue 'cdc' (and cdc_public_User) should be non-zero.\ncurl -s localhost:8481/metrics | grep tnt_space_len\n# Prometheus also scrapes it if monitoring is up:\n#   http://localhost:9090/graph?g0.expr=tnt_space_len\n\n# --- 8. (optional) Load generator: upsert the same rows in a loop ---\n# 500 rows x 400 batches = 200k UPDATE events, in batches of 500 with a 0.3s pause.\npsql -h localhost -p 5433 -U postgres -d postgres <<'EOF'\nDO $$\nDECLARE\n  key_space CONSTANT int := 500;   -- how many unique ids to cycle (id 1..500)\n  batches   CONSTANT int := 400;   -- how many batches to run\nBEGIN\n  FOR b IN 1..batches LOOP\n    INSERT INTO \"User\" (\"id\",\"name\",\"gender\",\"birthDate\")\n    SELECT g,\n           'Artyom_' || b,          -- vary the value so each upsert is a real UPDATE\n           'male',\n           DATE '1990-01-01'\n    FROM generate_series(1, key_space) AS g\n    ON CONFLICT (\"id\") DO UPDATE\n      SET \"name\" = EXCLUDED.\"name\";\n    COMMIT;\n    PERFORM pg_sleep(0.3);\n  END LOOP;\nEND $$;\nEOF\n\n# ========================================", "--help-pg-tqe-docker --simple": "# The image tag below is an example (1.0.0-SNAPSHOT is a local build). To run a\n# released/dev build instead, swap it for a published tag from the registry, e.g.\n# cdc-worker-all:0.12.0 — see the registry / releases for available tags.\ndocker run --rm -p 8000:8000 --network stand-net \\\n    cdc-worker-all:1.0.0-SNAPSHOT \\\n    --preset=pg-tqe-docker --profile=pg-source-table-user", "--help-pg-tqe-local-helm": "# ========== Runbook: helm deploy of preset pg-tqe-local ==========\n# Deploys the CDC worker into k8s. DBs/queue are assumed to already run somewhere the\n# cluster can reach — this only brings up the worker pointed at them.\n#\n# --- 0. TQE cluster (separate `tqe` helm chart, appVersion 3.5.0) ---\n# SKIP THIS STEP if you already have a TQE cluster running in the namespace — just\n# point the worker's target below at your existing gRPC services. Only run it to\n# stand up a fresh cluster.\n# Download the chart bundle from the Tarantool customer zone and unpack it — it\n# extracts into a ./tqe dir with the tarantool + etcd sub-charts already vendored\n# under tqe/charts (no `git submodule` step needed):\n#   https://www.tarantool.io/en/accounts/customer_zone/packages/helm/helm-chart-tqe/helm-chart-tqe-3.5.0.tar.gz\n# curl -fSL -o helm-chart-tqe-3.5.0.tar.gz <url-above> && tar xf helm-chart-tqe-3.5.0.tar.gz\n# It brings up etcd + tarantool router/storage + gRPC api (producer/consumer/pubsub).\n#\n# The TQE image (message-queue-ee:v3.5.0) ships in the customer zone too\n#   https://www.tarantool.io/en/accounts/customer_zone/packages/message-queue-ee/release/linux/x86_64/v3.5.0/docker-message-queue-ee-v3.5.0.tar.gz\n# but it is already mirrored in our gitlab registry, so just repoint the images.\n#\n# tqe-values.yaml below is MINIMAL: it only overrides what the chart's default\n# values.yaml gets wrong for us. Everything already correct by default (all\n# replica/replicaset counts already 1, autoBootstrap on, credentials client/secret,\n# router/storage roles, tag v3.5.0) is left untouched. The overrides are:\n#   - image repositories: default repos (\"message-queue-ee\", \"tt\") carry no registry,\n#     so prefix them with our gitlab registry (api pods use image.repository verbatim;\n#     tarantool pods use tarantool.image.repository).\n#   - global.securityContext (runAsNonRoot/runAsUser/fsGroup: 1000): REQUIRED. The\n#     storage pod runs non-root; without fsGroup the kubelet leaves /data owned by\n#     root and tarantool dies on its first checkpoint with \"failed to create file\n#     '.../*.snap.inprogress': Permission denied\".\n#   - storageClass (storage + etcd): default is \"\" -> PVCs hang Pending.\n#   - the cdc/offsets queues (config.roles_cfg defaults to {}): the worker's queues\n#     are not created otherwise. Helm equivalent of the local stand's queue.yml.\n#   - pubsub.replicas 2->1 and etcd.replicaCount 3->1: single-node stand.\n#   - etcdDiscovery on so producer/consumer find the cluster topology from etcd.\n#   - metrics_export on so storage exposes prometheus /metrics (tnt_space_len),\n#     which the pg->tqe verify step below scrapes to confirm rows reached the queue.\nTQE_CHART=./tqe\ncat > tqe-values.yaml <<'EOF'\nglobal:\n  imagePullSecrets:\n    - name: registry-gitlab\n  securityContext:                             # inherited by every pod incl. storage\n    runAsNonRoot: true\n    runAsUser: 1000\n    fsGroup: 1000                              # kubelet chowns the PVC -> tarantool can write /data\n\nimage:                                         # api pods (producer/consumer/pubsub)\n  repository: registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/message-queue-ee\n\npubsub:\n  replicas: 1\n\netcdDiscovery:\n  enabled: true\n\ntarantool:\n  image:                                       # router/storage pods\n    repository: registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/message-queue-ee\n  metrics_export:\n    enabled: true                              # exposes prometheus /metrics on :8081 (tnt_space_len etc.)\n  autoBootstrap:\n    image:\n      repository: registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/tt\n  storage:\n    persistence:\n      storageClassName: <your-sc>              # `kubectl get storageclass`\n  config:\n    roles_cfg:\n      roles.tqe-storage:\n        queues:\n        - name: cdc                            # the data queue the worker reads/writes\n        - name: offsets                        # only used under the offset-tqe profile\n          deduplication_mode: keep_latest\n  etcd:\n    replicaCount: 1\n    image:\n      registry: \"gitlab.corp.mail.ru:443/tarantool/dependency_proxy/containers\"\n    persistence:\n      storageClass: <your-sc>\nEOF\nhelm --namespace transfer install tqe \"$TQE_CHART\" -f tqe-values.yaml\nkubectl -n transfer rollout status statefulset -l app.kubernetes.io/name=tarantool --timeout=180s\n# gRPC services created (release name 'tqe'), all on port 18182:\n#   tqe-tqe-api-producer     <- sink writes here (Producer)\n#   tqe-tqe-api-consumer-0   <- source reads here (Consumer)\n#   tqe-tqe-api-pubsub       <- pub/sub hybrid\n#\n# The chart ships in the CDC delivery bundle (helm-chart-cdc-*.tar.gz next to the image);\n# unpack it — it extracts into a ./cdc dir — and point CHART there. From a repo checkout\n# it is k8s/helm-chart-cdc. Values are inlined below.\n\nCHART=./cdc   # unpacked from the delivery bundle's helm-chart-cdc-*.tar.gz\n\ncat > cdc-values.yaml <<'EOF'\n# These addresses point at the source/sink stood up above (pg VMs by their cdc_net\n# IP, TQE by its in-cluster gRPC service). The root.* blocks feed the\n# application-<profile>.yml placeholders (pg.source.*, pg.sink.*, tqe.source.*,\n# tqe.sink.*), same as the --pg.source.host=... CLI overrides do locally.\nsources:\n  postgresql:\n    common:\n      root:\n        pg:\n          source:\n            host: postgresql-sourcedb-vm.cdc.local\n            port: \"5432\"\n            user: iot\n            password: iot\n            dbname: iot\n            tables: public.User,public.debezium_signal\nsinks:\n  tarantool-queue:\n    common:\n      root:\n        tqe:\n          sink:\n            # gRPC Producer service of the TQE release. Change host/namespace if your\n            # release name is not 'tqe' or it lives outside the 'transfer' namespace.\n            target: tqe-tqe-api-producer.transfer.svc:18182   # TQE Producer gRPC (release 'tqe')\n            queue: cdc                        # queue the worker writes to (change to your queue name)\n\nglobal:\n  imagePullSecrets:\n    - name: registry-gitlab\nimage:\n  # cdc-worker-all bundles every connector (pg + tqe); the pg-preset-only image does\n  # not carry the TQE connectors, so use the full image for tqe flows. The registry\n  # below is our internal gitlab mirror — repoint it at your own registry if you pull\n  # the image from elsewhere. The tag is an example: pick a published one from the\n  # registry / releases (1.0.0-SNAPSHOT is only a local build, not in the registry).\n  repository: registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/cdc-worker-all\n  tag: 1.0.0-SNAPSHOT\n  pullPolicy: IfNotPresent\n\nflow:\n  - source: postgresql\n    sink: tarantool-queue\n    resources:\n      requests: { cpu: 1500m, memory: 1Gi }\n      limits: { cpu: 2, memory: 3Gi }\n    env:\n      JAVA_OPTS: -XX:MaxDirectMemorySize=256M\n      PRESET: pg-tqe-local-docker\nEOF\n\nhelm --namespace transfer install cdc \"$CHART\" -f cdc-values.yaml\n\n# --- Verify ---\nkubectl -n transfer rollout status deploy -l app.kubernetes.io/instance=cdc --timeout=120s\nkubectl -n transfer logs -l app.kubernetes.io/instance=cdc --tail=50 -f\n# The worker exposes actuator/prometheus on port 8000 in the pod; port-forward to check:\n#   kubectl -n transfer port-forward deploy/cdc 8000:8000 &\n#   curl -s localhost:8000/actuator/health\n# ========================================", "--help-pg-tqe-local-helm --simple": "# The chart ships in the CDC delivery bundle (helm-chart-cdc-*.tar.gz next to the image);\n# unpack it — it extracts into a ./cdc dir — and point CHART there. From a repo checkout\n# it is k8s/helm-chart-cdc. Values are inlined below.\n\nCHART=./cdc   # unpacked from the delivery bundle's helm-chart-cdc-*.tar.gz\n\ncat > cdc-values.yaml <<'EOF'\n# These addresses point at the source/sink stood up above (pg VMs by their cdc_net\n# IP, TQE by its in-cluster gRPC service). The root.* blocks feed the\n# application-<profile>.yml placeholders (pg.source.*, pg.sink.*, tqe.source.*,\n# tqe.sink.*), same as the --pg.source.host=... CLI overrides do locally.\nsources:\n  postgresql:\n    common:\n      root:\n        pg:\n          source:\n            host: postgresql-sourcedb-vm.cdc.local\n            port: \"5432\"\n            user: iot\n            password: iot\n            dbname: iot\n            tables: public.User,public.debezium_signal\nsinks:\n  tarantool-queue:\n    common:\n      root:\n        tqe:\n          sink:\n            # gRPC Producer service of the TQE release. Change host/namespace if your\n            # release name is not 'tqe' or it lives outside the 'transfer' namespace.\n            target: tqe-tqe-api-producer.transfer.svc:18182   # TQE Producer gRPC (release 'tqe')\n            queue: cdc                        # queue the worker writes to (change to your queue name)\n\nglobal:\n  imagePullSecrets:\n    - name: registry-gitlab\nimage:\n  # cdc-worker-all bundles every connector (pg + tqe); the pg-preset-only image does\n  # not carry the TQE connectors, so use the full image for tqe flows. The registry\n  # below is our internal gitlab mirror — repoint it at your own registry if you pull\n  # the image from elsewhere. The tag is an example: pick a published one from the\n  # registry / releases (1.0.0-SNAPSHOT is only a local build, not in the registry).\n  repository: registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/cdc-worker-all\n  tag: 1.0.0-SNAPSHOT\n  pullPolicy: IfNotPresent\n\nflow:\n  - source: postgresql\n    sink: tarantool-queue\n    resources:\n      requests: { cpu: 1500m, memory: 1Gi }\n      limits: { cpu: 2, memory: 3Gi }\n    env:\n      JAVA_OPTS: -XX:MaxDirectMemorySize=256M\n      PRESET: pg-tqe-local-docker\nEOF\n\nhelm --namespace transfer install cdc \"$CHART\" -f cdc-values.yaml", "--help-pg-tqe-local": "# ========== Runbook: preset pg-tqe-local ==========\n# Copy-paste to stand the stack up from scratch (bare docker/psql, no make).\n# The worker container tag below is an example — use your published tag.\n\n# --- 1. Docker network ---\ndocker network create stand-net 2>/dev/null || true\n\n# --- 2. Monitoring: Prometheus + Grafana (replaces `make monitoring-up`) ---\n# Prometheus config: scrape the worker's actuator endpoint. Two targets: 8000 for a\n# single worker, 8001 for a second one (the pg->tqe->pg pipeline runs two workers,\n# the tqe->pg side moved to 8001). A down target is simply skipped, so listing both\n# is harmless when you run only one worker.\nmkdir -p /tmp/cdc-mon/grafana-ds\ncat > /tmp/cdc-mon/prometheus.yml <<'EOF'\nglobal:\n  scrape_interval: 5s\n  evaluation_interval: 5s\nscrape_configs:\n  - job_name: \"cdc-worker\"\n    metrics_path: \"actuator/prometheus\"\n    static_configs:\n      - targets: [\"host.docker.internal:8000\", \"host.docker.internal:8001\"]\nEOF\n\n# Grafana datasource pointing at the Prometheus container.\ncat > /tmp/cdc-mon/grafana-ds/datasource.yml <<'EOF'\napiVersion: 1\ndatasources:\n  - name: Prometheus\n    type: prometheus\n    access: proxy\n    url: http://prometheus:9090\nEOF\n\ndocker run -d --rm --name prometheus \\\n    --network stand-net -p 9090:9090 \\\n    --add-host host.docker.internal:host-gateway \\\n    -v /tmp/cdc-mon/prometheus.yml:/etc/prometheus/prometheus.yml \\\n    prom/prometheus:v2.54.1\n\ndocker run -d --rm --name grafana \\\n    --network stand-net -p 3000:3000 \\\n    -e GF_AUTH_ANONYMOUS_ENABLED=true \\\n    -e GF_AUTH_ANONYMOUS_ORG_ROLE=Admin \\\n    -e GF_AUTH_BASIC_ENABLED=false \\\n    -v /tmp/cdc-mon/grafana-ds:/etc/grafana/provisioning/datasources \\\n    grafana/grafana:11.6.9\n# Grafana UI: http://localhost:3000  (Prometheus datasource is pre-wired).\n# Import dashboards from the repo: stands/local/monitoring/grafana/dashboard/*.json\n\n# --- 3. TQE cluster: api + storage master/replica (replaces the tqe compose) ---\nmkdir -p /tmp/cdc-tqe\ncat > /tmp/cdc-tqe/queue.yml <<'EOF'\ncredentials:\n  users:\n    user: { password: pass, roles: [ super ] }\n    replicator: { password: 'secret', roles: [ replication ] }\n    storage: { password: storage, roles: [ sharding ] }\nmemtx: { memory: 2147483648 }\niproto:\n  readahead: 41943040\n  advertise:\n    peer: { login: replicator }\n    sharding: { login: storage, password: storage }\nsharding: { bucket_count: 1000, rebalancer_mode: off }\nroles_cfg:\n  roles.metrics-export:\n    http:\n    - listen: 8081\n      endpoints:\n      - { format: prometheus, path: '/metrics' }\n  roles.tqe-storage:\n    queues:\n    - name: cdc\n      disabled_filters_by: [routing_key, sharding_key]\n      retention: { length: 50000, time: 0, policy: cleanup, options: { atomic_iteration: true } }\n    - name: cdc_public_User\n      disabled_filters_by: [routing_key, sharding_key]\n    - name: offsets\n      deduplication_mode: keep_latest\n      disabled_filters_by: [sharding_key]\n    - name: schema\n      deduplication_mode: keep_latest\n      disabled_filters_by: [sharding_key]\ngroups:\n  core:\n    replicasets:\n      storage:\n        replication: { failover: 'manual' }\n        sharding: { roles: [storage, router] }\n        roles: [ roles.metrics-export, roles.tqe-router, roles.tqe-storage ]\n        leader: tqe-storage-master\n        instances:\n          tqe-storage-master:\n            iproto: { listen: [ { uri: tqe-storage-master:3301 } ] }\n          tqe-storage-replica:\n            iproto: { listen: [ { uri: tqe-storage-replica:3301 } ] }\nEOF\n\ncat > /tmp/cdc-tqe/api.yml <<'EOF'\napp_name: MESSAGE_QUEUE_EE_API\ncore_host: 0.0.0.0\ncore_port: 18184\ngrpc_listen:\n- uri: 'tcp://0.0.0.0:18182'\ngrpc_options: { reflection_enabled: true }\nlog: { level: info }\nproducer:\n  enabled: true\n  local_routing: true\n  tarantool:\n    user: user\n    pass: pass\n    connections: { routers: [ tqe-storage-master:3301 ] }\nconsumer:\n  enabled: true\n  polling_timeout: 500ms\n  tarantool:\n    user: user\n    pass: pass\n    connections:\n      storages: [ tqe-storage-master:3301, tqe-storage-replica:3301 ]\nEOF\n\nTQE_IMG=registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/message-queue-ee:v3.5.0\ndocker run -d --rm --name tqe-storage-master --network stand-net \\\n    -e AUTO_BOOTSTRAP=true -e TARANTOOL_ADVERTISE_URI=tqe-storage-master \\\n    -e TARANTOOL_INSTANCE_NAME=tqe-storage-master -e TARANTOOL_WORKDIR=/var/lib/tarantool \\\n    -p 8481:8081 -v /tmp/cdc-tqe/queue.yml:/message-queue-ee/config.yml \\\n    \"$TQE_IMG\" tarantool --name tqe-storage-master --config config.yml\n\ndocker run -d --rm --name tqe-storage-replica --network stand-net \\\n    -e TARANTOOL_ADVERTISE_URI=tqe-storage-replica \\\n    -e TARANTOOL_INSTANCE_NAME=tqe-storage-replica -e TARANTOOL_WORKDIR=/var/lib/tarantool \\\n    -p 8482:8081 -v /tmp/cdc-tqe/queue.yml:/message-queue-ee/config.yml \\\n    \"$TQE_IMG\" tarantool --name tqe-storage-replica --config config.yml\n\ndocker run -d --rm --name tqe-api --network stand-net \\\n    -p 18184:18184 -p 18182:18182 \\\n    -v /tmp/cdc-tqe/api.yml:/message-queue-ee/config/grpc.config.yml \\\n    \"$TQE_IMG\" ./message-queue-ee -config=config/grpc.config.yml\n# Wait until the api gRPC port answers before starting the worker:\n#   until nc -z localhost 18182; do sleep 1; done\n\n# --- 4. Source Postgres (logical WAL, port 5433) ---\ndocker run -d --rm --name source-postgres \\\n    --network stand-net -p 5433:5432 \\\n    -e POSTGRES_HOST_AUTH_METHOD=trust \\\n    postgres:16.4 \\\n    postgres -c wal_level=logical -c max_connections=500\n\n# --- 5. CDC Worker (pg -> TQE queue 'cdc') ---\njava -jar cdc-worker.jar \\\n    --preset=pg-tqe-local --profile=pg-source-table-user\n\n# --- 6. Create the source table & insert sample rows ---\npsql -h localhost -p 5433 -U postgres -d postgres <<'EOF'\nCREATE TABLE \"User\" (\n    \"id\" BIGINT PRIMARY KEY,\n    \"name\" VARCHAR(128) NOT NULL,\n    \"gender\" VARCHAR(100) NOT NULL,\n    \"birthDate\" DATE NOT NULL\n);\nINSERT INTO \"User\" (\"id\",\"name\",\"gender\",\"birthDate\") VALUES\n  (1,'Alice','female','1990-03-15'),\n  (2,'Bob','male','1985-11-02'),\n  (3,'Carol','female','2000-06-21');\nEOF\n\n# --- 7. Verify rows landed in the TQE queue ---\n# tnt_space_len on a storage node reports the queue length per space. After the inserts\n# above the queue 'cdc' (and cdc_public_User) should be non-zero.\ncurl -s localhost:8481/metrics | grep tnt_space_len\n# Prometheus also scrapes it if monitoring is up:\n#   http://localhost:9090/graph?g0.expr=tnt_space_len\n\n# --- 8. (optional) Load generator: upsert the same rows in a loop ---\n# 500 rows x 400 batches = 200k UPDATE events, in batches of 500 with a 0.3s pause.\npsql -h localhost -p 5433 -U postgres -d postgres <<'EOF'\nDO $$\nDECLARE\n  key_space CONSTANT int := 500;   -- how many unique ids to cycle (id 1..500)\n  batches   CONSTANT int := 400;   -- how many batches to run\nBEGIN\n  FOR b IN 1..batches LOOP\n    INSERT INTO \"User\" (\"id\",\"name\",\"gender\",\"birthDate\")\n    SELECT g,\n           'Artyom_' || b,          -- vary the value so each upsert is a real UPDATE\n           'male',\n           DATE '1990-01-01'\n    FROM generate_series(1, key_space) AS g\n    ON CONFLICT (\"id\") DO UPDATE\n      SET \"name\" = EXCLUDED.\"name\";\n    COMMIT;\n    PERFORM pg_sleep(0.3);\n  END LOOP;\nEND $$;\nEOF\n\n# ========================================", "--help-pg-tqe-local --simple": "java -jar cdc-worker.jar \\\n    --preset=pg-tqe-local --profile=pg-source-table-user", "--help-reprocessing": "---\nid: \"0108\"\nstatus: Черновик\n---\n\n# Reprocessing: переигрывание потока (snapshot-фаза и streaming-фаза)\n\n## Статус\n\n`Черновик`\n\n## Контекст\n\n«Reprocessing» — операторская задача: заставить worker **заново прочит
