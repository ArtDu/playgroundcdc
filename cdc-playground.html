const CMDS = {"--help": "# CDC Worker\n\nCDC Worker streams changes from any source to any sink — no broker in between.\nA source can be a database (PG, Oracle, Tarantool) or a queue (TQE, Kafka); a sink\nlikewise a database (PG, TDB, Elasticsearch) or a queue. The source connector reads\nchanges as records, the worker applies transforms and tracks offsets, and the sink\nconnector writes them to the target.\n\nIt is a Spring Boot application, configured entirely through Spring's own\nmechanisms: profiles (`--profile` / `--spring.profiles.active`), property\nplaceholders resolved from CLI args (`--pg.source.host=...`) or env vars\n(`PG_SOURCE_HOST=...`), and `application-<profile>.yml` files on the classpath.\n\n```\n   Source  ──▶  [ Source Connector ]  Worker  [ Sink Connector ]  ──▶  Sink\n  (DB or       reads changes as    SMTs +      writes changes       (DB or\n   queue)          records         offsets       to target           queue)\n```\n\nConfiguration precedence (later overrides earlier — CLI wins):\n\n```\n  application.yml        external file      --spring.config.        env vars          CLI args\n  + application-        ./config/          additional-location    PG_SOURCE_        --pg.source.\n  <profile>.yml   ──▶   application.yml ──▶ =file:...        ──▶   HOST=...    ──▶   host=...\n  (in jar)                                                                         (wins)\n  low precedence  ───────────────────────────────────────────────────▶  high precedence\n```\n\nSee `--help-config` for the full loading order.\n\n## Commands\n\nEntry-point flags. Everything the worker can do is one of these:\n\n- `--help`, `-h`, `--list-profiles` — show this help\n- `--preset=<alias>` — activate a preset (expands to a profile list)\n- `--profile=a,b,c` — activate an explicit profile list\n  (alias for `--spring.profiles.active`)\n- `--show-preset=<alias>` — print profiles a preset expands to,\n  followed by contents of each `application-<name>.yml`\n- `--show-profile=<name>` — print full YAML of a profile\n- `--help-<alias>` — print a full copy-paste runbook (monitoring,\n  DBs, worker, sample SQL) to stand up that preset\n- `--help-<alias> --simple` — print only the worker start command\n- `--help-<alias>-helm` — print a `helm install` runbook to deploy the\n  worker into k8s against already-running DBs\n- `--help-<alias>-helm --simple` — print only the values file + `helm install`\n- `--generate-completion=bash|zsh` — shell completion, e.g. `eval \"$(java -jar cdc-worker.jar --generate-completion=zsh)\"`\n\n```bash\njava -jar cdc-worker.jar --preset=pg-pg-local --pg.source.port=5433\njava -jar cdc-worker.jar --profile=pg-pg,pg-source-local \\\n    --pg.source.host=localhost --pg.sink.host=localhost\njava -jar cdc-worker.jar --show-preset=pg-pg-local\njava -jar cdc-worker.jar --help-pg-pg-docker      # print a stand-up runbook\njava -jar cdc-worker.jar --help-pg-pg-helm        # print a k8s helm runbook\n```\n\n## Connectors\n\nScanned from the plugin dirs (override with `--scan-plugins`). `vk` = Tarantool CDC connector, `ext` = bundled third-party.\n\n| Type | Origin | Connector | Class |\n| ---- | ------ | --------- | ----- |\n| source | ext | `PostgresConnector` | `io.debezium.connector.postgresql.PostgresConnector` |\n| source | vk | `KafkaSourceConnector` | `io.tarantool.connector.KafkaSourceConnector` |\n| source | vk | `MockSourceConnector` | `io.tarantool.connector.MockSourceConnector` |\n| source | vk | `TarantoolConnector` | `io.tarantool.connector.TarantoolConnector` |\n| source | vk | `TQESourceConnector` | `io.tarantool.connector.source.TQESourceConnector` |\n| source | vk | `TQEv2SourceConnector` | `io.tarantool.connector.source.TQEv2SourceConnector` |\n| sink | ext | `JdbcSinkConnector` | `io.debezium.connector.jdbc.JdbcSinkConnector` |\n| sink | vk | `ElasticsearchSinkConnector` | `io.tarantool.connector.ElasticsearchSinkConnector` |\n| sink | vk | `IngestorSinkConnector` | `io.tarantool.connector.IngestorSinkConnector` |\n| sink | vk | `KafkaSinkConnector` | `io.tarantool.connector.KafkaSinkConnector` |\n| sink | vk | `MockSinkConnector` | `io.tarantool.connector.MockSinkConnector` |\n| sink | vk | `TarantoolSinkConnector` | `io.tarantool.connector.TarantoolSinkConnector` |\n| sink | vk | `TQESinkConnector` | `io.tarantool.connector.sink.TQESinkConnector` |\n| sink | vk | `TQEv2SinkConnector` | `io.tarantool.connector.sink.TQEv2SinkConnector` |\n\n## Config parameters\n\nEvery connector and the worker itself expose tunable options with defaults.\nInspect them without starting anything:\n\n- `--help-worker-params` — show CDC worker parameters\n- `--help-<connector>-params` — show a connector's parameters, e.g.\n  `--help-pg-source-params`, `--help-tnt-sink-params`\n- `--help-transforms` — list available SMT transformations and predicates\n  `[--format=human|markdown|yaml|json] [--output=<file>]`\n- `--scan-plugins=<path>` — scan all connectors in a directory\n  `[--format=human|markdown|yaml|json] [--output=<file>]`\n  (default paths: /libs/connect, plugins)\n\n```bash\njava -jar cdc-worker.jar --help-worker-params\njava -jar cdc-worker.jar --help-pg-source-params\njava -jar cdc-worker.jar --help-transforms\n```\n\n## Presets\n\nA preset is a short alias for a ready-made source→sink flow. `--preset=<alias>`\nexpands to the profile list below and adds the `offset-file` + `throttle-unlim`\ndefaults, so a whole flow starts from one flag:\n\n- `pg-pg-docker` → pg-pg, pg-source, pg-source-docker, pg-sink, pg-sink-docker _[+ offset-file, throttle-unlim]_\n- `pg-pg-local` → pg-pg, pg-source, pg-source-local, pg-sink, pg-sink-local _[+ offset-file, throttle-unlim]_\n- `pg-tqe-docker` → pg-tqe, pg-source, pg-source-docker, pg-tqe-sink, pg-tqe-sink-docker _[+ offset-file, throttle-unlim]_\n- `pg-tqe-local` → pg-tqe, pg-source, pg-source-local, pg-tqe-sink, pg-tqe-sink-local _[+ offset-file, throttle-unlim]_\n- `tqe-pg-docker` → tqe-pg, tqe-source, tqe-source-docker, pg-sink, pg-sink-docker _[+ offset-file, throttle-unlim]_\n- `tqe-pg-local` → tqe-pg, tqe-source, tqe-source-local, pg-sink, pg-sink-local _[+ offset-file, throttle-unlim]_\n\n## Profiles\n\nPresets are composed of these modular `application-<name>.yml` files on the\nclasspath. Activate them directly with `--profile=...` for flows without a preset:\n\n- `offset-file`\n- `offset-kafka`\n- `offset-tqe`\n- `offset-tqe2`\n- `ordering-by-key-tqe`\n- `ordering-single-source`\n- `ordering-strict-tqe`\n- `pg-pg`\n- `pg-sink`\n- `pg-sink-docker`\n- `pg-sink-local`\n- `pg-source`\n- `pg-source-docker`\n- `pg-source-local`\n- `pg-source-table-user`\n- `pg-tqe`\n- `pg-tqe-sink`\n- `pg-tqe-sink-docker`\n- `pg-tqe-sink-local`\n- `snapshot-incremental`\n- `snapshot-initial`\n- `snapshot-initial-only`\n- `snapshot-none`\n- `throttle-unlim`\n- `tqe-pg`\n- `tqe-source`\n- `tqe-source-docker`\n- `tqe-source-local`\n\nTwo defaults are added automatically unless overridden:\n\n- `offset-file` — added unless any `offset-*` profile is requested\n- `throttle-unlim` — added unless any `throttle-*` profile is requested\n\n## Runbooks\n\n`--help-<alias>[-helm]` prints a full copy-paste shell script that stands a preset\nup from scratch (monitoring, DBs, worker, sample SQL) — no repo checkout needed:\n\n- `--help-pg-pg-docker` — bare docker/psql stand-up\n- `--help-pg-pg-local` — bare docker/psql stand-up\n- `--help-pg-tqe-docker` — bare docker/psql stand-up\n- `--help-pg-tqe-local` — bare docker/psql stand-up\n- `--help-tqe-pg-docker` — bare docker/psql stand-up\n- `--help-tqe-pg-local` — bare docker/psql stand-up\n- `--help-pg-pg-helm` — k8s deploy via `helm install`\n- `--help-pg-tqe-helm` — k8s deploy via `helm install`\n- `--help-tqe-pg-helm` — k8s deploy via `helm install`\n\nAdd `--simple` to any of these to print only the worker start command\n(or, for `-helm`, only the values file + `helm install`) — no DBs, no monitoring.\n\n`--help-transactions` — prints the ADR on end-to-end transaction / delivery semantics\n(what is guaranteed: ordering, at-least-once, idempotency requirements).\n\n`--help-delivery` — prints the ADR on per-direction delivery guarantees\n(at-least-once everywhere, no losses; effectively-once via idempotent sink /\nClickHouse exactlyOnce; when duplicates occur).\n\n`--help-mapping` — prints the ADR with source→sink type-mapping chains\n(how each DB type maps through the Kafka/Debezium logical type to every sink).\n\n`--help-initial-load` — prints the ADR on initial-load + streaming start modes\n(the snapshot-* profiles; combine with a preset, e.g. `--preset=pg-pg --profile=snapshot-none`).\n\n`--help-reprocessing` — prints the ADR on replaying the stream\n(snapshot-phase vs streaming-phase: how to move offset / LSN / SCN / cursor\nback or forward; duplicates are unavoidable → idempotent sink required).\n\n`--help-rpo-rto` — prints the ADR on what drives RPO/RTO\n(RPO ≈ flush interval, ≈0 on graceful stop; RTO ≈ detect + restart +\ncatch-up, bounded by sink availability and source journal retention).\n\n`--help-ordering` — prints the ADR on event-ordering boundaries\n(the ordering-* profiles; where order is kept per source/sink and what breaks it).\n\n`--help-config` — prints the ADR on configuration loading order\n(all config lives in application.yaml + profiles; later-loaded wins:\njar < external file < `--spring.config.additional-location` < env < CLI `--key=value`;\nadditive `snapshot-*`/`offset-*`/`ordering-*` profiles must come last to win).", "--list-profiles": "# CDC Worker\n\nCDC Worker streams changes from any source to any sink — no broker in between.\nA source can be a database (PG, Oracle, Tarantool) or a queue (TQE, Kafka); a sink\nlikewise a database (PG, TDB, Elasticsearch) or a queue. The source connector reads\nchanges as records, the worker applies transforms and tracks offsets, and the sink\nconnector writes them to the target.\n\nIt is a Spring Boot application, configured entirely through Spring's own\nmechanisms: load + streaming start modes\n(the snapshot-* profiles; combine with a preset, e.g. `--preset=pg-pg --profile=snapshot-none`).\n\n`--help-reprocessing` — prints the ADR on replaying the stream\n(snapshot-phase vs streaming-phase: how to move offset / LSN / SCN / cursor\nback or forward; duplicates are unavoidable → idempotent sink required).\n\n`--help-rpo-rto` — prints the ADR on what drives RPO/RTO\n(RPO ≈ flush interval, ≈0 on graceful stop; RTO ≈ detect + restart +\ncatch-up, bounded by sink availability and source journal retention).\n\n`--help-ordering` — prints the ADR on event-ordering boundaries\n(the ordering-* profiles; where order is kept per source/sink and what breaks it).\n\n`--help-config` — prints the ADR on configuration loading order\n(all config lives in application.yaml + profiles; later-loaded wins:\njar < external file < `--spring.config.additional-location` < env < CLI `--key=value`;\nadditive `snapshot-*`/`offset-*`/`ordering-*` profiles must come last to win).", "--show-preset=pg-pg-local": "Preset: pg-pg-local\nActive profiles (in application order):\n  - pg-pg\n  - pg-source\n  - pg-source-local\n  - pg-sink\n  - pg-sink-local\n  - offset-file   (default)\n  - throttle-unlim   (default)\n\n========================================\n# ----------------------------------------------------------------------------\n# CDC Configuration\n# ----------------------------------------------------------------------------\ncdc:\n  worker:\n    id: ${cdc.id:pg-to-pg-worker}\n    tag: ${cdc.tag:pg-to-pg}\n  shutdown:\n    timeout:\n      ms: 30000\n\n# ----------------------------------------------------------------------------\n# Source Connector Configuration\n# ----------------------------------------------------------------------------\nsource:\n  connector:\n    class: io.debezium.connector.postgresql.PostgresConnector\n    plugin.name: ${pg.source.plugin:pgoutput}\n    database:\n      user: ${pg.source.user:postgres}\n      password: ${pg.source.password:}\n      dbname: ${pg.source.dbname:postgres}\n    skipped.operations: none\n    topic:\n      prefix: ${pg.source.topic.prefix:cdc}\n      delimiter: _\n    time.precision.mode: adaptive\n    signal.data.collection: public.debezium_signal\n\nsource:\n  plugin:\n    path: ${source.path:plugins/source}\n  connector:\n    database:\n      hostname: ${pg.source.host:localhost}\n      port: ${pg.source.port:5433}\n\n# ----------------------------------------------------------------------------\n# Sink Connector Configuration\n# ----------------------------------------------------------------------------\nsink:\n  connector:\n    class: io.debezium.connector.jdbc.JdbcSinkConnector\n    connection:\n      username: ${pg.sink.user:postgres}\n      password: ${pg.sink.password:}\n    database.time.zone: UTC\n    delete.enabled: ${pg.sink.delete.enabled:true}\n    insert.mode: ${pg.sink.insert.mode:upsert}\n    primary.key.mode: record_key\n    quote.identifiers: true\n  transforms:\n    chain:\n    - topic-from-source-table\n    - topic-from-source-space-name\n    config:\n      topic-from-source-table:\n        type: io.tarantool.cdc.transforms.smt.ExtractTopic$Value\n        field.path: source.table\n        skip.missing.or.null: true\n      topic-from-source-space-name:\n        type: io.tarantool.cdc.transforms.smt.ExtractTopic$Value\n        field.path: source.space_name\n        skip.missing.or.null: true\n\nsink:\n  plugin:\n    path: ${sink.path:plugins/sink}\n  connector:\n    connection:\n      url: ${pg.sink.url:jdbc:postgresql://localhost:5432/postgres}\n\n# ----------------------------------------------------------------------------\n# Offsets Configuration\n# ----------------------------------------------------------------------------\noffset:\n  storage:\n    type: ${offset.type:file}\n    file.name: ${offset.file:offsets.dat}\n\n# ----------------------------------------------------------------------------\n# Throttle Configuration\n# ----------------------------------------------------------------------------\nthrottle:\n  throttler.max.rps: ${max.rps:-1}", "--show-profile=pg-pg": "# ----------------------------------------------------------------------------\n# CDC Configuration\n# ----------------------------------------------------------------------------\ncdc:\n  worker:\n    id: ${cdc.id:pg-to-pg-worker}\n    tag: ${cdc.tag:pg-to-pg}\n  shutdown:\n    timeout:\n      ms: 30000", "--help-config": "---\nid: \"0106\"\nstatus: Черновик\n---\n\n# Порядок загрузки конфигурации: application.yaml, профили, override\n\n## Статус\n\n`Черновик`\n\n## Контекст\n\nCDC Worker — Spring Boot приложение. Вся его конфигурация — это **набор\nproperty-источников**, которые Spring сливает в один `Environment` по строгим\nправилам приоритета. На это накладываются два наших механизма:\n\n1. **Пресеты → Spring-профили** (`PresetEnvironmentPostProcessor`): `--preset=pg-pg`\n   разворачивается в список профилей (`pg-pg`, `pg-source`, `pg-sink`, …), и\n   каждый профиль — это свой `application-<profile>.yml` в classpath.\n2. **Плейсхолдеры** `${key:default}` внутри профилей, значения которым приходят\n   извне (CLI / env / внешний файл).\n\nИз-за этого «где какое значение победит» — не всегда очевидно. Документ фиксирует\n**порядок загрузки**, чтобы при отладке (`--props X=Y` «не сработал», профиль\n«перетёрся») было понятно, кто кого переопределяет. Печатается флагом\n`--help-config`.\n\n## Решение\n\n### Спринговый порядок: позже загруженное побеждает\n\nSpring Boot загружает config-data файлы в фиксированном порядке; **последний\nпобеждает** (higher precedence). Для нашего воркера цепочка от низшего к высшему\nприоритету:\n\n```\n  application.yml        external file      --spring.config.        env vars          CLI args\n  + application-        ./config/          additional-location    PG_SOURCE_        --pg.source.\n  <profile>.yml   ──▶   application.yml ──▶ =file:...        ──▶   HOST=...    ──▶   host=...\n  (в jar)                                                                          (побеждает)\n  низкий приоритет ──────────────────────────────────────────────────▶  высокий приоритет\n```\n\n| # | Источник | Приоритет | У нас |\n|---|----------|-----------|-------|\n| 1 | `application.yml` внутри jar | низший | базовые дефолты (`cdc-worker/src/main/resources/application.yaml`) |\n| 2 | профильные `application-{profile}.yml` внутри jar | ↑ | наши профили пресета: `application-pg-source.yml`, `application-snapshot-*.yml`, `application-offset-*.yml` … |\n| 3 | `application.yml` вне jar (CWD / config-server) | ↑ | опционально: `./config/application.yml` рядом с jar |\n| 4 | профильные `application-{profile}.yml` вне jar | ↑ | внешние переопределения профилей |\n| 5 | `--spring.config.additional-location=file:...` | ↑ | флаг `config` в MCP `start_cdc` — доп. внешний файл |\n| 6 | env-переменные (`SOURCE_CONNECTOR_...`) | ↑ | секреты из k8s (см. [`0100`](0100-secrets-from-k8s-secret.md)) |\n| 7 | CLI-аргументы `--key=value` | **высший** | флаг `props` в MCP → `--key=value`; `--props X=Y` в примерах |\n\nПрактические следствия:\n\n- **CLI (`--key=value`) бьёт всё.** Поэтому `--props snapshot.mode=initial_only`\n  переопределяет любой профиль. Если «не сработало» — почти всегда ключ не тот\n  (значение уходит в плейсхолдер `${snapshot.mode:...}`, а не напрямую в\n  `source.connector.snapshot.mode`).\n- **`.properties` > `.yml`** при совпадении ключа в одном location. У нас всё в\n  YAML, но если положить внешний `application.properties` — он победит YAML в том\n  же каталоге.\n\n### Порядок дефолтных location (вне jar)\n\nВнутри «вне jar» Spring сам сканирует 4 каталога; ниже по списку — выше приоритет:\n\n1. `classpath:/` (корень classpath)\n2. `classpath:/config/`\n3. `file:./` (рабочий каталог запуска)\n4. `file:./config/` и `file:./config/*/`\n\nОтсюда наш приём: положить `config/application.yml` с одной строкой\n`preset: pg-pg` — воркер стартует без CLI-флагов, но CLI/env всё ещё могут\nпереопределить (`PresetEnvironmentPostProcessor` читает `preset`/`profile`\nименно из `config/application.yml` в CWD).\n\n### Multi-document YAML и порядок профилей\n\nВнутри одного файла документы, разделённые `---`, применяются **сверху вниз** —\nнижний переопределяет верхний. То же и для **списка активных профилей**: наши\n`application-<profile>.yml` накладываются в порядке активации, **последний в\nсписке побеждает**.\n\nОтсюда правило для аддитивных профилей (`snapshot-*`, `offset-*`, `ordering-*`):\nставить их **после** source-профиля пресета, чтобы они победили:\n\n```bash\n# snapshot-none победит дефолт из pg-source, т.к. идёт позже\njava -jar cdc-worker.jar --preset=pg-pg --profile=snapshot-none\n```\n\nЭто и есть причина, почему аддитивные профили работают, задавая **только** свой\nключ (`snapshot.mode`, `offset.storage.*`) — всё остальное берётся из профилей\nпресета, стоящих раньше.\n\n## Последствия\n\nИзменений поведения нет — документ фиксирует существующие правила Spring Boot и\nих наложение на наши пресеты/профили. Практический выигрыш: единое место, куда\nсмотреть при «значение не то, что ожидал».\n\n## Затрагиваемые модули/файлы\n\n- Базовый конфиг: `cdc-worker/src/main/resources/application.yaml`\n- Профили: `cdc-worker/src/main/resources/application-*.yml`\n- Пресет→профили и чтение `config/application.yml`:\n  `cdc-worker/src/main/java/io/tarantool/cdc/preset/PresetEnvironmentPostProcessor.java`\n- CLI/env→CLI-аргументы: MCP-раннер\n  `cdc-mcp-server/cdc_mcp/runners/jar.py` (`props` → `--key=value`,\n  `config` → `--spring.config.additional-location`)\n- Help-флаг `--help-config`:\n  `cdc-worker/src/main/java/io/tarantool/cdc/CDCWorkerApplication.java`\n\n## Как поддерживается\n\nДокумент описательный. Правила — стандартные Spring Boot (Externalized\nConfiguration); при обновлении версии Spring Boot сверять, что порядок location\nне менялся. Наложение профилей enforced в `PresetEnvironmentPostProcessor` и\nпокрыто его unit-тестами.\n\n## Ссылки\n\n- Spring Boot — Externalized Configuration (порядок property-источников).\n- Связанные ADR: [`0104-offset-management.md`](0104-offset-management.md)\n  (offset-профили), [`0103-initial-load-and-streaming.md`](0103-initial-load-and-streaming.md)\n  (snapshot-профили), [`0100-secrets-from-k8s-secret.md`](0100-secrets-from-k8s-secret.md)\n  (секреты через env).", "--help-delivery": "---\nid: \"0107\"\nstatus: Черновик\n---\n\n# Гарантии доставки по направлениям source → sink\n\n## Статус\n\n`Черновик`\n\n## Контекст\n\n[`0101-transaction-semantics.md`](0101-transaction-semantics.md) фиксирует, что\nграницы транзакций не сохраняются и общая гарантия — **at-least-once**. Этот\nдокумент отвечает на смежный, но отдельный вопрос, который часто задают при\nвнедрении:\n\n> Для конкретного направления (например, PG → ClickHouse или TQE → PG) — какой\n> класс гарантии доставки? **at-least-once / at-most-once / effectively-once /\n> exactly-once**? При каких условиях возможны **дубли**, а при каких —\n> **потери**?\n\nЦель — дать явную матрицу по направлениям и, главное, объяснить, **почему потерь\nнет ни на одном направлении** (это неочевидно и в одном месте кода описано\nнеточно — см. ниже).\n\n## Решение\n\n### Короткий ответ: везде at-least-once, потерь нет\n\n**Все направления — at-least-once.** Единственная опция усиления —\n**exactly-once на стороне ClickHouse-sink** (при `exactlyOnce=true`), что даёт\n**effectively-once** для направлений `* → ClickHouse`. Ни одно направление не\nдаёт **at-most-once** — потери исключены архитектурно.\n\n| Гарантия | Где | Условие |\n|----------|-----|---------|\n| **at-least-once** | все направления (дефолт) | всегда; дубли при рестарте между `put` и commit offset |\n| **effectively-once** | `* → ClickHouse` | только при `exactlyOnce=true` (дедуп через KeeperMap + `insert_deduplication_token`) |\n| **exactly-once** | — | недостижимо end-to-end (нет сквозной tx + дедупа на всех sink) |\n| **at-most-once** | — | **не возникает** (см. «Почему потерь нет») |\n\n### Почему потерь нет (ключевой инвариант)\n\nПотеря записи возможна только если offset продвигается **до** успешной записи в\nsink. У нас — строго наоборот. `CDCWorker.loop()`:\n\n```\nsinkTaskWrapper.put(sinkRecords);        // 1. записали в sink\nsourceTaskWrapper.commitTaskRecord(...); // 2. только теперь двигаем offset\noffsetter.rewindTopicOffsets();          // 3. помечаем к flush\n```\n\nСохранённый offset = позиция **последней успешно доставленной** записи. При\nрестарте source-коннектор делает `seek()` на **следующую** запись\n(`OffsetsResolver.convertSourceOffsetAndIncrement` → `++offset`). Инвариант:\n\n- Краш **до** `put` → offset не сдвинут → батч перечитывается целиком → **дубли**,\n  не потери.\n- Краш **между** `put` и commit → то же: offset не сдвинут → **дубли**.\n- Краш **после** commit → offset уже указывает на доставленное → `++offset`\n  стартует ровно со следующей → **ни дублей, ни потерь** этой границы.\n\n> **Важно (исправление неточности).** В `CLAUDE.md` (раздел «Механизм работы\n> Offset-ов») сказано, что `++offset` при восстановлении «может привести к\n> пропуску записи при краше (если запись прочитана, но не дошла до sink)». Это\n> **неверно**: offset коммитится **после** `put`, поэтому `++offset` указывает на\n> запись, следующую за **доставленной**, а не за **прочитанной**. Пропуска\n> (потери) нет — есть переигрывание непродвинутого батча (дубли). Формулировку в\n> `CLAUDE.md` нужно поправить.\n\n### Матрица по направлениям\n\nКласс гарантии определяется **sink-ом** (source лишь поставляет упорядоченный\nпоток). Поэтому строки сгруппированы по sink. «Дубли при рестарте» — окно между\n`put` и commit offset; одинаково для всех, т.к. механизм offset общий (см. `0101`,\nраздел «Worker»).\n\n| Направление (примеры) | Sink | Класс | Дубли | Потери | Как получить лучший класс |\n|---|---|---|---|---|---|\n| PG/TDB/TDG/Oracle/TQE/Kafka → **Tarantool** | Tarantool | at-least-once | да, при рестарте | нет | идемпотентность — upsert по PK (`replace`) |\n| … → **PG / TDB2** (Debezium JDBC) | JDBC | at-least-once | да → **гасятся** при `insert.mode=upsert` | нет | `insert.mode=upsert` + PK → фактически effectively-once по данным |\n| … → **Elasticsearch** | ES | at-least-once | да, при рестарте | нет | идемпотентность по `_id` (документ перезаписывается) |\n| … → **ClickHouse** | ClickHouse | at-least-once → **effectively-once** | да (дефолт) / нет | нет | **`exactlyOnce=true`** (KeeperMap + dedup-token) |\n| … → **TQE (v2/v3)** | TQE | at-least-once | да, при рестарте | нет | дедуп на потребителе очереди / `deduplication_key` |\n| … → **Kafka** | Kafka | at-least-once | да, при рестарте | нет | продюсерная идемпотентность/транзакции **выключены** — дедуп downstream |\n| … → **Ingestor** | Ingestor | at-least-once | да, при рестарте | нет | идемпотентность на стороне ingestor-приёмника |\n\nЗамечания:\n\n- **JDBC (PG/TDB2)** и **ClickHouse (exactlyOnce)** — единственные, где дубли\n  реально **гасятся** самим sink: JDBC через upsert по PK, CH через дедуп-токен.\n  Для остальных «нет дублей» достигается только идемпотентностью целевой схемы\n  (upsert по ключу), а не механизмом sink.\n- «Потери: нет» держится на инварианте put-then-commit выше и **не зависит от\n  направления**. Единственный отдельный случай — потеря самого offset-снимка\n  (см. `0104`): это не потеря данных (idempotent sink переживёт переигрывание),\n  а лишь переигрывание журнала источника от ретеншена.\n- **Snapshot-фаза** (варианты B/D из `0103`): падение до завершения инициального\n  snapshot → перечитывание snapshot с нуля (дубли/переработа), **не потеря**.\n  Incremental snapshot (B+) резюмируется с точностью до чанка.\n\n### Effectively-once vs exactly-once — почему только «effectively»\n\n- **exactly-once** потребовал бы сквозной атомарности (source-tx → sink-commit) и\n  дедупа на **каждом** sink. Ни того, ни другого нет (см. `0101`): tx-границы не\n  переносятся, батч бьётся на под-запросы.\n- **effectively-once** — наблюдаемый результат «как будто ровно один раз»\n  достигается **идемпотентностью**: повтор доставки не меняет состояние sink.\n  Это то, что даёт upsert по PK (JDBC/Tarantool/ES) и dedup-token (ClickHouse).\n  Именно поэтому для прикладной корректности достаточно at-least-once +\n  идемпотентная схема, а не настоящий exactly-once.\n\n## Последствия\n\n- Для любого направления оператор может рассчитывать на **at-least-once без\n  потерь**; «нет дублей» — вопрос идемпотентности целевой схемы, а не выбора\n  направления.\n- Только `* → ClickHouse` имеет встроенный тумблер до effectively-once\n  (`exactlyOnce`); остальным нужен upsert/дедуп по ключу на стороне схемы или\n  downstream-потребителя.\n- Требуется исправить формулировку про «пропуск записи» в `CLAUDE.md`.\n\n## Затрагиваемые модули/файлы\n\n- Инвариант put-then-commit: `cdc-worker/.../CDCWorker.java` (`loop()`, строки\n  `put` → `commitTaskRecord` → `rewindTopicOffsets`).\n- `++offset` при рестарте:\n  `connectors/kafka-connector/.../source/offsets/OffsetsResolver.java`\n  (`convertSourceOffsetAndIncrement`); аналогичный cursor-based resume —\n  `tarantool-mq-connector/.../source/TQESourceTask.java` /\n  `TQEv2SourceTask.java`.\n- Дедуп на sink: Debezium JDBC (`insert.mode=upsert`), ClickHouse\n  (`exactlyOnce`, KeeperMap) — см. `0101`, таблица sink.\n- Текст для исправления: `CLAUDE.md`, раздел «Механизм работы Offset-ов».\n\n## Как поддерживается\n\nДокумент описательный; печатается флагом `--help-delivery` (по аналогии с\n`--help-transactions`). Инвариант put-then-commit и `++offset` — предмет\nрегрессии при правках `CDCWorker.loop()` / `OffsetsResolver`: если commit offset\nуедет **перед** `put`, гарантия деградирует до at-most-once (появятся потери) —\nэто должно ловиться код-ревью и (желательно) тестом на порядок вызовов.\n\n## Как исправлять нарушения\n\n- **Наблюдаются потери** → почти наверняка нарушен порядок put-then-commit\n  (offset коммитится до `put`) — вернуть порядок из `CDCWorker.loop()`.\n- **Мешают дубли** → включить идемпотентность целевой схемы: upsert по PK\n  (JDBC/Tarantool/ES), `exactlyOnce=true` (ClickHouse), дедуп downstream (Kafka/TQE).\n- **Нужен exactly-once end-to-end** → на текущей архитектуре недостижим; заводить\n  отдельный ADR (транзакционный sink + перенос tx-границ), см. `0101`.\n\n## Ссылки\n\n- Связанные ADR: [`0101-transaction-semantics.md`](0101-transaction-semantics.md)\n  (at-least-once, tx-границы, таблица sink), [`0104-offset-management.md`](0104-offset-management.md)\n  (потеря offset-снимка ≠ потеря данных), [`0103-initial-load-and-streaming.md`](0103-initial-load-and-streaming.md)\n  (snapshot-фаза и resume).\n- Механизм offset'ов — `CLAUDE.md`, раздел «Механизм работы Offset-ов».", "--help-es-sink-params": "==============================================================================\nio.tarantool.connector.ElasticsearchSinkConnector  (sink, v1.0.0-SNAPSHOT)\n==============================================================================\n\n[Connector]\n  elastic.connections : list\n      \n\n\t\tList of connection urls to Elasticsearch instances. Must be filled in using the URL template:\n\t\t'<elasticsearch>://[<login>[:<password>]@]<host>:<port>[/][?[param1=value1]&[param2=value2]...]'\n\n  insert.mode : string = insert\n      The insertion mode to use. 'insert' - the default mode, uses insert semantics; 'replace' - uses replace semantics\n  primary.key.mode : string = record_value\n      The primary key mode\n  primary.key.fields : string\n      A comma-separated list of primary key field names. This is interpreted differently depending on primary.key.mode.\n  delete.enabled : boolean = false\n      Means whether to enable deletion of records in sink indexes\n  decimal.handling.mode : string = precise\n      The variable decimal handling mode to use.'precise' - analog of 'engineer_string''double' - will be casted to double representation'plain_string' - will be casted to plain string representation'engineer_string' - will be casted to string with engineer representation\n  datetime.handling.mode : string = datetime\n      The date and time handling mode to use. 'datetime' - write date and time types into tarantool 'datetime' type (default). 'string' - write date and time types into tarantool 'string' type. 'numeric' - write date and time types into tarantool 'integer' type.\n  datetime.infinity.handling.enabled : boolean = false\n      Indicates whether to enable handling of 'infinity' and '-infinity' values when 'datetime.handling.mode=datetime|numeric'. If this parameter is true, then when 'datetime.handling.mode=datetime|numeric': 'infinity' -> 'OffsetDateTime.MAX', '-infinity' -> 'OffsetDateTime.MIN'.Default: false\n  map.nested.handling.mode.enabled : boolean = false\n      A flag that allows the Kafka MAP type to be treated as an elasticsearch nested object.\n  - true - Kafka map will be treated as an elasticsearch nested object.\n  - false - Kafka map will be treated as an elasticsearch object.\n\n  struct.nested.handling.mode.enabled : boolean = false\n      A flag that allows the Kafka STRUCT type to be treated as an elasticsearch nested object.\n  - true - Kafka STRUCT will be treated as an elasticsearch nested object.\n  - false - Kafka STRUCT will be treated as an elasticsearch object.\n\n  io.threads.count : int = 0\n          The number of allocated threads for the I/O operation that the IOReactor apache http async client will manage.\n    Must be greater than zero. If parameter is not specified or 0 is specified, all available system threads are used.\n\n  futures.processing.threads.count : int = 0\n        The number of allocated threads for Future processing returned by the apache http async client IOReactor.\n  Allocated to avoid delaying IOReactor threads. If parameter is not specified or 0 is specified, common ForkJoinPool is used.\n\n  tls.trust.pem.certificates : list = []\n      List of absolute paths to files trusted PEM certificates or list of paths to directories where trusted PEM certificates are stored. Allowed file extensions: [.pem, .crt, .ca-bundle]\n  tls.trust.pkcs12.certificates : list = []\n      List 'key:value' where the key is the absolute path to the certificate file in 'PKCS12' format and the value is the password for the certificate file. Allowed file extensions: [.p12, .pfx]. The password for the container cannot be empty.\n  index.mapping.total-fields.limit : list\n      Global index parameter. The maximum number of fields in an index. Field and object mappings, as well as field aliases count towards this limit. Mapped runtime fields count towards thislimit as well\n  index.translog.durability : list\n      Whether or not to fsync and commit the translog after every index, delete, update, or bulk request. This setting accepts the following parameters: 'request' (default) fsync and commit after every request. In the event of hardware failure, all acknowledged writes will already have been committed to disk. 'async' fsync and commit in the background every sync_interval. In the event of a failure, all acknowledged writes since the last automatic commit will be discarded.\n  index.translog.sync-interval : list\n      How often the translog is fsynced to disk and committed, regardless of write operations. Defaults to 5s. Values less than 100ms are not allowed\n  index.translog.flush-threshold-size : list\n      The translog stores all operations that are not yet safely persisted in Lucene (i.e., are not part of a Lucene commit point). Although these operations are available for reads, they will need to be replayed if the shard was stopped and had to be recovered. This setting controls the maximum total size of these operations to prevent recoveries from taking too long. Once the maximum size has been reached, a flush will happen, generating a new Lucene commit point. Defaults to 10 GB\n  index.refresh-interval : list\n      How often to perform a refresh operation, which makes recent changes to the index visibleto search. Defaults to 1s. Can be set to -1 to disable refresh. If this setting is not explicitly set,shards that haven’t seen search traffic for at least index.search.idle.after seconds will not receivebackground refreshes until they receive a search request. Searches that hit an idle shard where arefresh is pending will trigger a refresh as part of the search operation for that shard only.This behavior aims to automatically optimize bulk indexing in the default case when no searchesare performed. In order to opt out of this behavior an explicit value of 1s should set as the refreshinterval\n  index.auto-expand-replicas : list\n      Auto-expand the number of replicas based on the number of data nodes in the cluster. Set to a dash delimited lower and upper bound (e.g. 0-5) or use all for the upper bound (e.g. 0-all). Defaults to false (i.e. disabled). Note that the auto-expanded number of replicas only takes allocation filtering rules into account, but ignores other allocation rules such as total shards per node, and this can lead to the cluster health becoming YELLOW if the applicable rules prevent all the replicas from being allocated. If the upper bound is all then shard allocation awareness and cluster.routing.allocation.same_shard.host are ignored for this index\n  index.codec : list\n      The default value compresses stored data with LZ4 compression, but this can be set to best_compression which uses ZSTD for a higher compression ratio, at the expense of slower stored fields read performance. If you are updating the compression type, the new one will be applied after segments are merged. Segment merging can be forced using force merge. Experiments with indexing log datasets have shown that best_compression gives up to ~28% lower storage usage and similar indexing throughput (sometimes a bit slower or faster depending on other used options) compared to default while affecting get by id latencies between ~10% and ~33%. The higher get by id latencies is not a concern for many use cases like logging or metrics, since these don’t really rely on get by id functionality (Get APIs or searching by _id)\n  index.max-result-window : list\n      The maximum value of from + size for searches to this index. Defaults to 10000. Search requests take heap memory and time proportional to from + size and this limits that memory. See Scroll or Search After for a more efficient alternative to raising this.\n  index.number-of-replicas : list\n      The number of replicas each primary shard has. Defaults to 1. WARNING: Configuring it to 0 may lead to temporary availability loss during node restarts or permanent data loss in case of data corruption\n  index.number-of-routing-shards : list\n      Integer value used with index.number_of_shards to route documents to a primary shard. See _routing field. Elasticsearch uses this value when splitting an index. For example, a 5 shard index with number_of_routing_shards set to 30 (5 x 2 x 3) could be split by a factor of 2 or 3.\n  index.number-of-shards : list\n      The number of primary shards that an index should have. Defaults to 1. This setting can only be set at index creation time. It cannot be changed on a closed index.\n  index.routing.allocation.enable : list\n      Controls shard allocation for this index. It can be set to: all (default) - Allows shard allocation for all shards. primaries - Allows shard allocation only for primary shards. new_primaries - Allows shard allocation only for newly-created primary shards. none - No shard allocation is allowed.\n  index.routing.rebalance.enable : list\n      Enables shard rebalancing for this index. It can be set to: all (default) - Allows shard rebalancing for all shards. primaries - Allows shard rebalancing only for primary shards. replicas - Allows shard rebalancing only for replica shards. none - No shard rebalancing is allowed.\n  index.routing-partition-size : list\n      The number of shards a custom routing value can go to. Defaults to 1 and can only be set at index creation time. This value must be less than the index.number_of_routing_shards unless the index.number_of_routing_shards value is also 1.\n  index.search.idle.after : list\n      How long a shard can not receive a search or get request until it’s considered search idle. (default is 30s)\n  index.soft-deletes.enabled : list\n      Indicates whether soft deletes are enabled on the index. Soft deletes can only be configured at index creation and only on indices created on or after Elasticsearch 6.5.0. Defaults to true\n  index.soft-deletes.retention-lease.period : list\n      The maximum period to retain a shard history retention lease before it is considered expired. Shard history retention leases ensure that soft deletes are retained during merges on the Lucene index. If a soft delete is merged away before it can be replicated to a follower the following process will fail due to incomplete history on the leader. Defaults to 12h\n  auth.api-key : password\n      BASE64 encoded 'Api key' auth token to connect to Elasticsearch single node or cluster nodes. It has a higher priority over basic authentication via login and password\n  index.mapping.dynamic : list\n      The dynamic parameter controls whether new fields are added dynamically, and accepts the following parameters:\n true - New fields are added to the mapping (default).\n runtime - New fields are added to the mapping as runtime fields. These fields are not indexed, and are loaded from _source at query time.\n false - New fields are ignored. These fields will not be indexed or searchable, but will still appear in the _source field of returned hits. These fields will not be added to the mapping, and new fields must be added explicitly.\n strict - If new fields are detected, an exception is thrown and the document is rejected. New fields must be explicitly added to the mapping.", "--help-ingestor-sink-params": "==============================================================================\nio.tarantool.connector.IngestorSinkConnector  (sink, v1.0.0-SNAPSHOT)\n==============================================================================\n\n[Connector]\n  target : string\n      Url of Ingestor gRPC endpoint serving Store requests.\nShould be like <host>:<port>\n\n  stream.name : string\n      Name of events stream.\n\n  stream.acks.timeout : int = 10000\n      Timeout of waiting for acknowledges in milliseconds.\nBy default - 10000 milliseconds (10 seconds)\n\n\n[Events]\n  key.converter : string = org.apache.kafka.connect.json.JsonConverter\n      Classname of format Converter. This converter must implement KafkaConnect Converter\ninterface.\n\n  value.converter : string = org.apache.kafka.connect.json.JsonConverter\n      Classname of format Converter. This converter must implement KafkaConnect Converter\ninterface.\n\n\n[General]\n  stream.max.inflight.messages : int = 2048\n      Max count of inflight messages\n\n  stream.batch.size : int = 1024\n      Size of messages batch sent to ingestor service\n\n  stream.batch.send.timeout : int = 1000\n      Timeout of batch request in milliseconds", "--help-initial-load": "---\nid: \"0103\"\nstatus: Черновик\n---\n\n# Первичная загрузка + streaming: режимы старта коннекторов\n\n## Статус\n\n`Черновик`\n\n## Контекст\n\nПри подключении CDC к новой связке `source → target` всегда встаёт вопрос:\nкак получить **консистентное начальное состояние** целевого хранилища, а\nзатем непрерывно **догонять изменения** (streaming). Это классическая связка\n«Initial load + streaming».\n\nУ нас коннекторы делятся на две группы, и они по-разному отвечают на этот\nвопрос:\n\n- **Внешние Debezium-коннекторы** (PostgreSQL, Oracle) — богатый набор\n  `snapshot.mode` и incremental snapshot через сигналы.\n- **Наши коннекторы** (`tarantool-source`, `tarantool-mq`, `kafka`) — либо\n  урезанный `snapshot.mode`, либо вообще нет понятия snapshot.\n\nЦель документа — зафиксировать, **какие режимы первичной загрузки реально\nдоступны на каждом коннекторе**, и описать четыре типовых сценария, чтобы при\nвнедрении можно было осознанно выбрать подход, а не упираться в то, что\nконкретный коннектор «не умеет snapshot».\n\n### Проблема: единого механизма нет\n\n`snapshot.mode` — это концепция source-коннектора. Она есть только там, где\nконнектор может сам вычитать **полное текущее состояние** источника (таблицу,\nспейс) перед подпиской на журнал изменений. Коннекторы, которые читают\n**поток** (очередь TQE, топик Kafka), понятия snapshot не имеют в принципе:\nих «первичная загрузка» — это лишь то, с какого offset начать чтение потока.\n\nSink-коннекторы (ClickHouse, Elasticsearch, наш ingestor) вообще не участвуют\nв выборе режима — они пишут то, что им прислали.\n\n### Сводная таблица по коннекторам\n\n| Коннектор | Тип | Есть `snapshot.mode`? | Полная первичная загрузка данных | Только streaming |\n|---|---|---|---|---|\n| **Debezium PostgreSQL** | source | ✅ `always` / `initial` / `initial_only` / `no_data` / `when_needed` / `configuration_based` / `custom` | `initial` (default) | `no_data` |\n| **Debezium Oracle** (в т.ч. через OLR) | source | ✅ те же + `recovery` | `initial` (default) | `no_data` (только схема) |\n| **tarantool-source** (TDB / TDG2) | source | ⚠️ только `initial` / `initial_only` | `initial` (default) — читает весь спейс, затем WAL | ❌ нет режима «без snapshot»¹ |\n| **tarantool-mq** (TQE) | source | ❌ нет | ❌ нет — стриминг из очереди по курсору | ✅ только этот режим |\n| **kafka** (source) | source | ❌ нет (жёстко `auto.offset.reset=earliest`) | ❌ нет — чтение топика с offset | ✅ только этот режим |\n| **ClickHouse sink** | sink | ❌ (управляется `consumer.auto.offset.reset` на уровне Kafka Connect) | — | — |\n| **Elasticsearch / ingestor sink** | sink | ❌ | — | — |\n\n¹ У `tarantool-source` есть только `initial` и `initial_only`; аналога\nDebezium-`no_data` («подписаться на WAL без чтения текущего состояния») нет.\nЧистый streaming достигается косвенно — через `replication.anonymous` /\n`replication.start.lsn` (подписка с заданного LSN), но это не отдельный\n`snapshot.mode`.\n\n### Ключевые факты по значениям Debezium `snapshot.mode`\n\n- `initial` (**default**) — snapshot данных **только при первом старте**\n  (когда нет сохранённого offset), затем streaming. Это и есть «Initial load\n  + streaming». При рестарте с offset snapshot **не повторяется**.\n- `always` — snapshot при **каждом** старте, затем streaming.\n- `initial_only` — snapshot и **стоп**, без перехода в streaming.\n- `no_data` — snapshot **не делается** (у Oracle/PG-с-историей снапшотится\n  только схема), сразу streaming. Это «только streaming».\n- `recovery` (Oracle, SQL Server, MySQL) — восстановление только схемы, затем\n  чтение журнала с текущей позиции; для аварийного восстановления, когда\n  offset есть, а schema history потерян. Не использовать как обычный режим.\n- `when_needed` — snapshot по необходимости (эвристика Debezium).\n\n«Первый старт» определяется наличием offset в offset-хранилище\n(`offsetExists`), см. `InitialSnapshotter.shouldSnapshotData()`:\n`return !offsetExists || snapshotInProgress`.\n\n### Как то же самое устроено у `tarantool-source`\n\n- `snapshot.mode=initial` (default): если offset нет — `fetchMemoryView()`\n  вычитывает полный memory view спейса (через `JOIN` / `fetchSnapshot`),\n  записи помечаются операцией `READ`; затем `subscribe()` подписывается на WAL\n  с vclock, полученного по итогам снапшота.\n- `snapshot.mode=initial_only`: после снапшота на WAL **не подписывается**.\n- Распознавание «snapshot уже был» — по offset-ключам `is_snap` / `snap_lsn`\n  / `vclock`. Если в offset лежит валидный WAL-vclock (не из снапшота),\n  повторный снапшот не выполняется.\n\n## Решение\n\nДокумент **описательный** (ADR-фиксация текущего положения), кодовых\nизменений не требует. Мы фиксируем четыре сценария первичной загрузки как\nрекомендуемые способы старта и указываем, каким коннектором каждый\nреализуется.\n\n### Вариант A. Только streaming (без первичной загрузки)\n\nЦелевое хранилище уже согласовано с источником (или история не нужна) —\nберём только новые изменения.\n\n| Коннектор | Как включить |\n|---|---|\n| Debezium PG / Oracle | `snapshot.mode=no_data` |\n| tarantool-source | `replication.start.lsn` / `replication.anonymous` (снапшот пропустится) |\n| tarantool-mq (TQE) | режим по умолчанию — стриминг с курсора |\n| kafka source | режим по умолчанию — с `auto.offset.reset` |\n\nКогда применять: target уже наполнен; нужен только «хвост» изменений; или\nпервичная загрузка делается отдельным процессом (см. вариант C).\n\n### Вариант B. Snapshot + streaming (первичная загрузка средствами коннектора)\n\nКоннектор сам делает консистентный снимок текущего состояния, затем\nдогоняет журнал. Это дефолт и «правильный» путь там, где он доступен.\n\n| Коннектор | Как включить |\n|---|---|\n| Debezium PG / Oracle | `snapshot.mode=initial` (default) |\n| tarantool-source (TDB/TDG2) | `snapshot.mode=initial` (default) |\n| tarantool-mq / kafka | ❌ недоступно — эти коннекторы snapshot не делают |\n\nПодвариант — **incremental / ad-hoc snapshot через сигналы** (только\nDebezium): см. отдельный **вариант B+** ниже — это единственный resumable-режим\nпервичной загрузки.\n\nКогда применять: чистый target, объём данных умещается в снапшот, нужна\nконсистентность «из коробки». Для больших таблиц с онлайн-нагрузкой —\nincremental snapshot (вариант B+ ниже).\n\n### Вариант B+. Incremental snapshot через сигналы (resumable, только Debezium)\n\nОтдельный режим, а не просто настройка варианта B. Инициальный snapshot\n(варианты B/D) — **одна большая транзакция**, его прогресс **не персистится**:\nвалидный offset пишется только по завершении snapshot. Упал на середине —\nперечитывать всё с нуля. Incremental snapshot это чинит.\n\n**Почему он resumable — ключевой факт.** Incremental snapshot идёт **чанками\nпараллельно со streaming**, и прогресс каждого чанка сохраняется в **тот же\noffset**, что и позиция стриминга. `AbstractIncrementalSnapshotContext.store()`\nкладёт в offset:\n\n- `incremental_snapshot_primary_key` (`lastEventKeySent`) — PK последней\n  отправленной строки, «докуда дочитали»;\n- `incremental_snapshot_maximum_key` (`maximumKey`) — верхняя граница таблицы;\n- `incremental_snapshot_collections` — очередь ещё не доснапшоченных таблиц.\n\n`PostgresOffsetContext.getOffset()` подмешивает `store(...)` в offset **только\nв ветке streaming** (`sourceInfo.isSnapshot() == false`) — поэтому offset несёт\nодновременно валидный LSN и прогресс чанка, и Kafka Connect периодически флашит\nих **синхронно**. При старте `SignalBasedIncrementalSnapshotContext.load()` →\n`init()` читает `lastEventKeySent` обратно в `chunkEndPosition` — следующий чанк\nстартует ровно с сохранённого PK.\n\n**Гранулярность resume — до чанка, не до строки.** При падении внутри\nнезакрытого окна текущий чанк переигрывается целиком (`revertChunk()`:\n`chunkEndPosition = lastEventKeySent`), уже закоммиченные чанки не трогаются.\nWorst-case потеря прогресса = один `incremental.snapshot.chunk.size` (дефолт\n`1024`), а не вся таблица. Именно это отличает B+ от B: **инициальный snapshot\nне пишет `lastEventKeySent` вообще** (ветка `isSnapshot()` его отсекает) — потому\nи не возобновляется.\n\n**Как запускается — сигналом, а не рестартом.** Snapshot стартует не на старте\nконнектора, а вставкой сигнала `execute-snapshot` в signal-канал:\n\n| Параметр | Значение | Назначение |\n|---|---|---|\n| `signal.enabled.channels` | `source` (default) / `kafka` / `file` / `jmx` | откуда читать сигналы |\n| `signal.data.collection` | напр. `public.debezium_signal` | signal-таблица (для канала `source`) |\n| `signal.poll.interval.ms` | дефолт `5000` | как часто опрашивать канал |\n| `incremental.snapshot.chunk.size` | дефолт `1024` | размер чанка = worst-case resume |\n| `incremental.snapshot.watermarking.strategy` | `INSERT_INSERT` (default) / `INSERT_DELETE` | как размечать окна поверх streaming |\n\nУправляющие сигналы: `execute-snapshot` (старт, можно с\n`additional-conditions` — фильтр строк, и `surrogate-key` — если нет PK),\n`pause-snapshot` / `resume-snapshot`, `stop-snapshot`.\n\n**Watermark-окна.** Чтобы streaming-изменения, пришедшие во время чтения чанка,\nне были перезатёрты снапшот-строками, Debezium открывает/закрывает окно вокруг\nкаждого чанка (`OpenIncrementalSnapshotWindow` / `CloseIncrementalSnapshotWindow`)\nи дедуплицирует: событие из журнала «побеждает» снапшот-строку с тем же PK. При\n`INSERT_DELETE` метки окна удаляются сразу после закрытия (чище signal-таблица),\n`INSERT_INSERT` — только вставки (проще, дефолт).\n\nКогда применять: большие таблицы под онлайн-нагрузкой, где инициальный snapshot\n(а) слишком долгий и рискует упасть без resume, (б) заблокировал бы старт\nstreaming. А также — когда нужно **до-снапшотить** конкретные таблицы к уже\nработающему streaming, не перезапуская коннектор.\n\nОграничение: доступно **только Debezium** (PG/Oracle). `tarantool-source` /\n`tarantool-mq` / `kafka` incremental snapshot и signals не поддерживают — для них\nresumable-первичная загрузка невозможна, применяйте варианты C/D.\n\n### Вариант C. Внешняя первичная загрузка + CDC-догон\n\nИсторию заливаем **внешним инструментом** (pg_dump/COPY, bulk-загрузка,\nETL), а коннектор запускаем в режиме «только streaming» так, чтобы он\nподхватил изменения **ровно с точки, на которой закончилась выгрузка**.\n\n- Debezium PG/Oracle: `snapshot.mode=no_data`, стартовать с LSN/SCN, взятого\n  **до/во время** внешней выгрузки.\n- tarantool-source: `replication.start.lsn` = LSN на момент выгрузки.\n- Для очередей (TQE/Kafka) — вариант вырожденный: наполнение потока и есть\n  «внешняя загрузка».\n\nРиск: окно между «сняли LSN» и «начали streaming» должно быть покрыто (LSN\nберём **до** выгрузки, дубли поглощаются идемпотентным upsert в sink). Именно\nпоэтому важна идемпотентность target (upsert по PK).\n\nКогда применять: очень большие объёмы, где снапшот средствами коннектора\nслишком долгий/тяжёлый; уже есть налаженный ETL для bulk-загрузки.\n\n### Вариант D. Миграционный сценарий (разовый перенос, затем догон и cutover)\n\nЧастный случай C, ориентированный на **разовую миграцию** источника на новый\ntarget с последующим переключением нагрузки:\n\n1. Внешняя bulk-выгрузка исторических данных в target (вариант C) **или**\n   `snapshot.mode=initial_only` — снять снапшот и остановиться.\n2. Запустить коннектор в streaming, чтобы target догнал источник и держал lag\n   ≈ 0.\n3. **Cutover**: переключить приложение на target, остановить запись в старый\n   источник.\n\nОсобенности:\n- `initial_only` удобен как «сделать снимок и выйти» без немедленного\n  streaming — снапшот и стриминг можно развести по времени/процессам.\n- Для докатки после большого снапшота на активной БД — incremental snapshot\n  через сигналы (вариант B), чтобы не блокировать источник.\n- Обязателен идемпотентный sink: во время cutover возможны повторы.\n\n### Готовые профили (`application-snapshot-*.yml`)\n\nДля вариантов A/B/D есть аддитивные Spring-профили, задающие **только**\n`source.connector.snapshot.mode`. Они накладываются поверх source-профиля\nпресета (последний в списке профилей побеждает), поэтому комбинируются с любым\nDebezium-пресетом:\n\n| Профиль | `snapshot.mode` | Вариант | Кому подходит |\n|---|---|---|---|\n| `snapshot-initial` | `initial` | B | Debezium PG/Oracle, tarantool-source |\n| `snapshot-none` | `no_data` | A / C | только Debezium PG/Oracle¹ |\n| `snapshot-initial-only` | `initial_only` | D | Debezium PG/Oracle, tarantool-source |\n| `snapshot-incremental` | — (сигналом) | B+ | только Debezium PG/Oracle² |\n\n¹ `no_data` — значение только Debezium. У tarantool-source аналога нет\n(см. сноску к сводной таблице) — для него `snapshot-none` не подходит,\nпереопределите значение или задайте LSN через `--props`.\n\n² `snapshot-incremental` не задаёт `snapshot.mode` вообще — он включает\nsignal-канал и тюнинг чанков (`chunk.size`, watermarking). Сам snapshot\nзапускается **сигналом `execute-snapshot` в рантайме**, а не активацией профиля.\nКомбинируется с `snapshot-none`/`snapshot-initial` (снапшот текущих таблиц при\nстарте + ad-hoc incremental для остальных).\n\nЗапуск в связке с пресетом:\n\n```bash\n# snapshot + streaming (это и дефолт пресета, профиль явно фиксирует режим)\njava -jar cdc-worker.jar --preset=pg-pg --profile=snapshot-initial\n\n# только streaming (target уже наполнен / внешняя первичная загрузка)\njava -jar cdc-worker.jar --preset=pg-pg --profile=snapshot-none\n\n# снять снапшот и остановиться (миграция)\njava -jar cdc-worker.jar --preset=pg-pg --profile=snapshot-initial-only\n\n# incremental snapshot: включить signal-канал + тюнинг чанков (resumable),\n# сам snapshot затем запустить сигналом execute-snapshot в signal-таблицу\njava -jar cdc-worker.jar --preset=pg-pg --profile=snapshot-none,snapshot-incremental\n```\n\nOverride значения без правки профиля — через плейсхолдер `${snapshot.mode:...}`:\n\n```bash\n# профиль задаёт initial, но перекрываем на initial_only\njava -jar cdc-worker.jar --preset=pg-pg --profile=snapshot-initial \\\n  --props snapshot.mode=initial_only\n```\n\nПрофили можно комбинировать с несколькими `--profile=a,b` — snapshot-профиль\nставьте после source-профиля, чтобы он победил.\n\n### Используемые интерфейсы\n\nНовых интерфейсов нет. Используются существующие параметры:\n- Debezium: `snapshot.mode`, `signal.data.collection`,\n  `signal.enabled.channels`.\n- tarantool-source: `snapshot.mode` (`initial` / `initial_only`),\n  `replication.start.lsn`, `replication.anonymous`, `connect.adapter`\n  (`tarantool` / `tdg2`).\n- Kafka Connect (для sink): `consumer.auto.offset.reset`.\n\n## Последствия\n\nИзменений поведения нет — документ фиксирует существующие возможности.\nПрактические следствия:\n\n- При выборе связки нужно заранее знать, умеет ли source snapshot: для\n  `tarantool-mq` / `kafka` первичная загрузка возможна только внешним путём\n  (варианты C/D).\n- Идемпотентность target (upsert по PK) обязательна для вариантов C/D и при\n  cutover — на пересечении по PK возможны повторы. См.\n  [`0101-transaction-semantics.md`](0101-transaction-semantics.md).\n\n### Рассмотренные альтернативы\n\n- **Унифицировать `snapshot.mode` на всех коннекторах** (добавить `no_data`\n  и snapshot очередям) — отклонено: для потоковых источников (TQE/Kafka)\n  snapshot не имеет смысла, «полное состояние» там отсутствует по определению.\n- **Всегда `snapshot.mode=always`** — отклонено: снапшот при каждом рестарте\n  недопустим на больших таблицах.\n- **Только внешняя загрузка (вариант C) как единственный путь** — отклонено:\n  для небольших/средних таблиц встроенный snapshot проще и консистентнее, не\n  требует внешнего ETL и ручной синхронизации LSN.\n\n## Затрагиваемые модули/файлы\n\n- Профили: `cdc-worker/src/main/resources/application-snapshot-initial.yml`,\n  `application-snapshot-none.yml`, `application-snapshot-initial-only.yml`,\n  `application-snapshot-incremental.yml` (B+: signal-канал + тюнинг чанков)\n- Help-флаг `--help-initial-load`:\n  `cdc-worker/src/main/java/io/tarantool/cdc/CDCWorkerApplication.java`,\n  `.../preset/PresetEnvironmentPostProcessor.java`\n- Debezium `SnapshotMode`:\n  `debezium-connector-postgres/.../PostgresConnectorConfig.java`,\n  `debezium-connector-oracle/.../OracleConnectorConfig.java`\n- Incremental snapshot (вариант B+):\n  `debezium-connector-common/.../pipeline/source/snapshot/incremental/AbstractIncrementalSnapshotContext.java`\n  (`store()` / `init()` — прогресс чанка в offset),\n  `.../SignalBasedIncrementalSnapshotContext.java` (`load()`),\n  `debezium-connector-postgres/.../PostgresOffsetContext.java` (`getOffset()` —\n  подмешивает прогресс только в streaming-ветке),\n  `debezium-connector-common/.../config/CommonConnectorConfig.java`\n  (`incremental.snapshot.chunk.size`, `signal.data.collection`,\n  `signal.enabled.channels`, `signal.poll.interval.ms`,\n  `incremental.snapshot.watermarking.strategy`),\n  `.../pipeline/signal/actions/snapshotting/` (execute/pause/resume/stop-snapshot)\n- tarantool-source: `properties/SnapshotMode.java`,\n  `config/TarantoolConnectorConfig.java` (`SNAPSHOT_MODE`),\n  `TarantoolConnectorTask.java` (`fetchMemoryView` / `subscribe`)\n\n## Как поддерживается\n\nДокумент описательный, автоматической проверки нет. При изменении коннекторов\nсверять и обновлять. Отдельно нужно **устранить расхождение кода и\nдокументации**:\n\n- `snapshot.mode` у `tarantool-source` **не описан** в\n  [`../connectors/parameters.md`](../connectors/parameters.md) (раздел\n  «Tarantool Source Connector») — добавить.\n- В javadoc/`withDescription` Debezium PG остались упоминания legacy-значений\n  `never` / `exported`, которых нет в актуальном enum (заменены на `no_data`);\n  при обновлении нашей доки использовать актуальные имена.\n\nПроверка сценариев (для будущих E2E):\n- Incremental snapshot (вариант B) — уже описан в\n  [`../design/signals/signals.md`](../design/signals/signals.md): снапшот\n  таблицы параллельно с онлайн-изменениями, проверка что streaming-записи\n  «побеждают».\n- Вариант C/D — «внешняя загрузка + догон с зафиксированного LSN» с проверкой\n  отсутствия потерь и корректной работы идемпотентного upsert на пересечении по PK.\n- `tarantool-source` — при рестарте с валидным WAL-offset (`is_snap=false`)\n  повторный снапшот не выполняется.\n\n## Ссылки\n\n- [Debezium Signals / incremental snapshot](../design/signals/signals.md)\n- [Параметры коннекторов](../connectors/parameters.md)\n- [Хранилище offset-ов и восстановление](../design/configuration.md)\n- Связанные ADR: [`0101-transaction-semantics.md`](0101-transaction-semantics.md),\n  [`0104-offset-management.md`](0104-offset-management.md) — incremental snapshot\n  (B+) хранит прогресс чанка в том же offset-снимке, что и позицию стриминга.", "--help-jdbc-sink-params": "==============================================================================\nio.debezium.connector.jdbc.JdbcSinkConnector  (sink, v3.5.0.Final)\n==============================================================================\n\n[Connector]\n  connection.url : string\n      Valid JDBC URL\n  connection.username : string\n      Name of the database user to be used when connecting to the connection.\n  connection.password : password\n      Password of the database user to be used when connecting to the connection.\n  connection.pool.min_size : int = 5\n      Minimum number of connection in the connection pool\n  connection.pool.max_size : int = 32\n      Maximum number of connection in the connection pool\n  connection.pool.acquire_increment : int = 32\n      Connection pool acquire increment\n  connection.pool.timeout : long = 1800\n      Connection pool timeout\n  insert.mode : string = insert\n      The insertion mode to use. 'insert' - the default mode, uses standard SQL insert statements; 'upsert' - uses upsert semantics for the database if its supported and requires setting primary.key.mode and primary.key.fields;'update' - uses update semantics for the database if its supported.\n  delete.enabled : boolean = false\n      Whether to treat `null` record values as deletes. Requires primary.key.mode to be `record.key`.\n  truncate.enabled : boolean = false\n      Whether to process debezium event `t` as truncate statement.\n  collection.name.format : string = ${topic}\n      A format string for the table, which may contain '${topic}' as a placeholder for the original topic name.\n  table.name.format : string = ${topic}\n      A format string for the table, which may contain '${topic}' as a placeholder for the original topic name.\n  primary.key.mode : string = none\n      The primary key mode.\n  primary.key.fields : string\n      A comma-separated list of primary key field names. This is interpreted differently depending on primary.key.mode.\n  schema.evolution : string = none\n      Controls how schema evolution is handled by the sink connector\n  quote.identifiers : boolean = false\n      When enabled, table, column, and other identifiers are quoted based on the database dialect. When disabled, only explicit cases where the dialect requires quoting will be used, such as names starting with an underscore.\n  collection.naming.strategy : class = class io.debezium.sink.naming.DefaultCollectionNamingStrategy\n      Name of the strategy class that defines the collection name from the topic name. It implements the CollectionNamingStrategy interface.\n  table.naming.strategy : class = class io.debezium.sink.naming.DefaultCollectionNamingStrategy\n      Name of the strategy class that defines the collection name from the topic name. It implements the CollectionNamingStrategy interface.\n  column.naming.strategy : class = class io.debezium.connector.jdbc.naming.DefaultColumnNamingStrategy\n      Name of the strategy class that implements the ColumnNamingStrategy interface.\n  collection.table.format : string = ${table}\n      Alternative format that uses table name instead of topic name. Use ${schema} for schema name and ${table} for table name.\n  use.time.zone : string = UTC\n      The timezone used when inserting temporal values. Defaults to UTC.\n  database.time_zone : string = UTC\n      The timezone used when inserting temporal values. Defaults to UTC.\n  dialect.postgres.postgis.schema : string = public\n      Name of the schema where postgis extension is installed. Default is public\n  dialect.postgres.unnest.insert.enabled : boolean = false\n      When enabled, uses PostgreSQL UNNEST() for batch inserts which can significantly improve performance by reducing the number of SQL statements executed. This optimization is compatible with INSERT and UPSERT modes. Instead of executing multiple INSERT statements with JDBC batching, a single INSERT statement with UNNEST is used to insert all records at once. This can provide 5-10x performance improvement for high-throughput scenarios. Default is false.\n  dialect.sqlserver.identity.insert : boolean = false\n      Allowing to insert explicit value for identity column in table for SQLSERVER.\n  batch.size : int = 500\n      Specifies how many records to attempt to batch together into the destination table, when possible. You can also configure the connector’s underlying consumer’s max.poll.records using consumer.override.max.poll.records in the connector configuration.\n  field.include.list : list\n      A comma-separated list of regular expressions matching fully-qualified names of fields that should be included in change events. The field names must be delimited by the format <topic>:<field> \n  field.exclude.list : list\n      A comma-separated list of regular expressions matching fully-qualified names of fields that should be excluded from change events. The field names must be delimited by the format <topic>:<field> \n  flush.max.retries : int = 5\n      Max retry count when fail to flush. In case of retriable exceptions, the flush will be retried for the defined max retry count. Default is 5.\n  flush.retry.delay.ms : long = 1000\n      Delay to retry when fail to flush\n  connection.restart.on.errors : boolean = false\n      Specifies whether the connector should attempt to restart the connection automatically upon connection-related errors. Defaults to false. In environments where the sink database uses asynchronous replication, enabling this option may risk data loss or inconsistencies during failover if the replica has not fully caught up with the primary.\n  cloud.events.schema.name.pattern : string = .*CloudEvents\\.Envelope$\n      Regular expression pattern to identify CloudEvents messages by this schema name pattern.\n\n[General]\n  connection.provider : string = org.hibernate.c3p0.internal.C3P0ConnectionProvider\n      Fully qualified class name of the connection provider, defaults to org.hibernate.c3p0.internal.C3P0ConnectionProvider\n  use.reduction.buffer : boolean = false\n      A reduction buffer consolidates the execution of SQL statements by primary key to reduce the SQL load on the target database. When set to false (the default), each incoming event is applied as a logical SQL change. When set to true, incoming events that refer to the same row will be reduced to a single logical change based on the most recent row state.", "--help-kafka-sink-params": "==============================================================================\nio.tarantool.connector.KafkaSinkConnector  (sink, v4d200082-7952-45ec-a874-2a04067e570c)\n==============================================================================\n\n[Connector]\n  header.converter : string = org.apache.kafka.connect.json.JsonConverter\n      Classname of format Converter. This converter must implement KafkaConnect Converter\ninterface.\n\n  key.converter : string = org.apache.kafka.connect.json.JsonConverter\n      Classname of format Converter. This converter must implement KafkaConnect Converter\ninterface.\n\n  value.converter : string = org.apache.kafka.connect.json.JsonConverter\n      Classname of format Converter. This converter must implement KafkaConnect Converter\ninterface.\n\n  bootstrap.servers : string = localhost:9092\n      A list of host/port pairs used to establish the initial connection to the Kafka cluster.\nClients use this list to bootstrap and discover the full set of Kafka brokers. While the\norder of servers in the list does not matter, we recommend including more than one server\nto ensure resilience if any servers are down. This list does not need to contain the\nentire set of brokers, as Kafka clients automatically manage and update connections to the\ncluster efficiently. This list must be in the form <code>host1:port1,host2:port2,...</code>.\n\n\n==============================================================================\nio.tarantool.connector.KafkaSinkConnector  (sink, vdd496456-1d30-484b-bcf5-724d1d119614)\n==============================================================================\n\n[Connector]\n  header.converter : string = org.apache.kafka.connect.json.JsonConverter\n      Classname of format Converter. This converter must implement KafkaConnect Converter\ninterface.\n\n  key.converter : string = org.apache.kafka.connect.json.JsonConverter\n      Classname of format Converter. This converter must implement KafkaConnect Converter\ninterface.\n\n  value.converter : string = org.apache.kafka.connect.json.JsonConverter\n      Classname of format Converter. This converter must implement KafkaConnect Converter\ninterface.\n\n  bootstrap.servers : string = localhost:9092\n      A list of host/port pairs used to establish the initial connection to the Kafka cluster.\nClients use this list to bootstrap and discover the full set of Kafka brokers. While the\norder of servers in the list does not matter, we recommend including more than one server\nto ensure resilience if any servers are down. This list does not need to contain the\nentire set of brokers, as Kafka clients automatically manage and update connections to the\ncluster efficiently. This list must be in the form <code>host1:port1,host2:port2,...</code>.", "--help-kafka-source-params": "==============================================================================\nio.tarantool.connector.KafkaSourceConnector  (source, v250abb49-5e2c-474e-a297-084f4038142d)\n==============================================================================\n\n[Connector]\n  header.converter : string = org.apache.kafka.connect.json.JsonConverter\n      Classname of format Converter. This converter must implement KafkaConnect Converter\ninterface.\n\n  key.converter : string = org.apache.kafka.connect.json.JsonConverter\n      Classname of format Converter. This converter must implement KafkaConnect Converter\ninterface.\n\n  value.converter : string = org.apache.kafka.connect.json.JsonConverter\n      Classname of format Converter. This converter must implement KafkaConnect Converter\ninterface.\n\n  bootstrap.servers : string = localhost:9092\n      A list of host/port pairs used to establish the initial connection to the Kafka cluster.\nClients use this list to bootstrap and discover the full set of Kafka brokers. While the\norder of servers in the list does not matter, we recommend including more than one server\nto ensure resilience if any servers are down. This list does not need to contain the\nentire set of brokers, as Kafka clients automatically manage and update connections to the\ncluster efficiently. This list must be in the form <code>host1:port1,host2:port2,...</code>.\n\n\n==============================================================================\nio.tarantool.connector.KafkaSourceConnector  (source, vf54d0678-26bf-4c7c-8e64-678f53ce34d0)\n==============================================================================\n\n[Connector]\n  header.converter : string = org.apache.kafka.connect.json.JsonConverter\n      Classname of format Converter. This converter must implement KafkaConnect Converter\ninterface.\n\n  key.converter : string = org.apache.kafka.connect.json.JsonConverter\n      Classname of format Converter. This converter must implement KafkaConnect Converter\ninterface.\n\n  value.converter : string = org.apache.kafka.connect.json.JsonConverter\n      Classname of format Converter. This converter must implement KafkaConnect Converter\ninterface.\n\n  bootstrap.servers : string = localhost:9092\n      A list of host/port pairs used to establish the initial connection to the Kafka cluster.\nClients use this list to bootstrap and discover the full set of Kafka brokers. While the\norder of servers in the list does not matter, we recommend including more than one server\nto ensure resilience if any servers are down. This list does not need to contain the\nentire set of brokers, as Kafka clients automatically manage and update connections to the\ncluster efficiently. This list must be in the form <code>host1:port1,host2:port2,...</code>.", "--help-mapping": "---\nномер: \"0102\"\nстатус: Предложен\nкак контролируем: генерируется/сверяется из 0102-type-mapping-help.md; code-review\nзатронутые файлы:\n  - docs/internal/spec/adr/0102-type-mapping-help.md\n  - docs/internal/spec/adr/0102-type-mapping-chains.md\n---\n\n# Сквозные цепочки маппинга типов (source → sink)\n\n> **Производный документ.** Собран из [`0102-type-mapping-help.md`](0102-type-mapping-help.md).\n> Та же оговорка про устаревание: маппинг живёт в коде коннекторов, здесь — ручная выжимка.\n> При изменении коннекторов правьте сначала ADR 0102, потом эту таблицу.\n\nЦепочка читается так:\n\n```\n<тип источника> — <source-коннектор> ─▶ <ЛОГИЧЕСКИЙ ТИП> ─▶ <sink-коннектор> — <тип приёмника>\n```\n\nЛюбая связка source→sink склеивается через **общий логический тип** (Kafka Connect / Debezium)\nв середине. В каждом блоке ниже две таблицы:\n\n- **«Источники»** — какие типы каких БД дают этот логический тип (левая половина цепочки).\n- **«Выходы по всем sink»** — во что этот логический тип превращается в **каждом** приёмнике\n  (правая половина). Набор выходов одинаков для всех источников блока.\n\nЧтобы получить полную цепочку: возьмите строку из «Источники» + любую строку из «Выходы по всем sink».\n\nЗначения — для **режимов по умолчанию** (`decimal.handling.mode=precise`,\n`time.precision.mode=adaptive`, `datetime.zone.enabled=false` и т.д.). Ветки режимов — в ADR 0102.\n\nОбозначения sink: **tdb** = Tarantool sink, **pg**/**oracle** = Debezium JDBC sink,\n**click** = ClickHouse sink, **es** = Elasticsearch sink.\n\n---\n\n## DECIMAL / NUMERIC\n\n**Логический тип:** `org.apache.kafka.connect.data.Decimal` (фикс. scale) /\n`io.debezium.data.VariableScaleDecimal` (variable scale).\n\nИсточники:\n\n| Тип источника | Source-коннектор | → Логический тип |\n|---|---|---|\n| PG `numeric(p,s)`, `money` | pg (debezium) | DECIMAL |\n| PG `numeric`/`decimal` (без scale) | pg (debezium) | VARIABLE_SCALE_DECIMAL |\n| Oracle `NUMBER(p,s>0)` | oracle (debezium) | DECIMAL |\n| Oracle `NUMBER`/`FLOAT` | oracle (debezium) | VARIABLE_SCALE_DECIMAL |\n| Tarantool `decimal` | tdb (tarantool) | VARIABLE_SCALE_DECIMAL |\n| TDG `Decimal` | tdg (tarantool) | VARIABLE_SCALE_DECIMAL |\n\nВыходы по всем sink:\n\n| Sink | Коннектор | Тип приёмника |\n|---|---|---|\n| tdb | tarantool | tarantool `decimal` (BigDecimal, precision ≤ 38) |\n| pg | jdbc | PG `numeric(p,s)` |\n| oracle | jdbc | Oracle `NUMBER(p,0)` / `NUMBER(38,0)` |\n| click | clickhouse | `Decimal(p,s)` |\n| es | elasticsearch | `text` (`toEngineeringString`) |\n\n_Пример:_ `PG numeric(p,s) — pg connector ─▶ DECIMAL ─▶ tdb connector — tarantool decimal`.\n\n## INTEGER (целые)\n\n**Логический тип:** `int8` / `int16` / `int32` / `int64`.\n\nИсточники:\n\n| Тип источника | Source-коннектор | → Логический тип |\n|---|---|---|\n| PG `int2` | pg (debezium) | int16 |\n| PG `int4` | pg (debezium) | int32 |\n| PG `int8`, `oid` | pg (debezium) | int64 |\n| Oracle `NUMBER(p,0)` | oracle (debezium) | int8/16/32/64 (по ширине) |\n| Tarantool `integer`/`unsigned` | tdb (tarantool) | int64 (default) |\n| TDG `INT` | tdg (tarantool) | int32 |\n| TDG `LONG` | tdg (tarantool) | int64 |\n\nВыходы по всем sink (на примере `int32`):\n\n| Sink | Коннектор | Тип приёмника |\n|---|---|---|\n| tdb | tarantool | tarantool `integer` / `number` |\n| pg | jdbc | PG `integer` (int8→smallint, int64→bigint) |\n| oracle | jdbc | Oracle `NUMBER(10,0)` (int8→3, int16→5, int64→19) |\n| click | clickhouse | `Int32` (соответствующий `Int*`/`UInt*`) |\n| es | elasticsearch | `integer` (int8→byte, int16→short, int64→long) |\n\n## FLOAT / DOUBLE\n\n**Логический тип:** `float32` / `float64`.\n\nИсточники:\n\n| Тип источника | Source-коннектор | → Логический тип |\n|---|---|---|\n| PG `float4` | pg (debezium) | float32 |\n| PG `float8` | pg (debezium) | float64 |\n| Oracle `BINARY_FLOAT` | oracle (debezium) | float32 |\n| Oracle `BINARY_DOUBLE` | oracle (debezium) | float64 |\n| Tarantool `number`/`double` | tdb (tarantool) | float64 |\n| TDG `FLOAT` | tdg (tarantool) | float32 |\n| TDG `DOUBLE` | tdg (tarantool) | float64 |\n\nВыходы по всем sink (на примере `float64`):\n\n| Sink | Коннектор | Тип приёмника |\n|---|---|---|\n| tdb | tarantool | tarantool `number` |\n| pg | jdbc | PG `float8` / double precision (float32→`real`) |\n| oracle | jdbc | Oracle `DOUBLE PRECISION` / binary_double (float32→`FLOAT`) |\n| click | clickhouse | `Float64` (float32→`Float32`) |\n| es | elasticsearch | `double` (float32→`float`) |\n\n## BOOLEAN\n\n**Логический тип:** `boolean`.\n\nИсточники (Oracle: нативного BOOLEAN нет, только через SMT `NumberOneToBooleanConverter`):\n\n| Тип источника | Source-коннектор | → Логический тип |\n|---|---|---|\n| PG `boolean` | pg (debezium) | boolean |\n| PG `bit(1)`/`varbit(1)` | pg (debezium) | boolean |\n| Tarantool `boolean` | tdb (tarantool) | boolean |\n| TDG `BOOLEAN` | tdg (tarantool) | boolean |\n\nВыходы по всем sink:\n\n| Sink | Коннектор | Тип приёмника |\n|---|---|---|\n| tdb | tarantool | tarantool `boolean` |\n| pg | jdbc | PG `boolean` |\n| oracle | jdbc | Oracle `NUMBER(1,0)` |\n| click | clickhouse | `Bool` |\n| es | elasticsearch | `boolean` |\n\n## STRING (char / varchar / text)\n\n**Логический тип:** `string`.\n\nИсточники:\n\n| Тип источника | Source-коннектор | → Логический тип |\n|---|---|---|\n| PG `char`/`varchar`/`text`, ranges, `inet`/`cidr`/`macaddr` | pg (debezium) | string |\n| Oracle `CHAR`/`VARCHAR2`/`NCHAR`/`NVARCHAR2`/`LONG` | oracle (debezium) | string |\n| Oracle `CLOB`/`NCLOB`/`ROWID` | oracle (debezium) | string |\n| Tarantool `string`/`interval` | tdb (tarantool) | string |\n| TDG `STRING`/`FIXED` | tdg (tarantool) | string |\n\nВыходы по всем sink:\n\n| Sink | Коннектор | Тип приёмника |\n|---|---|---|\n| tdb | tarantool | tarantool `string` |\n| pg | jdbc | PG `varchar(n)` / `text` |\n| oracle | jdbc | Oracle `VARCHAR2(n)` / `NVARCHAR2` / `CLOB` |\n| click | clickhouse | `String` / `FixedString` |\n| es | elasticsearch | `text` (+`keyword`) |\n\n## UUID\n\n**Логический тип:** `io.debezium.data.Uuid`.\n\nИсточники (Oracle: нативного UUID нет):\n\n| Тип источника | Source-коннектор | → Логический тип |\n|---|---|---|\n| PG `uuid` | pg (debezium) | UUID |\n| Tarantool `uuid` | tdb (tarantool) | UUID |\n| TDG `UUID` | tdg (tarantool) | UUID |\n\nВыходы по всем sink:\n\n| Sink | Коннектор | Тип приёмника |\n|---|---|---|\n| tdb | tarantool | tarantool `uuid` |\n| pg | jdbc | PG `uuid` |\n| oracle | jdbc | Oracle `VARCHAR2` |\n| click | clickhouse | `UUID` |\n| es | elasticsearch | `text` |\n\n## JSON / JSONB\n\n**Логический тип:** `io.debezium.data.Json`.\n\nИсточники:\n\n| Тип источника | Source-коннектор | → Логический тип |\n|---|---|---|\n| PG `json`/`jsonb` | pg (debezium) | JSON |\n| PG `hstore` (mode=json) | pg (debezium) | JSON |\n| Tarantool `map`/`any` | tdb (tarantool) | JSON |\n| TDG `RECORD` (`any`) | tdg (tarantool) | JSON |\n\nВыходы по всем sink:\n\n| Sink | Коннектор | Тип приёмника |\n|---|---|---|\n| tdb | tarantool | tarantool `map`/`any` (passthrough) |\n| pg | jdbc | PG `json` / `jsonb` |\n| oracle | jdbc | Oracle `VARCHAR2` / `CLOB` |\n| click | clickhouse | `JSON` / `String` |\n| es | elasticsearch | `text` |\n\n## BLOB / RAW / BYTEA (bytes)\n\n**Логический тип:** `bytes`. (CLOB/NCLOB/`LONG` идут как `string` — см. блок STRING.)\n\nИсточники:\n\n| Тип источника | Source-коннектор | → Логический тип |\n|---|---|---|\n| PG `bytea` | pg (debezium) | bytes |\n| Oracle `BLOB`/`RAW`/`LONG RAW` | oracle (debezium) | bytes |\n| Tarantool `varbinary` | tdb (tarantool) | bytes |\n\nВыходы по всем sink:\n\n| Sink | Коннектор | Тип приёмника |\n|---|---|---|\n| tdb | tarantool | tarantool `varbinary` |\n| pg | jdbc | PG `bytea` |\n| oracle | jdbc | Oracle `blob` |\n| click | clickhouse | `String` / `FixedString` |\n| es | elasticsearch | `binary` |\n\n## TIMESTAMP (без зоны)\n\n**Логический тип:** `io.debezium.time.Timestamp` / `MicroTimestamp` / `NanoTimestamp`\n(по `time.preci
