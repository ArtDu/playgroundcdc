const CMDS = {"--help": "# CDC Worker\n\nCDC Worker streams changes from any source to any sink — no broker in between.\nA source can be a database (PG, Oracle, Tarantool) or a queue (TQE, Kafka); a sink\nlikewise a database (PG, TDB, Elasticsearch) or a queue. The source connector reads\nchanges as records, the worker applies transforms and tracks offsets, and the sink\nconnector writes them to the target.\n\nIt is a Spring Boot application, configured entirely through Spring's own\nmechanisms: profiles (`--profile` / `--spring.profiles.active`), property\nplaceholders resolved from CLI args (`--pg.source.host=...`) or env vars\n(`PG_SOURCE_HOST=...`), and `application-<profile>.yml` files on the classpath.\n\n```\n   Source  ──▶  [ Source Connector ]  Worker  [ Sink Connector ]  ──▶  Sink\n  (DB or       reads changes as    SMTs +      writes changes       (DB or\n   queue)          records         offsets       to target           queue)\n```\n\nConfiguration precedence (later overrides earlier — CLI wins):\n\n```\n  application.yml        external file      --spring.config.        env vars          CLI args\n  + application-        ./config/          additional-location    PG_SOURCE_        --pg.source.\n  <profile>.yml   ──▶   application.yml ──▶ =file:...        ──▶   HOST=...    ──▶   host=...\n  (in jar)                                                                         (wins)\n  low precedence  ───────────────────────────────────────────────────▶  high precedence\n```\n\nSee `--help-config` for the full loading order.\n\n## Commands\n\nEntry-point flags. Everything the worker can do is one of these:\n\n- `--help`, `-h`, `--list-profiles` — show this help\n- `--preset=<alias>` — activate a preset (expands to a profile list)\n- `--profile=a,b,c` — activate an explicit profile list\n  (alias for `--spring.profiles.active`)\n- `--show-preset=<alias>` — print profiles a preset expands to,\n  followed by contents of each `application-<name>.yml`\n- `--show-profile=<name>` — print full YAML of a profile\n- `--help-<alias>` — print a full copy-paste runbook (monitoring,\n  DBs, worker, sample SQL) to stand up that preset\n- `--help-<alias> --simple` — print only the worker start command\n- `--help-<alias>-helm` — print a `helm install` runbook to deploy the\n  worker into k8s against already-running DBs\n- `--help-<alias>-helm --simple` — print only the values file + `helm install`\n- `--generate-completion=bash|zsh` — shell completion, e.g. `eval \"$(java -jar cdc-worker.jar --generate-completion=zsh)\"`\n\n```bash\njava -jar cdc-worker.jar --preset=pg-pg-local --pg.source.port=5433\njava -jar cdc-worker.jar --profile=pg-pg,pg-source-local \\\n    --pg.source.host=localhost --pg.sink.host=localhost\njava -jar cdc-worker.jar --show-preset=pg-pg-local\njava -jar cdc-worker.jar --help-pg-pg-docker      # print a stand-up runbook\njava -jar cdc-worker.jar --help-pg-pg-helm        # print a k8s helm runbook\n```\n\n## Connectors\n\nScanned from the plugin dirs (override with `--scan-plugins`). `vk` = Tarantool CDC connector, `ext` = bundled third-party.\n\n| Type | Origin | Connector | Class |\n| ---- | ------ | --------- | ----- |\n| source | ext | `PostgresConnector` | `io.debezium.connector.postgresql.PostgresConnector` |\n| source | vk | `KafkaSourceConnector` | `io.tarantool.connector.KafkaSourceConnector` |\n| source | vk | `MockSourceConnector` | `io.tarantool.connector.MockSourceConnector` |\n| source | vk | `TarantoolConnector` | `io.tarantool.connector.TarantoolConnector` |\n| source | vk | `TQESourceConnector` | `io.tarantool.connector.source.TQESourceConnector` |\n| source | vk | `TQEv2SourceConnector` | `io.tarantool.connector.source.TQEv2SourceConnector` |\n| sink | ext | `JdbcSinkConnector` | `io.debezium.connector.jdbc.JdbcSinkConnector` |\n| sink | vk | `ElasticsearchSinkConnector` | `io.tarantool.connector.ElasticsearchSinkConnector` |\n| sink | vk | `IngestorSinkConnector` | `io.tarantool.connector.IngestorSinkConnector` |\n| sink | vk | `KafkaSinkConnector` | `io.tarantool.connector.KafkaSinkConnector` |\n| sink | vk | `MockSinkConnector` | `io.tarantool.connector.MockSinkConnector` |\n| sink | vk | `TarantoolSinkConnector` | `io.tarantool.connector.TarantoolSinkConnector` |\n| sink | vk | `TQESinkConnector` | `io.tarantool.connector.sink.TQESinkConnector` |\n| sink | vk | `TQEv2SinkConnector` | `io.tarantool.connector.sink.TQEv2SinkConnector` |\n\n## Config parameters\n\nEvery connector and the worker itself expose tunable options with defaults.\nInspect them without starting anything:\n\n- `--help-worker-params` — show CDC worker parameters\n- `--help-<connector>-params` — show a connector's parameters, e.g.\n  `--help-pg-source-params`, `--help-tnt-sink-params`\n- `--help-transforms` — list available SMT transformations and predicates\n  `[--format=human|markdown|yaml|json] [--output=<file>]`\n- `--scan-plugins=<path>` — scan all connectors in a directory\n  `[--format=human|markdown|yaml|json] [--output=<file>]`\n  (default paths: /libs/connect, plugins)\n\n```bash\njava -jar cdc-worker.jar --help-worker-params\njava -jar cdc-worker.jar --help-pg-source-params\njava -jar cdc-worker.jar --help-transforms\n```\n\n## Presets\n\nA preset is a short alias for a ready-made source→sink flow. `--preset=<alias>`\nexpands to the profile list below and adds the `offset-file` + `throttle-unlim`\ndefaults, so a whole flow starts from one flag:\n\n- `pg-pg-docker` → pg-pg, pg-source, pg-source-docker, pg-sink, pg-sink-docker _[+ offset-file, throttle-unlim]_\n- `pg-pg-local` → pg-pg, pg-source, pg-source-local, pg-sink, pg-sink-local _[+ offset-file, throttle-unlim]_\n- `pg-tqe-docker` → pg-tqe, pg-source, pg-source-docker, pg-tqe-sink, pg-tqe-sink-docker _[+ offset-file, throttle-unlim]_\n- `pg-tqe-local` → pg-tqe, pg-source, pg-source-local, pg-tqe-sink, pg-tqe-sink-local _[+ offset-file, throttle-unlim]_\n- `tqe-pg-docker` → tqe-pg, tqe-source, tqe-source-docker, pg-sink, pg-sink-docker _[+ offset-file, throttle-unlim]_\n- `tqe-pg-local` → tqe-pg, tqe-source, tqe-source-local, pg-sink, pg-sink-local _[+ offset-file, throttle-unlim]_\n\n## Profiles\n\nPresets are composed of these modular `application-<name>.yml` files on the\nclasspath. Activate them directly with `--profile=...` for flows without a preset:\n\n- `offset-file`\n- `offset-kafka`\n- `offset-tqe`\n- `offset-tqe2`\n- `ordering-by-key-tqe`\n- `ordering-single-source`\n- `ordering-strict-tqe`\n- `pg-pg`\n- `pg-sink`\n- `pg-sink-docker`\n- `pg-sink-local`\n- `pg-source`\n- `pg-source-docker`\n- `pg-source-local`\n- `pg-source-table-user`\n- `pg-tqe`\n- `pg-tqe-sink`\n- `pg-tqe-sink-docker`\n- `pg-tqe-sink-local`\n- `snapshot-incremental`\n- `snapshot-initial`\n- `snapshot-initial-only`\n- `snapshot-none`\n- `throttle-unlim`\n- `tqe-pg`\n- `tqe-source`\n- `tqe-source-docker`\n- `tqe-source-local`\n\nTwo defaults are added automatically unless overridden:\n\n- `offset-file` — added unless any `offset-*` profile is requested\n- `throttle-unlim` — added unless any `throttle-*` profile is requested\n\n## Runbooks\n\n`--help-<alias>[-helm]` prints a full copy-paste shell script that stands a preset\nup from scratch (monitoring, DBs, worker, sample SQL) — no repo checkout needed:\n\n- `--help-pg-pg-docker` — bare docker/psql stand-up\n- `--help-pg-pg-local` — bare docker/psql stand-up\n- `--help-pg-tqe-docker` — bare docker/psql stand-up\n- `--help-pg-tqe-local` — bare docker/psql stand-up\n- `--help-tqe-pg-docker` — bare docker/psql stand-up\n- `--help-tqe-pg-local` — bare docker/psql stand-up\n- `--help-pg-pg-helm` — k8s deploy via `helm install`\n- `--help-pg-tqe-helm` — k8s deploy via `helm install`\n- `--help-tqe-pg-helm` — k8s deploy via `helm install`\n\nAdd `--simple` to any of these to print only the worker start command\n(or, for `-helm`, only the values file + `helm install`) — no DBs, no monitoring.\n\n`--help-transactions` — prints the ADR on end-to-end transaction / delivery semantics\n(what is guaranteed: ordering, at-least-once, idempotency requirements).\n\n`--help-delivery` — prints the ADR on per-direction delivery guarantees\n(at-least-once everywhere, no losses; effectively-once via idempotent sink /\nClickHouse exactlyOnce; when duplicates occur).\n\n`--help-mapping` — prints the ADR with source→sink type-mapping chains\n(how each DB type maps through the Kafka/Debezium logical type to every sink).\n\n`--help-initial-load` — prints the ADR on initial-load + streaming start modes\n(the snapshot-* profiles; combine with a preset, e.g. `--preset=pg-pg --profile=snapshot-none`).\n\n`--help-reprocessing` — prints the ADR on replaying the stream\n(snapshot-phase vs streaming-phase: how to move offset / LSN / SCN / cursor\nback or forward; duplicates are unavoidable → idempotent sink required).\n\n`--help-rpo-rto` — prints the ADR on what drives RPO/RTO\n(RPO ≈ flush interval, ≈0 on graceful stop; RTO ≈ detect + restart +\ncatch-up, bounded by sink availability and source journal retention).\n\n`--help-ordering` — prints the ADR on event-ordering boundaries\n(the ordering-* profiles; where order is kept per source/sink and what breaks it).\n\n`--help-config` — prints the ADR on configuration loading order\n(all config lives in application.yaml + profiles; later-loaded wins:\njar < external file < `--spring.config.additional-location` < env < CLI `--key=value`;\nadditive `snapshot-*`/`offset-*`/`ordering-*` profiles must come last to win).", "--list-profiles": "# CDC Worker\n\nCDC Worker streams changes from any source to any sink — no broker in between.\nA source can be a database (PG, Oracle, Tarantool) or a queue (TQE, Kafka); a sink\nlikewise a database (PG, TDB, Elasticsearch) or a queue. The source connector reads\nchanges as records, the worker applies transforms and tracks offsets, and the sink\nconnector writes them to the target.\n\nIt is a Spring Boot application, configured entirely through Spring's own\nmechanisms: load + streaming start modes\n(the snapshot-* profiles; combine with a preset, e.g. `--preset=pg-pg --profile=snapshot-none`).\n\n`--help-reprocessing` — prints the ADR on replaying the stream\n(snapshot-phase vs streaming-phase: how to move offset / LSN / SCN / cursor\nback or forward; duplicates are unavoidable → idempotent sink required).\n\n`--help-rpo-rto` — prints the ADR on what drives RPO/RTO\n(RPO ≈ flush interval, ≈0 on graceful stop; RTO ≈ detect + restart +\ncatch-up, bounded by sink availability and source journal retention).\n\n`--help-ordering` — prints the ADR on event-ordering boundaries\n(the ordering-* profiles; where order is kept per source/sink and what breaks it).\n\n`--help-config` — prints the ADR on configuration loading order\n(all config lives in application.yaml + profiles; later-loaded wins:\njar < external file < `--spring.config.additional-location` < env < CLI `--key=value`;\nadditive `snapshot-*`/`offset-*`/`ordering-*` profiles must come last to win).", "--show-preset=pg-pg-local": "Preset: pg-pg-local\nActive profiles (in application order):\n  - pg-pg\n  - pg-source\n  - pg-source-local\n  - pg-sink\n  - pg-sink-local\n  - offset-file   (default)\n  - throttle-unlim   (default)\n\n========================================\n# ----------------------------------------------------------------------------\n# CDC Configuration\n# ----------------------------------------------------------------------------\ncdc:\n  worker:\n    id: ${cdc.id:pg-to-pg-worker}\n    tag: ${cdc.tag:pg-to-pg}\n  shutdown:\n    timeout:\n      ms: 30000\n\n# ----------------------------------------------------------------------------\n# Source Connector Configuration\n# ----------------------------------------------------------------------------\nsource:\n  connector:\n    class: io.debezium.connector.postgresql.PostgresConnector\n    plugin.name: ${pg.source.plugin:pgoutput}\n    database:\n      user: ${pg.source.user:postgres}\n      password: ${pg.source.password:}\n      dbname: ${pg.source.dbname:postgres}\n    skipped.operations: none\n    topic:\n      prefix: ${pg.source.topic.prefix:cdc}\n      delimiter: _\n    time.precision.mode: adaptive\n    signal.data.collection: public.debezium_signal\n\nsource:\n  plugin:\n    path: ${source.path:plugins/source}\n  connector:\n    database:\n      hostname: ${pg.source.host:localhost}\n      port: ${pg.source.port:5433}\n\n# ----------------------------------------------------------------------------\n# Sink Connector Configuration\n# ----------------------------------------------------------------------------\nsink:\n  connector:\n    class: io.debezium.connector.jdbc.JdbcSinkConnector\n    connection:\n      username: ${pg.sink.user:postgres}\n      password: ${pg.sink.password:}\n    database.time.zone: UTC\n    delete.enabled: ${pg.sink.delete.enabled:true}\n    insert.mode: ${pg.sink.insert.mode:upsert}\n    primary.key.mode: record_key\n    quote.identifiers: true\n  transforms:\n    chain:\n    - topic-from-source-table\n    - topic-from-source-space-name\n    config:\n      topic-from-source-table:\n        type: io.tarantool.cdc.transforms.smt.ExtractTopic$Value\n        field.path: source.table\n        skip.missing.or.null: true\n      topic-from-source-space-name:\n        type: io.tarantool.cdc.transforms.smt.ExtractTopic$Value\n        field.path: source.space_name\n        skip.missing.or.null: true\n\nsink:\n  plugin:\n    path: ${sink.path:plugins/sink}\n  connector:\n    connection:\n      url: ${pg.sink.url:jdbc:postgresql://localhost:5432/postgres}\n\n# ----------------------------------------------------------------------------\n# Offsets Configuration\n# ----------------------------------------------------------------------------\noffset:\n  storage:\n    type: ${offset.type:file}\n    file.name: ${offset.file:offsets.dat}\n\n# ----------------------------------------------------------------------------\n# Throttle Configuration\n# ----------------------------------------------------------------------------\nthrottle:\n  throttler.max.rps: ${max.rps:-1}", "--show-profile=pg-pg": "# ----------------------------------------------------------------------------\n# CDC Configuration\n# ----------------------------------------------------------------------------\ncdc:\n  worker:\n    id: ${cdc.id:pg-to-pg-worker}\n    tag: ${cdc.tag:pg-to-pg}\n  shutdown:\n    timeout:\n      ms: 30000", "--help-worker-params": "==============================================================================\nCDC Worker  (worker, vunknown)\n==============================================================================\n\n[worker]\n  cdc.worker.id : string (required)\n      Идентификатор процесса CDC. Используется в offset storage и метриках. Обязателен.\n  cdc.worker.tag : string (required)\n      Тег процесса. Используется в метриках. Обязателен.\n  cdc.shutdown.timeout.ms : int = 30000\n      Время (мс) на мягкое завершение. При превышении вызывается полный останов процесса.\n\n[source]\n  source.plugin.path : string = /connect\n      Каталог с JAR-ами source-коннекторов.\n  source.startup.timeout : string = 15s\n      Таймаут запуска source-коннектора (Duration, напр. 15s).\n  source.connector.class : string (required)\n      Класс source-коннектора. Остальные source.connector.* — параметры коннектора (см. --help-<connector>-params).\n\n[sink]\n  sink.plugin.path : string = /connect\n      Каталог с JAR-ами sink-коннекторов.\n  sink.startup.timeout : string = 15s\n      Таймаут запуска sink-коннектора (Duration, напр. 15s).\n  sink.connector.class : string (required)\n      Класс sink-коннектора. Остальные sink.connector.* — параметры коннектора (см. --help-<connector>-params).\n  sink.retry.count : int = 5\n      Число повторов при ошибке записи в sink.\n  sink.retry.backoff : string = 200ms\n      Пауза между повторами записи в sink (Duration).\n  sink.retry.timeout : string = 5s\n      Общий таймаут на повторы записи в sink (Duration).\n\n[offset]\n  offset.flush.interval.ms : long = 5000\n      Интервал (мс) периодического сохранения offset-ов в storage.\n  offset.flush.timeout.ms : long = 2500\n      Таймаут (мс) на одну операцию flush offset-ов.\n  offset.failures.max.count : int = 0\n      Допустимое число подряд идущих ошибок flush до аварийного останова (0 — не допускать).\n  offset.storage : list\n      Конфигурация хранилища offset-ов (file/kafka/tqe). Map ключ→значение.\n\n[throttle]\n  throttle.throttler.max.rps : int = -1\n      Ограничение скорости обработки, записей/сек. -1 — без ограничения.", "--help-pg-pg-docker --simple": "# The image tag below is an example (1.0.0-SNAPSHOT is a local build). To run a\n# released/dev build instead, swap it for a published tag from the registry, e.g.\n# cdc-worker-all:0.12.0 — see the registry / releases for available tags.\ndocker run --rm -p 8000:8000 --network stand-net \\\n    cdc-worker-all:1.0.0-SNAPSHOT \\\n    --preset=pg-pg-docker --profile=pg-source-table-user \\\n    --sink.connector.schema.evolution=basic"};
const PROMPT = "\x1b[36mjava -jar cdc-worker.jar\x1b[0m ";
const term = new Terminal({fontSize:13,cursorBlink:true,theme:{background:"#0b0e14"}});
const fit = new FitAddon.FitAddon(); term.loadAddon(fit);
term.open(document.getElementById("term")); fit.fit();
addEventListener("resize",()=>fit.fit());

const keys = Object.keys(CMDS);
let line="", hist=[], hi=0;
function prompt(){ term.write("\r\n"+PROMPT); }
function run(input){
  const cmd = input.trim();
  if(!cmd){ prompt(); return; }
  hist.push(cmd); hi=hist.length;
  if(cmd==="clear"||cmd==="cls"){ term.clear(); prompt(); return; }
  const out = CMDS[cmd];
  if(out!==undefined){ term.write("\r\n"+out.replace(/\n/g,"\r\n")); }
  else {
    term.write("\r\n\x1b[31mUnknown command:\x1b[0m "+cmd+
      "\r\nAvailable: "+keys.join("  ")+"\r\n(это симуляция — реально доступны только эти команды)");
  }
  prompt();
}
term.write("Добро пожаловать в песочницу CDC Worker.\r\nДоступные команды: "+keys.join("  ")+"\r\n(Tab — автодополнение, ↑/↓ — история, clear — очистить)");
prompt();
term.onKey(({key,domEvent:e})=>{
  if(e.key==="Enter"){ run(line); line=""; }
  else if(e.key==="Backspace"){ if(line.length){ line=line.slice(0,-1); term.write("\b \b"); } }
  else if(e.key==="Tab"){ e.preventDefault();
    const m=keys.filter(k=>k.startsWith(line));
    if(m.length===1){ term.write(m[0].slice(line.length)); line=m[0]; }
    else if(m.length>1){ term.write("\r\n"+m.join("  ")); prompt(); term.write(line); }
  }
  else if(e.key==="ArrowUp"){ if(hi>0){ hi--; term.write("\x1b[2K\r"+PROMPT+hist[hi]); line=hist[hi]; } }
  else if(e.key==="ArrowDown"){ if(hi<hist.length-1){ hi++; term.write("\x1b[2K\r"+PROMPT+hist[hi]); line=hist[hi]; }
    else { hi=hist.length; term.write("\x1b[2K\r"+PROMPT); line=""; } }
  else if(key.length===1&&!e.ctrlKey&&!e.altKey){ line+=key; term.write(key); }
});
