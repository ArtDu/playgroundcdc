sion.mode`; для Tarantool при `datetime.zone.enabled=false` → `MicroTimestamp`).\n\nИсточники:\n\n| Тип источника | Source-коннектор | → Логический тип |\n|---|---|---|\n| PG `timestamp` | pg (debezium) | TIMESTAMP / MICRO_TIMESTAMP |\n| Oracle `DATE`/`TIMESTAMP(p)` | oracle (debezium) | TIMESTAMP / MICRO_TIMESTAMP |\n| Tarantool `datetime` (zone off) | tdb (tarantool) | MICRO_TIMESTAMP |\n| TDG `DateTime`/`Timestamp` (zone off) | tdg (tarantool) | MICRO_TIMESTAMP |\n\nВыходы по всем sink:\n\n| Sink | Коннектор | Тип приёмника |\n|---|---|---|\n| tdb | tarantool | tarantool `datetime` (`LocalDateTime`) |\n| pg | jdbc | PG `timestamp(p)` |\n| oracle | jdbc | Oracle `TIMESTAMP(p)` |\n| click | clickhouse | `DateTime64` (Micro не поддержан частью версий — см. ниже) |\n| es | elasticsearch | `date` |\n\n> Для ClickHouse при `MicroTimestamp` используйте зону (`datetime.zone.enabled=true` → ZonedTimestamp).\n\n## TIMESTAMP WITH TIME ZONE\n\n**Логический тип:** `io.debezium.time.ZonedTimestamp`.\n\nИсточники:\n\n| Тип источника | Source-коннектор | → Логический тип |\n|---|---|---|\n| PG `timestamptz` | pg (debezium) | ZONED_TIMESTAMP |\n| Oracle `TIMESTAMP WITH [LOCAL] TIME ZONE` | oracle (debezium) | ZONED_TIMESTAMP |\n| Tarantool `datetime` (zone on) | tdb (tarantool) | ZONED_TIMESTAMP |\n| TDG `DateTime`/`Timestamp` (zone on) | tdg (tarantool) | ZONED_TIMESTAMP |\n\nВыходы по всем sink:\n\n| Sink | Коннектор | Тип приёмника |\n|---|---|---|\n| tdb | tarantool | tarantool `datetime` (`OffsetDateTime`) |\n| pg | jdbc | PG `timestamptz` |\n| oracle | jdbc | Oracle `TIMESTAMP WITH TIME ZONE` |\n| click | clickhouse | `DateTime` / `DateTime64` (через разбор строки) |\n| es | elasticsearch | `date` |\n\n## DATE\n\n**Логический тип:** `io.debezium.time.Date` / `org.apache.kafka.connect.data.Date`.\n\nИсточники (внимание: Oracle `DATE` → **TIMESTAMP**, см. блок выше):\n\n| Тип источника | Source-коннектор | → Логический тип |\n|---|---|---|\n| PG `date` | pg (debezium) | DATE |\n| TDG `Date` | tdg (tarantool) | DATE |\n\nВыходы по всем sink:\n\n| Sink | Коннектор | Тип приёмника |\n|---|---|---|\n| tdb | tarantool | tarantool `datetime` (`LocalDate`) |\n| pg | jdbc | PG `date` |\n| oracle | jdbc | Oracle `DATE` |\n| click | clickhouse | `Date` / `Date32` |\n| es | elasticsearch | `date` |\n\n## TIME\n\n**Логический тип:** `Time` / `MicroTime` / `ZonedTime` (по `time.precision.mode`).\n\nИсточники:\n\n| Тип источника | Source-коннектор | → Логический тип |\n|---|---|---|\n| PG `time` | pg (debezium) | TIME / MICRO_TIME |\n| PG `timetz` | pg (debezium) | ZONED_TIME |\n\nВыходы по всем sink:\n\n| Sink | Коннектор | Тип приёмника |\n|---|---|---|\n| tdb | tarantool | tarantool `datetime`/`integer` (`LocalTime` / millis) |\n| pg | jdbc | PG `time(p)` / `timetz` (для ZonedTime) |\n| oracle | jdbc | Oracle `TIMESTAMP` (нативного TIME нет) |\n| click | clickhouse | нет нативного TIME — через `Int`/`String` |\n| es | elasticsearch | `date` / `long` / `text` (по режиму) |\n\n## INTERVAL\n\n**Логический тип:** `io.debezium.time.MicroDuration` (mode=numeric) / `Interval` (mode=string).\n\nИсточники:\n\n| Тип источника | Source-коннектор | → Логический тип |\n|---|---|---|\n| PG/Oracle `interval` (mode=numeric) | pg/oracle (debezium) | MICRO_DURATION (int64) |\n| PG/Oracle `interval` (mode=string) | pg/oracle (debezium) | INTERVAL (строка) |\n| Oracle `INTERVAL YEAR TO MONTH` / `DAY TO SECOND` | oracle (debezium) | MICRO_DURATION / INTERVAL |\n\nВыходы по всем sink:\n\n| Sink | Коннектор | Тип приёмника |\n|---|---|---|\n| tdb | tarantool | tarantool `integer` (микросекунды, numeric) |\n| pg | jdbc | PG `bigint` (numeric) / `varchar` (string) |\n| oracle | jdbc | Oracle `NUMBER(19,0)` (numeric) / `VARCHAR2` (string) |\n| click | clickhouse | `Int64` (numeric) / `String` (string) |\n| es | elasticsearch | `long` (numeric) / `text` (string) |\n\n## ARRAY\n\n**Логический тип:** Kafka `ARRAY` (рекурсивно по элементам).\n\nИсточники:\n\n| Тип источника | Source-коннектор | → Логический тип |\n|---|---|---|\n| PG массивы (`int4[]`, `text[]`, …) | pg (debezium) | ARRAY |\n| Tarantool `array` | tdb (tarantool) | ARRAY(Json) |\n| TDG `ARRAY` | tdg (tarantool) | ARRAY |\n\nВыходы по всем sink:\n\n| Sink | Коннектор | Тип приёмника |\n|---|---|---|\n| tdb | tarantool | tarantool `array` (рекурсия по элементам) |\n| pg | jdbc | PG `text` (сериализация) |\n| oracle | jdbc | Oracle `VARCHAR2` / `CLOB` |\n| click | clickhouse | `Array(T)` |\n| es | elasticsearch | тип элемента (ES массивы неявные) |\n\n## MAP\n\n**Логический тип:** Kafka `MAP`.\n\nИсточники:\n\n| Тип источника | Source-коннектор | → Логический тип |\n|---|---|---|\n| PG `hstore` (mode=map) | pg (debezium) | MAP |\n| TDG `MAP` | tdg (tarantool) | MAP |\n\nВыходы по всем sink:\n\n| Sink | Коннектор | Тип приёмника |\n|---|---|---|\n| tdb | tarantool | tarantool `map` (рекурсия) |\n| pg | jdbc | PG `hstore` / `text` |\n| oracle | jdbc | Oracle `VARCHAR2` / `CLOB` |\n| click | clickhouse | `Map(K,V)` |\n| es | elasticsearch | вложенные поля |\n\n## STRUCT (вложенные структуры)\n\n**Логический тип:** Kafka `STRUCT`.\n\nИсточники:\n\n| Тип источника | Source-коннектор | → Логический тип |\n|---|---|---|\n| PG composite-типы | pg (debezium) | STRUCT |\n| Tarantool вложенные map | tdb (tarantool) | STRUCT |\n| TDG record | tdg (tarantool) | STRUCT |\n\nВыходы по всем sink:\n\n| Sink | Коннектор | Тип приёмника |\n|---|---|---|\n| tdb | tarantool | вложенный `map` (рекурсия по полям) |\n| pg | jdbc | PG `text` / `hstore` (сериализация) |\n| oracle | jdbc | Oracle `VARCHAR2` / `CLOB` |\n| click | clickhouse | `Tuple(...)` / `Nested(...)` |\n| es | elasticsearch | вложенный объект |\n\n## Спец-типы PostgreSQL/Oracle (Bits / Xml / Ltree / Geometry / Enum)\n\n**Логический тип:** `io.debezium.data.Bits` / `Xml` / `Ltree` / `geometry.Geometry` / `Enum` —\nна sink чаще всего идут как строка/байты (passthrough).\n\nИсточники:\n\n| Тип источника | Source-коннектор | → Логический тип |\n|---|---|---|\n| PG `bit(n)`/`varbit(n)` | pg (debezium) | Bits |\n| PG `xml`, Oracle `XMLTYPE` | pg/oracle (debezium) | Xml |\n| PG `ltree` | pg (debezium) | Ltree |\n| PG `geometry`/`geography` | pg (debezium) | Geometry |\n| PG enum-типы, TDG `ENUM` | pg/tdg | Enum |\n\nВыходы по всем sink (на примере Xml/Enum — строковые логические типы):\n\n| Sink | Коннектор | Тип приёмника |\n|---|---|---|\n| tdb | tarantool | tarantool `string` (passthrough) |\n| pg | jdbc | PG `bit`/`bit varying` (Bits) / `varchar` (прочие) |\n| oracle | jdbc | Oracle `VARCHAR2` / `RAW` (Bits) |\n| click | clickhouse | `String` (Enum → `Enum8`/`Enum16`) |\n| es | elasticsearch | `text` (Bits → `binary`) |\n\n---\n\n## Как читать под конкретную связку\n\n1. Найдите блок нужного **входного** типа (например, DECIMAL для PG `numeric`).\n2. В таблице «Источники» найдите строку своего источника.\n3. В таблице «Выходы по всем sink» найдите строку своего **приёмника**.\n4. Склейте: `<тип источника> — <source> ─▶ <ЛОГИЧЕСКИЙ ТИП> ─▶ <sink> — <тип приёмника>`.\n\nКаждый входной тип имеет N выходов — по одному на каждый sink (tdb, pg, oracle, click, es).\nЭто покрывает все связки source→sink через общий логический тип.", "--help-mock-sink-params": "==============================================================================\nio.tarantool.connector.MockSinkConnector  (sink, v4c326ea0-0c86-4452-858c-68e2896f8490)\n==============================================================================\n\n[General]\n  startup.sleep.ms : long = 0\n      Amount of milliseconds to sleep before start\n  topic.prefix : string\n      Topic prefix that identifies and provides a namespace for the particular database server/cluster is capturing changes. The topic prefix should be unique across all other connectors, since it is used as a prefix for all Kafka topic names that receive events emitted by this connector. Only alphanumeric characters, hyphens, dots and underscores must be accepted.\n  retriable.restart.connector.wait.ms : long = 10000\n      Time to wait before restarting connector after retriable exception occurs. Defaults to 10000ms.\n  tombstones.on.delete : boolean = true\n      Whether delete operations should be represented by a delete event and a subsequent tombstone event (true) or only by a delete event (false). Emitting the tombstone event (the default behavior) allows Kafka to completely delete all events pertaining to the given key once the source record got deleted.\n  max.queue.size : int = 8192\n      Maximum size of the queue for change events read from the database log but not yet recorded or forwarded. Defaults to 8192, and should always be larger than the maximum batch size.\n  max.batch.size : int = 2048\n      Maximum size of each batch of source records. Defaults to 2048.\n  poll.interval.ms : long = 500\n      Time to wait for new change events to appear after receiving no events, given in milliseconds. Defaults to 500 ms.\n  max.queue.size.in.bytes : long = 0\n      Maximum size of the queue in bytes for change events read from the database log but not yet recorded or forwarded. Defaults to 0. Mean the feature is not enabled\n  snapshot.delay.ms : long = 0\n      A delay period before a snapshot will begin, given in milliseconds. Defaults to 0 ms.\n  snapshot.fetch.size : int\n      The maximum number of records that should be loaded into memory while performing a snapshot.\n  incremental.snapshot.chunk.size : int = 1024\n      The maximum size of chunk (number of documents/rows) for incremental snapshotting\n  incremental.snapshot.allow.schema.changes : boolean = false\n      Detect schema change during an incremental snapshot and re-select a current chunk to avoid locking DDLs. Note that changes to a primary key are not supported and can cause incorrect results if performed during an incremental snapshot. Another limitation is that if a schema change affects only columns' default values, then the change won't be detected until the DDL is processed from the binlog stream. This doesn't affect the snapshot events' values, but the schema of snapshot events may have outdated defaults.\n  snapshot.include.collection.list : list\n      This setting must be set to specify a list of tables/collections whose snapshot must be taken on creating or restarting the connector.\n  provide.transaction.metadata : boolean = false\n      Enables transaction metadata extraction together with event counting\n  transaction.metadata.factory : class = class io.debezium.pipeline.txmetadata.DefaultTransactionMetadataFactory\n      Class to make transaction context & transaction struct/schemas\n  event.processing.failure.handling.mode : string = fail\n      Specify how failures during processing of events (i.e. when encountering a corrupted event) should be handled, including: 'fail' (the default) an exception indicating the problematic event and its position is raised, causing the connector to be stopped; 'warn' the problematic event and its position will be logged and the event will be skipped; 'ignore' the problematic event will be skipped.\n  converters : string\n      Optional list of custom converters that would be used instead of default ones. The converters are defined using '<converter.prefix>.type' config option and configured using options '<converter.prefix>.<option>'\n  post.processors : string\n      Optional list of post processors. The processors are defined using '<post.processor.prefix>.type' config option and configured using options '<post.processor.prefix.<option>'\n  skipped.operations : list = [t]\n      The comma-separated list of operations to skip during streaming, defined as: 'c' for inserts/create; 'u' for updates; 'd' for deletes, 't' for truncates, and 'none' to indicate nothing skipped. By default, only truncate operations will be skipped.\n  skip.messages.without.change : boolean = false\n      Enable to skip publishing messages when there is no change in included columns.This would essentially filter messages to be sent when there is no change in columns included as per column.include.list/column.exclude.list.For Postgres - this would require REPLICA IDENTITY of table to be FULL.\n  binary.handling.mode : string = bytes\n      Specify how binary (blob, binary, etc.) columns should be represented in change events, including: 'bytes' represents binary data as byte array (default); 'base64' represents binary data as base64-encoded string; 'base64-url-safe' represents binary data as base64-url-safe-encoded string; 'hex' represents binary data as hex-encoded (base16) string\n  schema.name.adjustment.mode : string = none\n      Specify how schema names should be adjusted for compatibility with the message converter used by the connector, including: 'avro' replaces the characters that cannot be used in the Avro type name with underscore; 'avro_unicode' replaces the underscore or characters that cannot be used in the Avro type name with corresponding unicode like _uxxxx. Note: _ is an escape sequence like backslash in Java;'none' does not apply any adjustment (default)\n  field.name.adjustment.mode : string = none\n      Specify how field names should be adjusted for compatibility with the message converter used by the connector, including: 'avro' replaces the characters that cannot be used in the Avro type name with underscore; 'avro_unicode' replaces the underscore or characters that cannot be used in the Avro type name with corresponding unicode like _uxxxx. Note: _ is an escape sequence like backslash in Java;'none' does not apply any adjustment (default)\n  query.fetch.size : int = 0\n      The maximum number of records that should be loaded into memory while streaming. A value of '0' uses the default JDBC fetch size.\n  snapshot.max.threads : int = 1\n      The maximum number of threads used to perform the snapshot. Defaults to 1.\n  snapshot.max.threads.multiplier : int = 1\n      The factor used to scale the number of snapshot chunks per table. The default behavior is to take 'row_count/snapshot.max.threads' to compute the number of rows per chunks. This may not be ideal for larger tables, and using the multiplier, the formula is adjusted to increase the number of chunks by using 'row_count/(snapshot.max.threads * snapshot.max.threads.multiplier).\n  internal.legacy.snapshot.max.threads : boolean = false\n      When enabled, uses the legacy table-per-thread parallel snapshot algorithm. When set to false (the default), tables are split into chunks and processed across all snapshot threads, allowing for higher concurrency for snapshots.\n  signal.data.collection : list\n      The name of the data collection that is used to send signals/commands to Debezium. For multi-partition mode connectors, multiple signal data collections can be specified as a comma-separated list. Signaling is disabled when not set.\n  signal.poll.interval.ms : long = 5000\n      Interval for looking for new signals in registered channels, given in milliseconds. Defaults to 5 seconds.\n  signal.enabled.channels : list = [source]\n      List of channels names that are enabled. Source channel is enabled by default\n  topic.naming.strategy : class = class io.debezium.schema.SchemaTopicNamingStrategy\n      The name of the TopicNamingStrategy class that should be used to determine the topic name for data change, schema change, transaction, heartbeat event etc.\n  internal.custom.retriable.exception : string\n      Provide a temporary workaround for an error that should be retriable. If set a stacktrace of non-retriable exception is traversed and messages are matched against this regular expression. If matched the error is changed to retriable.\n  notification.enabled.channels : list\n      List of notification channels names that are enabled.\n  sourceinfo.struct.maker : class\n      The name of the SourceInfoStructMaker class that returns SourceInfo schema and struct.\n  errors.max.retries : int = -1\n      The maximum number of retries on connection errors before failing (-1 = no limit, 0 = disabled, > 0 = num of retries).\n  custom.metric.tags : list\n      The custom metric tags will accept key-value pairs to customize the MBean object name which should be appended the end of regular name, each key would represent a tag for the MBean object name, and the corresponding value would be the value of that tag the key is. For example: k1=v1,k2=v2\n  incremental.snapshot.watermarking.strategy : string = INSERT_INSERT\n      Specify the strategy used for watermarking during an incremental snapshot: 'insert_insert' both open and close signal is written into signal data collection (default); 'insert_delete' only open signal is written on signal data collection, the close will delete the relative open signal;\n  snapshot.mode.custom.name : string\n      When 'snapshot.mode' is set as custom, this setting must be set to specify a the name of the custom implementation provided in the 'name()' method. The implementations must implement the 'Snapshotter' interface and is called on each app boot to determine whether to do a snapshot.\n  event.converting.failure.handling.mode : string = warn\n      Specify how failures during converting of event should be handled, including: 'fail' throw an exception that the column of event conversion is failed with unmatched schema type, causing the connector to be stopped. it could need schema recovery to covert successfully; 'warn' (the default) the value of column of event that conversion failed will be null and be logged with warn level; 'skip' the value of column of event that conversion failed will be null and be logged with debug level.\n  streaming.delay.ms : long = 0\n      A delay period after the snapshot is completed and the streaming begins, given in milliseconds. Defaults to 0 ms.\n  snapshot.locking.mode.custom.name : string\n      When 'snapshot.locking.mode' is set as custom, this setting must be set to specify a the name of the custom implementation provided in the 'name()' method. The implementations must implement the 'SnapshotterLocking' interface and is called to determine how to lock tables during schema snapshot.\n  snapshot.query.mode : string = select_all\n      Controls query used during the snapshot\n  snapshot.query.mode.custom.name : string\n      When 'snapshot.query.mode' is set as custom, this setting must be set to specify a the name of the custom implementation provided in the 'name()' method. The implementations must implement the 'SnapshotterQuery' interface and is called to determine how to build queries during snapshot.\n  snapshot.mode.configuration.based.snapshot.data : boolean = false\n      When 'snapshot.mode' is set as configuration_based, this setting permits to specify whenever the data should be snapshotted or not.\n  snapshot.mode.configuration.based.snapshot.schema : boolean = false\n      When 'snapshot.mode' is set as configuration_based, this setting permits to specify whenever the schema should be snapshotted or not.\n  snapshot.mode.configuration.based.start.stream : boolean = false\n      When 'snapshot.mode' is set as configuration_based, this setting permits to specify whenever the stream should start or not after snapshot.\n  snapshot.mode.configuration.based.snapshot.on.schema.error : boolean = false\n      When 'snapshot.mode' is set as configuration_based, this setting permits to specify whenever the schema should be snapshotted or not in case of error.\n  snapshot.mode.configuration.based.snapshot.on.data.error : boolean = false\n      When 'snapshot.mode' is set as configuration_based, this setting permits to specify whenever the data should be snapshotted or not in case of error.\n  internal.log.position.check.enable : boolean = true\n      When enabled the connector checks if the position stored in the offset is still available in the log\n  internal.advanced.metrics.enable : boolean = false\n      When enabled the connector will emit advanced streaming metrics\n  connection.validation.timeout.ms : long = 60000\n      The maximum time in milliseconds to wait for connection validation to complete. Defaults to 60 seconds.\n  executor.shutdown.timeout.ms : long = 4000\n      The maximum time in milliseconds to wait for task executor to shut down.\n  openlineage.integration.enabled : boolean = false\n      Enable Debezium to emit data lineage metadata through OpenLineage API\n  openlineage.integration.config.file.path : string = ./openlineage.yml\n      Path to OpenLineage file configuration. See https://openlineage.io/docs/client/java/configuration\n  openlineage.integration.job.namespace : string\n      The job's namespace emitted by Debezium\n  openlineage.integration.job.description : string = Debezium change data capture job\n      The job's description emitted by Debezium\n  openlineage.integration.job.tags : list\n      The job's tags emitted by Debezium. A comma-separated list of key-value pairs.For example: k1=v1,k2=v2\n  openlineage.integration.job.owners : list\n      The job's owners emitted by Debezium. A comma-separated list of key-value pairs.For example: k1=v1,k2=v2\n  openlineage.integration.dataset.kafka.bootstrap.servers : string\n      The Kafka bootstrap server address used as input/output namespace/\n  custom.sanitize.pattern : string = .*secret$|.*password$|.*sasl\\.jaas\\.config$|.*basic\\.auth\\.user\\.info|.*registry\\.auth\\.client-secret\n      Regular expression identifying configuration keys whose values should be masked. When set, this custom pattern replaces Debezium’s default password masking pattern.\n  extended.headers.enabled : boolean = true\n      Enable/Disable Debezium context headers that provides essential metadata for tracking and identifying the source of CDC events in downstream processing systems.\n  guardrail.collections.max : int = 0\n      The maximum number of collections or tables that can be captured by the connector. When this limit is exceeded, the action specified by 'guardrail.collections.limit.action' will be taken. Set to 0 to disable this guardrail.\n  guardrail.collections.limit.action : string = warn\n      Specify the action to take when a guardrail collections limit is exceeded: 'warn' (the default) logs a warning message and continues processing; 'fail' stops the connector with an error.", "--help-mock-source-params": "==============================================================================\nio.tarantool.connector.MockSourceConnector  (source, v0.1.0)\n==============================================================================\n\n[General]\n  mock.schema.string : string\n      This parameter contains json string representing avro schema for generated entities\n  mock.schema.file : string\n      This parameter contains filename with avro schema\n  mock.random.seed : long = 0\n      Value of initial seed for random generator\n  startup.sleep.ms : long = 0\n      Amount of milliseconds to sleep before start\n  mock.messages.max : long = 0\n          A max messages count to generate.\n    If equals zero - message generation will be unlimited\n\n  regenerate : boolean = false\n  topic.prefix : string\n      Topic prefix that identifies and provides a namespace for the particular database server/cluster is capturing changes. The topic prefix should be unique across all other connectors, since it is used as a prefix for all Kafka topic names that receive events emitted by this connector. Only alphanumeric characters, hyphens, dots and underscores must be accepted.\n  retriable.restart.connector.wait.ms : long = 10000\n      Time to wait before restarting connector after retriable exception occurs. Defaults to 10000ms.\n  tombstones.on.delete : boolean = true\n      Whether delete operations should be represented by a delete event and a subsequent tombstone event (true) or only by a delete event (false). Emitting the tombstone event (the default behavior) allows Kafka to completely delete all events pertaining to the given key once the source record got deleted.\n  max.queue.size : int = 8192\n      Maximum size of the queue for change events read from the database log but not yet recorded or forwarded. Defaults to 8192, and should always be larger than the maximum batch size.\n  max.batch.size : int = 2048\n      Maximum size of each batch of source records. Defaults to 2048.\n  poll.interval.ms : long = 500\n      Time to wait for new change events to appear after receiving no events, given in milliseconds. Defaults to 500 ms.\n  max.queue.size.in.bytes : long = 0\n      Maximum size of the queue in bytes for change events read from the database log but not yet recorded or forwarded. Defaults to 0. Mean the feature is not enabled\n  snapshot.delay.ms : long = 0\n      A delay period before a snapshot will begin, given in milliseconds. Defaults to 0 ms.\n  snapshot.fetch.size : int\n      The maximum number of records that should be loaded into memory while performing a snapshot.\n  incremental.snapshot.chunk.size : int = 1024\n      The maximum size of chunk (number of documents/rows) for incremental snapshotting\n  incremental.snapshot.allow.schema.changes : boolean = false\n      Detect schema change during an incremental snapshot and re-select a current chunk to avoid locking DDLs. Note that changes to a primary key are not supported and can cause incorrect results if performed during an incremental snapshot. Another limitation is that if a schema change affects only columns' default values, then the change won't be detected until the DDL is processed from the binlog stream. This doesn't affect the snapshot events' values, but the schema of snapshot events may have outdated defaults.\n  snapshot.include.collection.list : list\n      This setting must be set to specify a list of tables/collections whose snapshot must be taken on creating or restarting the connector.\n  provide.transaction.metadata : boolean = false\n      Enables transaction metadata extraction together with event counting\n  transaction.metadata.factory : class = class io.debezium.pipeline.txmetadata.DefaultTransactionMetadataFactory\n      Class to make transaction context & transaction struct/schemas\n  event.processing.failure.handling.mode : string = fail\n      Specify how failures during processing of events (i.e. when encountering a corrupted event) should be handled, including: 'fail' (the default) an exception indicating the problematic event and its position is raised, causing the connector to be stopped; 'warn' the problematic event and its position will be logged and the event will be skipped; 'ignore' the problematic event will be skipped.\n  converters : string\n      Optional list of custom converters that would be used instead of default ones. The converters are defined using '<converter.prefix>.type' config option and configured using options '<converter.prefix>.<option>'\n  post.processors : string\n      Optional list of post processors. The processors are defined using '<post.processor.prefix>.type' config option and configured using options '<post.processor.prefix.<option>'\n  skipped.operations : list = [t]\n      The comma-separated list of operations to skip during streaming, defined as: 'c' for inserts/create; 'u' for updates; 'd' for deletes, 't' for truncates, and 'none' to indicate nothing skipped. By default, only truncate operations will be skipped.\n  skip.messages.without.change : boolean = false\n      Enable to skip publishing messages when there is no change in included columns.This would essentially filter messages to be sent when there is no change in columns included as per column.include.list/column.exclude.list.For Postgres - this would require REPLICA IDENTITY of table to be FULL.\n  binary.handling.mode : string = bytes\n      Specify how binary (blob, binary, etc.) columns should be represented in change events, including: 'bytes' represents binary data as byte array (default); 'base64' represents binary data as base64-encoded string; 'base64-url-safe' represents binary data as base64-url-safe-encoded string; 'hex' represents binary data as hex-encoded (base16) string\n  schema.name.adjustment.mode : string = none\n      Specify how schema names should be adjusted for compatibility with the message converter used by the connector, including: 'avro' replaces the characters that cannot be used in the Avro type name with underscore; 'avro_unicode' replaces the underscore or characters that cannot be used in the Avro type name with corresponding unicode like _uxxxx. Note: _ is an escape sequence like backslash in Java;'none' does not apply any adjustment (default)\n  field.name.adjustment.mode : string = none\n      Specify how field names should be adjusted for compatibility with the message converter used by the connector, including: 'avro' replaces the characters that cannot be used in the Avro type name with underscore; 'avro_unicode' replaces the underscore or characters that cannot be used in the Avro type name with corresponding unicode like _uxxxx. Note: _ is an escape sequence like backslash in Java;'none' does not apply any adjustment (default)\n  query.fetch.size : int = 0\n      The maximum number of records that should be loaded into memory while streaming. A value of '0' uses the default JDBC fetch size.\n  snapshot.max.threads : int = 1\n      The maximum number of threads used to perform the snapshot. Defaults to 1.\n  snapshot.max.threads.multiplier : int = 1\n      The factor used to scale the number of snapshot chunks per table. The default behavior is to take 'row_count/snapshot.max.threads' to compute the number of rows per chunks. This may not be ideal for larger tables, and using the multiplier, the formula is adjusted to increase the number of chunks by using 'row_count/(snapshot.max.threads * snapshot.max.threads.multiplier).\n  internal.legacy.snapshot.max.threads : boolean = false\n      When enabled, uses the legacy table-per-thread parallel snapshot algorithm. When set to false (the default), tables are split into chunks and processed across all snapshot threads, allowing for higher concurrency for snapshots.\n  signal.data.collection : list\n      The name of the data collection that is used to send signals/commands to Debezium. For multi-partition mode connectors, multiple signal data collections can be specified as a comma-separated list. Signaling is disabled when not set.\n  signal.poll.interval.ms : long = 5000\n      Interval for looking for new signals in registered channels, given in milliseconds. Defaults to 5 seconds.\n  signal.enabled.channels : list = [source]\n      List of channels names that are enabled. Source channel is enabled by default\n  topic.naming.strategy : class = class io.debezium.schema.SchemaTopicNamingStrategy\n      The name of the TopicNamingStrategy class that should be used to determine the topic name for data change, schema change, transaction, heartbeat event etc.\n  internal.custom.retriable.exception : string\n      Provide a temporary workaround for an error that should be retriable. If set a stacktrace of non-retriable exception is traversed and messages are matched against this regular expression. If matched the error is changed to retriable.\n  notification.enabled.channels : list\n      List of notification channels names that are enabled.\n  sourceinfo.struct.maker : class\n      The name of the SourceInfoStructMaker class that returns SourceInfo schema and struct.\n  errors.max.retries : int = -1\n      The maximum number of retries on connection errors before failing (-1 = no limit, 0 = disabled, > 0 = num of retries).\n  custom.metric.tags : list\n      The custom metric tags will accept key-value pairs to customize the MBean object name which should be appended the end of regular name, each key would represent a tag for the MBean object name, and the corresponding value would be the value of that tag the key is. For example: k1=v1,k2=v2\n  incremental.snapshot.watermarking.strategy : string = INSERT_INSERT\n      Specify the strategy used for watermarking during an incremental snapshot: 'insert_insert' both open and close signal is written into signal data collection (default); 'insert_delete' only open signal is written on signal data collection, the close will delete the relative open signal;\n  snapshot.mode.custom.name : string\n      When 'snapshot.mode' is set as custom, this setting must be set to specify a the name of the custom implementation provided in the 'name()' method. The implementations must implement the 'Snapshotter' interface and is called on each app boot to determine whether to do a snapshot.\n  event.converting.failure.handling.mode : string = warn\n      Specify how failures during converting of event should be handled, including: 'fail' throw an exception that the column of event conversion is failed with unmatched schema type, causing the connector to be stopped. it could need schema recovery to covert successfully; 'warn' (the default) the value of column of event that conversion failed will be null and be logged with warn level; 'skip' the value of column of event that conversion failed will be null and be logged with debug level.\n  streaming.delay.ms : long = 0\n      A delay period after the snapshot is completed and the streaming begins, given in milliseconds. Defaults to 0 ms.\n  snapshot.locking.mode.custom.name : string\n      When 'snapshot.locking.mode' is set as custom, this setting must be set to specify a the name of the custom implementation provided in the 'name()' method. The implementations must implement the 'SnapshotterLocking' interface and is called to determine how to lock tables during schema snapshot.\n  snapshot.query.mode : string = select_all\n      Controls query used during the snapshot\n  snapshot.query.mode.custom.name : string\n      When 'snapshot.query.mode' is set as custom, this setting must be set to specify a the name of the custom implementation provided in the 'name()' method. The implementations must implement the 'SnapshotterQuery' interface and is called to determine how to build queries during snapshot.\n  snapshot.mode.configuration.based.snapshot.data : boolean = false\n      When 'snapshot.mode' is set as configuration_based, this setting permits to specify whenever the data should be snapshotted or not.\n  snapshot.mode.configuration.based.snapshot.schema : boolean = false\n      When 'snapshot.mode' is set as configuration_based, this setting permits to specify whenever the schema should be snapshotted or not.\n  snapshot.mode.configuration.based.start.stream : boolean = false\n      When 'snapshot.mode' is set as configuration_based, this setting permits to specify whenever the stream should start or not after snapshot.\n  snapshot.mode.configuration.based.snapshot.on.schema.error : boolean = false\n      When 'snapshot.mode' is set as configuration_based, this setting permits to specify whenever the schema should be snapshotted or not in case of error.\n  snapshot.mode.configuration.based.snapshot.on.data.error : boolean = false\n      When 'snapshot.mode' is set as configuration_based, this setting permits to specify whenever the data should be snapshotted or not in case of error.\n  internal.log.position.check.enable : boolean = true\n      When enabled the connector checks if the position stored in the offset is still available in the log\n  internal.advanced.metrics.enable : boolean = false\n      When enabled the connector will emit advanced streaming metrics\n  connection.validation.timeout.ms : long = 60000\n      The maximum time in milliseconds to wait for connection validation to complete. Defaults to 60 seconds.\n  executor.shutdown.timeout.ms : long = 4000\n      The maximum time in milliseconds to wait for task executor to shut down.\n  openlineage.integration.enabled : boolean = false\n      Enable Debezium to emit data lineage metadata through OpenLineage API\n  openlineage.integration.config.file.path : string = ./openlineage.yml\n      Path to OpenLineage file configuration. See https://openlineage.io/docs/client/java/configuration\n  openlineage.integration.job.namespace : string\n      The job's namespace emitted by Debezium\n  openlineage.integration.job.description : string = Debezium change data capture job\n      The job's description emitted by Debezium\n  openlineage.integration.job.tags : list\n      The job's tags emitted by Debezium. A comma-separated list of key-value pairs.For example: k1=v1,k2=v2\n  openlineage.integration.job.owners : list\n      The job's owners emitted by Debezium. A comma-separated list of key-value pairs.For example: k1=v1,k2=v2\n  openlineage.integration.dataset.kafka.bootstrap.servers : string\n      The Kafka bootstrap server address used as input/output namespace/\n  custom.sanitize.pattern : string = .*secret$|.*password$|.*sasl\\.jaas\\.config$|.*basic\\.auth\\.user\\.info|.*registry\\.auth\\.client-secret\n      Regular expression identifying configuration keys whose values should be masked. When set, this custom pattern replaces Debezium’s default password masking pattern.\n  extended.headers.enabled : boolean = true\n      Enable/Disable Debezium context headers that provides essential metadata for tracking and identifying the source of CDC events in downstream processing systems.\n  guardrail.collections.max : int = 0\n      The maximum number of collections or tables that can be captured by the connector. When this limit is exceeded, the action specified by 'guardrail.collections.limit.action' will be taken. Set to 0 to disable this guardrail.\n  guardrail.collections.limit.action : string = warn\n      Specify the action to take when a guardrail collections limit is exceeded: 'warn' (the default) logs a warning message and continues processing; 'fail' stops the connector with an error.", "--help-ordering": "---\nid: \"0105\"\nstatus: Черновик\n---\n\n# Порядок событий: границы упорядоченности по source и sink\n\n## Статус\n\n`Черновик`\n\n## Контекст\n\nЭто **не** про гарантии доставки (дубли / at-least-once / атомарность транзакций —\nсм. [`0101-transaction-semantics.md`](0101-transaction-semantics.md)). Это про\n**порядок событий**: в каких границах CDC сохраняет относительный порядок изменений,\nи что этот порядок ломает.\n\nПорядок и доставка — разные вещи. Запись может быть доставлена (не потеряна), но\nприменена **не в том порядке**, в котором произошла на источнике. Для CDC это\nкритично: если `UPDATE x=1` и `UPDATE x=2` одной строки применятся в приёмнике в\nобратном порядке, в приёмнике останется `x=1` — «залипшее» старое значение.\n\nКлючевой вопрос: **в пределах чего гарантирован порядок** — глобально? в пределах\nодной строки (PK)? одной партиции очереди? одного инстанса источника? Ответ зависит\nот того, **сколько workers / tasks / partitions** задействовано и **как настроен\nмаршрут событий** (по какому ключу они разбрасываются по партициям/шардам/стримам).\n\nРазбор проведён по коду всех звеньев: source-коннекторы (наши + Debezium),\nworker, sink-коннекторы (наши + Debezium JDBC), промежуточные очереди TQE/Kafka.\n\n## Решение\n\nЗафиксировать фактические (вытекающие из кода) границы порядка как контракт и дать\nпрофили для перенастройки связок под нужную гарантию порядка.\n\n### 1. Три уровня, на которых живёт порядок\n\n```\nSource БД ──(source connector)──▶ [очередь?] ──(sink connector)──▶ Sink БД\n   порядок LSN/SCN/WAL         порядок в партиции      порядок применения\n```\n\n- **Source** определяет исходный порядок (LSN у PG, SCN у Oracle, WAL-vclock у\n  Tarantool, курсор у TQE, offset у Kafka).\n- **Транспорт** (прямая стыковка / очередь) определяет, сохраняется ли этот порядок\n  целиком или разбивается по партициям/ключам.\n- **Sink** определяет, применяются ли события последовательно или параллельно.\n\n### 2. Прямая стыковка (CDC Worker): worker сам гарантирует тотальный порядок\n\nВ режиме прямой стыковки (source → sink без брокера) worker — **однопоточный**:\nединственный `newSingleThreadExecutor`, цикл `poll() → transform → put() → commit`\nв одном потоке, монотонный `virtualOffset++`, единый искусственный `ZERO_PARTITION`.\nПорядок `poll()` == порядок `put()`. Переупорядочивания в самом worker **нет**.\n\n> Значит в прямой стыковке порядок теряется только на **краях**: если source\n> отдаёт из нескольких инстансов (см. §3), или sink применяет параллельно (§4).\n\n### 3. Границы порядка на стороне SOURCE\n\n| Source | Порядок гарантирован в пределах | Что ломает | Ключевые параметры |\n|---|---|---|---|\n| **PostgreSQL** (Debezium) | глобально — LSN одного слота репликации | >1 партиция топика (при выводе в Kafka) → порядок только по ключу-строке | single-task (`tasks.max` игнорируется), `message.key.columns` |\n| **Oracle** (Debezium) | глобально — commit-SCN (per-redo-thread при RAC) | то же, что PG | single-task (`maxTasks>1` → ошибка), `message.key.columns` |\n| **Tarantool / TDB** | один инстанс — тотально по WAL-vclock (все спейсы вместе) | **>1 хоста в `connect.targets`** (несколько tasks) → межинстансовый порядок не определён | `connect.targets`, `batch.size` (только размер) |\n| **TDG / TDG2** | как Tarantool — по WAL инстанса | то же | `connect.targets` |\n| **TQE** (очередь как источник) | одна очередь (tube) — FIFO по курсору | одна очередь на task — не ломается | `queue`, `max.batch.size` |\n| **Kafka** (топик как источник) | одна Kafka-партиция — гарантия Kafka | >1 назначенной партиции на единственный task → записи разных партиций чередуются | `topics` (какие topic-partition читаются) |\n\n**Общее для Debezium (PG/Oracle):** оба source — строго **single-task**, на выходе\nдают глобальный порядок по LSN/SCN. Debezium **не задаёт** Kafka-партицию — её\nвыбирает партиционер по ключу=PK. Поэтому при выводе в Kafka с >1 партицией\nглобальный порядок по таблице теряется, остаётся **порядок по ключу** (все события\nодной строки → одна партиция).\n\n### 4. Границы порядка на стороне SINK\n\n| Sink | Порядок сохраняется в пределах | Что ломает | Защита от out-of-order |\n|---|---|---|---|\n| **Tarantool / TDB** | один PK в одном спейсе (последовательная цепочка futures) | разные PK применяются **параллельно**; DELETE-схлопывание в пределах `put()` | нет (нет version/LSN) |\n| **PostgreSQL / Oracle** (Debezium JDBC) | одна Kafka-партиция / один task | **>1 task** (`tasks.max`); `use.reduction.buffer` схлопывает по ключу; insert-буфер флашится раньше delete | `insert.mode=upsert` — идемпотентность, но НЕ восстановление порядка |\n| **Elasticsearch** | один `_id` в одном индексе (последовательная цепочка) | разные `_id` **параллельно** (пул потоков); DELETE-clear | **нет** (нет external version / if_seq_no) |\n| **Ingestor** | вся коллекция одной задачи — синхронная последовательная отправка | >1 task в один stream | нет (порядок = синхронность) |\n| **Kafka** (топик как приёмник) | одна целевая партиция | разные ключи → разные партиции; `max.in.flight>1` при ретраях | `max.in.flight=1` + `acks=all` (форсятся) |\n| **ClickHouse** | — (пишет что прислали) | — | — |\n\n**Паттерн наших «прикладных» sink (Tarantool, ES):** группировка по ключу + строго\nпоследовательная цепочка `CompletableFuture` на ключ + **параллельный запуск между\nключами**. Порядок гарантирован **только per-key**, между ключами — нет. Версий/seqno\nдля защиты нет — если один PK прилетит переупорядоченным, применится «как пришло».\n\n### 5. Порядок через ОЧЕРЕДЬ (TQE / Kafka как буфер)\n\nОчередь между source и sink **всегда** вводит партиционирование → порядок дробится.\n\n**TQE (`tarantool-mq` sink) — здесь порядок сознательно разбивается ради throughput:**\n\n- Каждая запись хешируется в **split-группу**: `murmur3(ключ) % batch.split.groups`.\n- Разные группы пишутся в **разные gRPC-стримы** параллельно (`processing.streams`).\n- Порядок сохраняется **только внутри одной split-группы** (одинаковый хеш ключа).\n- Дефолты: `batch.split.groups=100`, `processing.streams=8` → сильный параллелизм.\n\n| Что нужно | Настройка TQE sink |\n|---|---|\n| **Глобальный строгий порядок** | `batch.split.groups=1` + `processing.streams=1` (одна группа → один стрим → FIFO), ценой пропускной способности |\n| **Порядок по ключу-строке** (обычно достаточно для CDC) | оставить routing по ключу (`use.kafka.partition.routing=false`, дефолт) — события одного PK → одна группа → порядок сохранён |\n| **Максимальный throughput, порядок не важен** | дефолт (100 групп, 8 стримов) |\n\n> Тонкость: ретрай **отдельного батча** при ошибке в TQE sink может уйти после уже\n> отправленных следующих батчей той же группы → возможно нарушение порядка **внутри\n> группы**. Окно подтверждений это не предотвращает (оно про offset/at-least-once).\n\n**Kafka как буфер:** партиция выбирается партиционером по ключу=PK. События одного\nключа → одна партиция → порядок сохранён (`max.in.flight=1`). Разные ключи → разные\nпартиции → межпартиционного порядка нет. Число партиций топика — граница параллелизма.\n\n### 6. Профили `application-ordering-*.yml`\n\nАддитивные профили, накладываются поверх source/sink-профилей пресета (последний\nпобеждает). Задают **только** параметры, влияющие на порядок:\n\n| Профиль | Что делает | Когда |\n|---|---|---|\n| `ordering-strict-tqe` | TQE sink: `batch.split.groups=1`, `processing.streams=1` → строгий FIFO | нужен глобальный порядок через TQE, throughput вторичен |\n| `ordering-by-key-tqe` | TQE sink: routing по ключу (дефолтные группы/стримы, `use.kafka.partition.routing=false`) → порядок per-PK | обычный CDC через TQE: строки независимы |\n| `ordering-single-source` | Source: комментарий-напоминание держать `connect.targets` в один хост (Tarantool) для тотального порядка | Tarantool/TDG source, важен глобальный порядок |\n\nЗапуск в связке с пресетом:\n\n```bash\n# строгий порядок через TQE (ценой throughput)\njava -jar cdc-worker.jar --preset=pg-tqe --profile=ordering-strict-tqe\n\n# порядок по ключу (throughput сохранён), обычный режим\njava -jar cdc-worker.jar --preset=pg-tqe --profile=ordering-by-key-tqe\n```\n\nOverride отдельных значений — через `--props`:\n\n```bash\njava -jar cdc-worker.jar --preset=pg-tqe --profile=ordering-by-key-tqe \\\n  --props sink.connector.batch.split.groups=4 --props sink.connector.processing.streams=4\n```\n\n## Последствия\n\n- Для строк, которые изменяются **независимо** (разные PK), порядок per-key —\n  достаточная гарантия: наши sink дают его «из коробки» (цепочка по ключу).\n- Для сценариев, где важен **глобальный** порядок (напр. модель, читающая несколько\n  таблиц консистентно), нужен либо single-partition транспорт, либо `ordering-strict-*`.\n- Приёмники **не имеют защиты от out-of-order** (нет version/seqno/LSN-guard, кроме\n  Kafka sink `max.in.flight=1`). Порядок держится на топологии, а не на условной\n  записи. Значит нельзя произвольно наращивать параллелизм sink, не подумав о ключе.\n- Идемпотентность приёмника (upsert по PK) обязательна — она защищает от дублей, но\n  **не** восстанавливает порядок. Порядок и идемпотентность решают разные проблемы.\n\n## Затрагиваемые модули/файлы\n\n- Worker (тотальный порядок): `cdc-worker/.../CDCWorker.java`,\n  `.../offsets/Offsetter.java`, `.../offsets/Constants.java`\n- Tarantool source: `connectors/tarantool-source-connector/.../TarantoolConnector.java`\n  (`taskConfigs`), `.../replica/ReplicaConsumer.java`\n- TQE sink (split-группы/стримы): `connectors/tarantool-mq-connector/.../sink/TQESinkTask.java`,\n  `.../sink/TQESinkConnectorConfig.java`\n- Tarantool sink (цепочка по PK): `connectors/tarantool-sink-connector/.../TarantoolSinkTask.java`\n- ES sink: `connectors/elasticsearch-sink-connector/.../ElasticsearchSinkTask.java`\n- Kafka sink (`max.in.flight=1`): `connectors/kafka-connector/.../sink/KafkaSinkTask.java`\n- Debezium (single-task, ключ=PK, reduction buffer): `PostgresConnector`, `OracleConnector`,\n  `JdbcChangeEventSink`, `ReducedRecordBuffer`, `EventDispatcher`\n- Профили: `cdc-worker/src/main/resources/application-ordering-*.yml`\n- Help-флаг: `cdc-worker/.../CDCWorkerApplication.java`,\n  `.../preset/PresetEnvironmentPostProcessor.java`\n\n## Как поддерживается\n\nДокумент описательный, автоматической проверки нет. При изменении логики\nпартиционирования/параллелизма коннекторов (особенно `TQESinkTask.getSplitGroupId`,\nдефолтов `batch.split.groups`/`processing.streams`, task-модели коннекторов) —\nсверять и обновлять таблицы §3–§5.\n\nПечатается воркером через `--help-ordering` (документ запечён в classpath jar так же,\nкак ADR 0101/0102/0103).\n\n## Как исправлять нарушения\n\nНаблюдается «залипшее» старое значение / переупорядочивание в приёмнике:\n\n1. Определите транспорт (прямая стыковка / очередь) и число tasks/partitions/инстансов.\n2. По §3–§5 найдите, где порядок теряется (multi-instance source, split-группы TQE,\n   параллельные ключи в sink, >1 партиция).\n3. Сузьте параллелизм там, где нужен порядок: профиль `ordering-strict-*`, один\n   инстанс в `connect.targets`, одна партиция транспорта, либо убедитесь, что routing\n   идёт по стабильному ключу (тогда достаточно порядка per-key).\n\n## Ссылки\n\n- [Транзакционная семантика доставки](0101-transaction-semantics.md)\n- [Управление offset-ами](0104-offset-management.md)\n- Debezium: `PostgresConnector.taskConfigs`, `OracleConnector.taskConfigs`,\n  `debezium-connector-jdbc` (`JdbcChangeEventSink`, `ReducedRecordBuffer`)", "--help-pg-pg-docker-helm": "# ========== Runbook: helm deploy of preset pg-pg-docker ==========\n# Deploys the CDC worker into k8s. DBs/queue are assumed to already run somewhere the\n# cluster can reach — this only brings up the worker pointed at them.\n# For pg-pg the source/sink Postgres VMs are provisioned first, in the Terraform step 0.\n#\n# --- 0. Source/sink Postgres VMs (VK Cloud, Terraform) ---\n# Brings up two VMs (pg source + pg sink) with the official vk-cs Terraform modules\n# (network + firewall + compute). Postgres is installed on boot via cloud-init, so the\n# VMs come up ready. Auth uses your project's openrc (OpenStack v3) env vars; run from a\n# fresh ./infrastructure dir. Requires terraform >= 1.3 (or opentofu).\nmkdir -p infrastructure && cd infrastructure\n\n# openrc creds: in the cloud web console (UI) open your project's access page\n# and download the openrc.sh script, then source it. It exports the OS_* env vars\n# the vkcs provider reads (OS_AUTH_URL / OS_PROJECT_ID / OS_REGION_NAME / ...).\n# On token-auth clouds it prompts for an API token — paste the token you also get\n# from the UI (project -> API token); on password clouds it prompts for the password.\nsource ~/<project>-openrc.sh\n\ncat > main.tf <<'EOF'\nterraform {\n  required_providers {\n    vkcs = { source = \"vk-cs/vkcs\", version = \"< 1.0.0\" }\n  }\n}\nprovider \"vkcs\" {}\n\n# SSH keypair for the cloud-user login. Point it at your public key; the\n# compute module wires it into both VMs via `key_pair` below. Without a\n# keypair the VMs have no authorized key and you cannot ssh in.\nresource \"vkcs_compute_keypair\" \"kp\" {\n  name       = \"cdc-pg-pg\"\n  public_key = file(\"~/.ssh/id_rsa.pub\")   # your public key\n}\n\n# The k8s cluster that runs the CDC worker lives in an existing project network\n# (here `cdc_net`, 10.0.0.0/24). Attach the VMs there — NOT a fresh isolated\n# network — so the in-cluster worker reaches PG by its internal 10.0.0.x IP.\n# Find yours with `openstack network list`.\ndata \"vkcs_networking_network\" \"cdc\" {\n  name = \"cdc_net\"\n}\n\nmodule \"firewall\" {\n  source = \"https://github.com/vk-cs/terraform-vkcs-firewall/archive/refs/tags/v0.0.3.zip//terraform-vkcs-firewall-0.0.3\"\n  name   = \"cdc-pg-pg\"\n  rules  = [\n    { protocol = \"tcp\", port = 22, remote_ip_prefix = \"0.0.0.0/0\" },   # ssh\n    { protocol = \"tcp\", port = 5432, remote_ip_prefix = \"0.0.0.0/0\" }, # pg sink\n    { protocol = \"tcp\", port = 5433, remote_ip_prefix = \"0.0.0.0/0\" }, # pg source\n    { protocol = \"icmp\", remote_ip_prefix = \"0.0.0.0/0\" },\n  ]\n}\n\n# cloud-init: just install docker (the image push + `docker run` happen in\n# step 0b — Docker Hub rate-limits anonymous pulls from the shared cloud\n# egress IP, so we don't pull here).\nlocals {\n  ci_docker = <<-CI\n    #cloud-config\n    package_update: true\n    packages: [docker.io]\n    runcmd:\n      - systemctl enable --now docker\n      - usermod -aG docker cloud-user\n    CI\n}\n\nmodule \"source_vm\" {\n  source            = \"https://github.com/vk-cs/terraform-vkcs-compute/archive/refs/tags/v0.0.3.zip//terraform-vkcs-compute-0.0.3\"\n  name              = \"cdc-pg-source\"\n  availability_zone = \"OST1\"         # `openstack availability zone list`\n  flavor_name       = \"Standard-2-4\" # 2 vCPU / 4 GB — `openstack flavor list`\n  key_pair          = vkcs_compute_keypair.kp.name\n  user_data         = local.ci_docker\n  # image_id: list images with `openstack image list --status active | grep -i ubuntu`\n  # and take the ID column (names vary per cloud, so pin the id, not the name).\n  volumes = [{ image_id = \"c0415eeb-ceff-4519-b5e5-8bf83ceb68f4\", type = \"ceph-ssd\", size = 20 }]\n  # floatingip_pool: the EXTERNAL network whose router already has an interface in\n  # cdc_net — the plain `ext-net` is not reachable from cdc_subnet and floating IP\n  # allocation fails. Find it: `openstack router show <cdc-net's router> -c external_gateway_info`.\n  ports = [{ network_id = data.vkcs_networking_network.cdc.id, security_group_ids = [module.firewall.secgroup_id], floatingip_pool = \"CDCTARANTOOLPERFTEST\" }]\n}\n\nmodule \"sink_vm\" {\n  source            = \"https://github.com/vk-cs/terraform-vkcs-compute/archive/refs/tags/v0.0.3.zip//terraform-vkcs-compute-0.0.3\"\n  name              = \"cdc-pg-sink\"\n  availability_zone = \"OST1\"\n  flavor_name       = \"Standard-2-4\"\n  key_pair          = vkcs_compute_keypair.kp.name\n  user_data         = local.ci_docker\n  volumes = [{ image_id = \"c0415eeb-ceff-4519-b5e5-8bf83ceb68f4\", type = \"ceph-ssd\", size = 20 }]\n  ports = [{ network_id = data.vkcs_networking_network.cdc.id, security_group_ids = [module.firewall.secgroup_id], floatingip_pool = \"CDCTARANTOOLPERFTEST\" }]\n}\n\n# floating IPs — reach the VMs over ssh/psql from your laptop (outside the cloud)\noutput \"source_ip\" { value = module.source_vm.instances[0].ports[0].floating_ip }\noutput \"sink_ip\"   { value = module.sink_vm.instances[0].ports[0].floating_ip }\n# internal cdc_net IPs (10.0.0.x) — what the in-cluster worker connects to\noutput \"source_internal_ip\" { value = module.source_vm.instances[0].ports[0].fixed_ip }\noutput \"sink_internal_ip\"   { value = module.sink_vm.instances[0].ports[0].fixed_ip }\nEOF\n\nterraform init\nterraform apply -auto-approve\nSRC_IP=$(terraform output -raw source_ip)              # floating, for ssh/psql\nSINK_IP=$(terraform output -raw sink_ip)\nSRC_INTERNAL_IP=$(terraform output -raw source_internal_ip)   # 10.0.0.x, for helm\nSINK_INTERNAL_IP=$(terraform output -raw sink_internal_ip)\necho \"source ext=$SRC_IP int=$SRC_INTERNAL_IP:5433  sink ext=$SINK_IP int=$SINK_INTERNAL_IP:5432\"\n\n# --- 0b. Ship the postgres:16 image to both VMs and start the containers ---\n# Docker Hub rate-limits anonymous pulls from the shared cloud egress IP\n# (`429 Too Many Requests`), so pull once on your laptop, copy the image over\n# ssh, then start the container on each VM. Same trust-auth defaults as the\n# local stand (user/db `postgres`, no password). Source needs wal_level=logical.\ndocker pull postgres:16\ndocker save postgres:16 -o /tmp/postgres16.tar\n# (add `-o ProxyJump=<bastion>` to scp/ssh if the VMs sit behind one)\nscp /tmp/postgres16.tar cloud-user@$SRC_IP:/tmp/\nssh cloud-user@$SRC_IP 'sudo docker load -i /tmp/postgres16.tar && sudo docker run -d --name pg-source -p 5433:5432 \\\n  -e POSTGRES_HOST_AUTH_METHOD=trust \\\n  postgres:16 -c wal_level=logical'\nscp /tmp/postgres16.tar cloud-user@$SINK_IP:/tmp/\nssh cloud-user@$SINK_IP 'sudo docker load -i /tmp/postgres16.tar && sudo docker run -d --name pg-sink -p 5432:5432 \\\n  -e POSTGRES_HOST_AUTH_METHOD=trust postgres:16'\n\n# Check the source is up and logical:\n#   psql -h $SRC_IP -p 5433 -U postgres -d postgres -c 'show wal_level;'\n# The helm values below use the INTERNAL IPs ($SRC_INTERNAL_IP / $SINK_INTERNAL_IP)\n# — the in-cluster worker can't reach the floating $SRC_IP/$SINK_IP.\n# Tear the whole stand down afterwards with:  terraform destroy -auto-approve\n#\ncd ..   # back out of ./infrastructure so $CHART (./cdc) resolves again\n# The chart ships in the CDC delivery bundle (helm-chart-cdc-*.tar.gz next to the image);\n# unpack it — it extracts into a ./cdc dir — and point CHART there. From a repo checkout\n# it is k8s/helm-chart-cdc. Values are inlined below.\n\nCHART=./cdc   # unpacked from the delivery bundle's helm-chart-cdc-*.tar.gz\n\ncat > cdc-values.yaml <<EOF\n# These addresses point at the source/sink stood up above (pg VMs by their cdc_net\n# IP, TQE by its in-cluster gRPC service). The root.* blocks feed the\n# application-<profile>.yml placeholders (pg.source.*, pg.sink.*, tqe.source.*,\n# tqe.sink.*), same as the --pg.source.host=... CLI overrides do locally.\nsources:\n  postgresql:\n    common:\n      root:\n        pg:\n          source:\n            host: $SRC_INTERNAL_IP\n            port: \"5433\"\n            tables: public.User,public.debezium_signal\nsinks:\n  postgresql:\n    common:\n      # schema.evolution=basic lets the sink auto-create/alter target tables,\n      # same flag we pass locally as --sink.connector.schema.evolution=basic.\n      connector:\n        schema.evolution: basic\n      root:\n        pg:\n          sink:\n            url: jdbc:postgresql://$SINK_INTERNAL_IP:5432/postgres\n\nglobal:\n  imagePullSecrets:\n    - name: registry-gitlab\nimage:\n  # cdc-worker-all bundles every connector (pg + tqe); the pg-preset-only image does\n  # not carry the TQE connectors, so use the full image for tqe flows. The registry\n  # below is our internal gitlab mirror — repoint it at your own registry if you pull\n  # the image from elsewhere. The tag is an example: pick a published one from the\n  # registry / releases (1.0.0-SNAPSHOT is only a local build, not in the registry).\n  repository: registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/cdc-worker-all\n  tag: 1.0.0-SNAPSHOT\n  pullPolicy: IfNotPresent\n\nflow:\n  - source: postgresql\n    sink: postgresql\n    resources:\n      requests: { cpu: 1500m, memory: 1Gi }\n      limits: { cpu: 2, memory: 3Gi }\n    env:\n      JAVA_OPTS: -XX:MaxDirectMemorySize=256M\n      PRESET: pg-pg-docker-docker\nEOF\n\nhelm --namespace transfer install cdc \"$CHART\" -f cdc-values.yaml\n\n# --- Verify ---\nkubectl -n transfer rollout status deploy -l app.kubernetes.io/instance=cdc --timeout=120s\nkubectl -n transfer logs -l app.kubernetes.io/instance=cdc --tail=50 -f\n# The worker exposes actuator/prometheus on port 8000 in the pod; port-forward to check:\n#   kubectl -n transfer port-forward deploy/cdc 8000:8000 &\n#   curl -s localhost:8000/actuator/health\n\n# --- Smoke: push rows into the source VM and read them back from the sink ---\n# Tunnel both PGs to localhost over ssh (via the floating IPs) so the psql\n# below talks to plain localhost:5433 / :5432 — no cluster-internal IP needed.\nssh -f -N -L 5433:localhost:5433 cloud-user@$SRC_IP\nssh -f -N -L 5432:localhost:5432 cloud-user@$SINK_IP\n# --- 1. Create the source table & insert sample rows ---\npsql -h localhost -p 5433 -U postgres -d postgres <<'EOF'\nCREATE TABLE \"User\" (\n    \"id\" BIGINT PRIMARY KEY,\n    \"name\" VARCHAR(128) NOT NULL,\n    \"surname\" VARCHAR(128),\n    \"gender\" VARCHAR(100) NOT NULL,\n    \"birthDate\" DATE NOT NULL,\n    \"timestamp\" TIMESTAMPTZ,\n    \"datetime\" TIMESTAMPTZ,\n    \"age\" BIGINT,\n    \"metadata\" JSONB,\n    \"description\" TEXT,\n    \"enabled\" BOOLEAN\n);\nINSERT INTO \"User\" (\"id\",\"name\",\"surname\",\"gender\",\"birthDate\",\"timestamp\",\"datetime\",\"age\",\"metadata\",\"description\",\"enabled\") VALUES\n  (1,'Alice','Johnson','female','1990-03-15','2026-07-02 10:00:00+00','2026-07-02 10:00:00+00',36,'{\"role\":\"admin\",\"tags\":[\"a\",\"b\"]}','First user',true),\n  (2,'Bob','Smith','male','1985-11-02','2026-07-01 08:30:00+00','2026-07-01 08:30:00+00',40,'{\"role\":\"user\"}','Second user',false),\n  (3,'Carol',NULL,'female','2000-06-21',NULL,NULL,NULL,NULL,NULL,NULL);\nEOF\n\n# --- 2. Verify replication landed in the target ---\npsql -h localhost -p 5432 -U postgres -d postgres \\\n    -c 'SELECT id, name, surname, gender, \"birthDate\", age, enabled FROM \"User\" ORDER BY id;'\n# tear the tunnels down when done: pkill -f 'ssh -f -N -L 543'\n# ========================================", "--help-pg-pg-docker-helm --simple": "# The chart ships in the CDC delivery bundle (helm-chart-cdc-*.tar.gz next to the image);\n# unpack it — it extracts into a ./cdc dir — and point CHART there. From a repo checkout\n# it is k8s/helm-chart-cdc. Values are inlined below.\n\nCHART=./cdc   # unpacked from the delivery bundle's helm-chart-cdc-*.tar.gz\n\ncat > cdc-values.yaml <<EOF\n# These addresses point at the source/sink stood up above (pg VMs by their cdc_net\n# IP, TQE by its in-cluster gRPC service). The root.* blocks feed the\n# application-<profile>.yml placeholders (pg.source.*, pg.sink.*, tqe.source.*,\n# tqe.sink.*), same as the --pg.source.host=... CLI overrides do locally.\nsources:\n  postgresql:\n    common:\n      root:\n        pg:\n          source:\n            host: $SRC_INTERNAL_IP\n            port: \"5433\"\n            tables: public.User,public.debezium_signal\nsinks:\n  postgresql:\n    common:\n      # schema.evolution=basic lets the sink auto-create/alter target tables,\n      # same flag we pass locally as --sink.connector.schema.evolution=basic.\n      connector:\n        schema.evolution: basic\n      root:\n        pg:\n          sink:\n            url: jdbc:postgresql://$SINK_INTERNAL_IP:5432/postgres\n\nglobal:\n  imagePullSecrets:\n    - name: registry-gitlab\nimage:\n  # cdc-worker-all bundles every connector (pg + tqe); the pg-preset-only image does\n  # not carry the TQE connectors, so use the full image for tqe flows. The registry\n  # below is our internal gitlab mirror — repoint it at your own registry if you pull\n  # the image from elsewhere. The tag is an example: pick a published one from the\n  # registry / releases (1.0.0-SNAPSHOT is only a local build, not in the registry).\n  repository: registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/cdc-worker-all\n  tag: 1.0.0-SNAPSHOT\n  pullPolicy: IfNotPresent\n\nflow:\n  - source: postgresql\n    sink: postgresql\n    resources:\n      requests: { cpu: 1500m, memory: 1Gi }\n      limits: { cpu: 2, memory: 3Gi }\n    env:\n      JAVA_OPTS: -XX:MaxDirectMemorySize=256M\n      PRESET: pg-pg-docker-docker\nEOF\n\nhelm --namespace transfer install cdc \"$CHART\" -f cdc-values.yaml", "--help-pg-pg-docker": "# ========== Runbook: preset pg-pg-docker ==========\n# Copy-paste to stand the stack up from scratch (bare docker/psql, no make).\n# The worker container tag below is an example — use your published tag.\n\n# --- 1. Docker network ---\ndocker network create stand-net 2>/dev/null || true\n\n# --- 2. Monitoring: Prometheus + Grafana (replaces `make monitoring-up`) ---\n# Prometheus config: scrape the worker's actuator endpoint. Two targets: 8000 for a\n# single worker, 8001 for a second one (the pg->tqe->pg pipeline runs two workers,\n# the tqe->pg side moved to 8001). A down target is simply skipped, so listing both\n# is harmless when you run only one worker.\nmkdir -p /tmp/cdc-mon/grafana-ds\ncat > /tmp/cdc-mon/prometheus.yml <<'EOF'\nglobal:\n  scrape_interval: 5s\n  evaluation_interval: 5s\nscrape_configs:\n  - job_name: \"cdc-worker\"\n    metrics_path: \"actuator/prometheus\"\n    static_configs:\n      - targets: [\"host.docker.internal:8000\", \"host.docker.internal:8001\"]\nEOF\n\n# Grafana datasource pointing at the Prometheus container.\ncat > /tmp/cdc-mon/grafana-ds/datasource.yml <<'EOF'\napiVersion: 1\ndatasources:\n  - name: Prometheus\n    type: prometheus\n    access: proxy\n    url: http://prometheus:9090\nEOF\n\ndocker run -d --rm --name prometheus \\\n    --network stand-net -p 9090:9090 \\\n    --add-host host.docker.internal:host-gateway \\\n    -v /tmp/cdc-mon/prometheus.yml:/etc/prometheus/prometheus.yml \\\n    prom/prometheus:v2.54.1\n\ndocker run -d --rm --name grafana \\\n    --network stand-net -p 3000:3000 \\\n    -e GF_AUTH_ANONYMOUS_ENABLED=true \\\n    -e GF_AUTH_ANONYMOUS_ORG_ROLE=Admin \\\n    -e GF_AUTH_BASIC_ENABLED=false \\\n    -v /tmp/cdc-mon/grafana-ds:/etc/grafana/provisioning/datasources \\\n    grafana/grafana:11.6.9\n# Grafana UI: http://localhost:3000  (Prometheus datasource is pre-wired).\n# Import dashboards from the repo: stands/local/monitoring/grafana/dashboard/*.json\n\n# --- 3. Source Postgres (logical WAL, port 5433) ---\ndocker run -d --rm --name source-postgres \\\n    --network stand-net -p 5433:5432 \\\n    -e POSTGRES_HOST_AUTH_METHOD=trust \\\n    postgres:16.4 \\\n    postgres -c wal_level=logical -c max_connections=500\n\n# --- 4. Target Postgres (sink, port 5432) ---\ndocker run -d --rm --name target-postgres \\\n    --network stand-net -p 5432:5432 \\\n    -e POSTGRES_HOST_AUTH_METHOD=trust \\\n    postgres:16.4\n\n# --- 5. CDC Worker ---\n# The image tag below is an example (1.0.0-SNAPSHOT is a local build). To run a\n# released/dev build instead, swap it for a published tag from the registry, e.g.\n# cdc-worker-all:0.12.0 — see the registry / releases for available tags.\ndocker run --rm -p 8000:8000 --network stand-net \\\n    cdc-worker-all:1.0.0-SNAPSHOT \\\n    --preset=pg-pg-docker --profile=pg-source-table-user \\\n    --sink.connector.schema.evolution=basic\n\n# --- 6. Create the source table & insert sample rows ---\npsql -h localhost -p 5433 -U postgres -d postgres <<'EOF'\nCREATE TABLE \"User\" (\n    \"id\" BIGINT PRIMARY KEY,\n    \"name\" VARCHAR(128) NOT NULL,\n    \"surname\" VARCHAR(128),\n    \"gender\" VARCHAR(100) NOT NULL,\n    \"birthDate\" DATE NOT NULL,\n    \"timestamp\" TIMESTAMPTZ,\n    \"datetime\" TIMESTAMPTZ,\n    \"age\" BIGINT,\n    \"metadata\" JSONB,\n    \"description\" TEXT,\n    \"enabled\" BOOLEAN\n);\nINSERT INTO \"User\" (\"id\",\"name\",\"surname\",\"gender\",\"birthDate\",\"timestamp\",\"datetime\",\"age\",\"metadata\",\"description\",\"enabled\") VALUES\n  (1,'Alice','Johnson','female','1990-03-15','2026-07-02 10:00:00+00','2026-07-02 10:00:00+00',36,'{\"role\":\"admin\",\"tags\":[\"a\",\"b\"]}','First user',true),\n  (2,'Bob','Smith','male','1985-11-02','2026-07-01 08:30:00+00','2026-07-01 08:30:00+00',40,'{\"role\":\"user\"}','Second user',false),\n  (3,'Carol',NULL,'female','2000-06-21',NULL,NULL,NULL,NULL,NULL,NULL);\nEOF\n\n# --- 7. Verify replication landed in the target ---\npsql -h localhost -p 5432 -U postgres -d postgres \\\n    -c 'SELECT id, name, surname, gender, \"birthDate\", age, enabled FROM \"User\" ORDER BY id;'\n\n# --- 8. (optional) Load generator: upsert the same rows in a loop ---\n# 500 rows x 400 batches = 200k UPDATE events, in batches of 500 with a 0.3s pause.\npsql -h localhost -p 5433 -U postgres -d postgres <<'EOF'\nDO $$\nDECLARE\n  key_space CONSTANT int := 500;   -- how many unique ids to cycle (id 1..500)\n  batches   CONSTANT int := 400;   -- how many batches to run\nBEGIN\n  FOR b IN 1..batches LOOP\n    INSERT INTO \"User\" (\"id\",\"name\",\"gender\",\"birthDate\")\n    SELECT g,\n           'Artyom_' || b,          -- vary the value so each upsert is a real UPDATE\n           'male',\n           DATE '1990-01-01'\n    FROM generate_series(1, key_space) AS g\n    ON CONFLICT (\"id\") DO UPDATE\n      SET \"name\" = EXCLUDED.\"name\";\n    COMMIT;\n    PERFORM pg_sleep(0.3);\n  END LOOP;\nEND $$;\nEOF\n\n# ========================================", "--help-pg-pg-docker --simple": "# The image tag below is an example (1.0.0-SNAPSHOT is a local build). To run a\n# released/dev build instead, swap it for a published tag from the registry, e.g.\n# cdc-worker-all:0.12.0 — see the registry / releases for available tags.\ndocker run --rm -p 8000:8000 --network stand-net \\\n    cdc-worker-all:1.0.0-SNAPSHOT \\\n    --preset=pg-pg-docker --profile=pg-source-table-user \\\n    --sink.connector.schema.evolution=basic", "--help-pg-pg-local-helm": "# ========== Runbook: helm deploy of preset pg-pg-local ==========\n# Deploys the CDC worker into k8s. DBs/queue are assumed to already run somewhere the\n# cluster can reach — this only brings up the worker pointed at them.\n# For pg-pg the source/sink Postgres VMs are provisioned first, in the Terraform step 0.\n#\n# --- 0. Source/sink Postgres VMs (VK Cloud, Terraform) ---\n# Brings up two VMs (pg source + pg sink) with the official vk-cs Terraform modules\n# (network + firewall + compute). Postgres is installed on boot via cloud-init, so the\n# VMs come up ready. Auth uses your project's openrc (OpenStack v3) env vars; run from a\n# fresh ./infrastructure dir. Requires terraform >= 1.3 (or opentofu).\nmkdir -p infrastructure && cd infrastructure\n\n# openrc creds: in the cloud web console (UI) open your project's access page\n# and download the openrc.sh script, then source it. It exports the OS_* env vars\n# the vkcs provider reads (OS_AUTH_URL / OS_PROJECT_ID / OS_REGION_NAME / ...).\n# On token-auth clouds it prompts for an API token — paste the token you also get\n# from the UI (project -> API token); on password clouds it prompts for the password.\nsource ~/<project>-openrc.sh\n\ncat > main.tf <<'EOF'\nterraform {\n  required_providers {\n    vkcs = { source = \"vk-cs/vkcs\", version = \"< 1.0.0\" }\n  }\n}\nprovider \"vkcs\" {}\n\n# SSH keypair for the cloud-user login. Point it at your public key; the\n# compute module wires it into both VMs via `key_pair` below. Without a\n# keypair the VMs have no authorized key and you cannot ssh in.\nresource \"vkcs_compute_keypair\" \"kp\" {\n  name       = \"cdc-pg-pg\"\n  public_key = file(\"~/.ssh/id_rsa.pub\")   # your public key\n}\n\n# The k8s cluster that runs the CDC worker lives in an existing project network\n# (here `cdc_net`, 10.0.0.0/24). Attach the VMs there — NOT a fresh isolated\n# network — so the in-cluster worker reaches PG by its internal 10.0.0.x IP.\n# Find yours with `openstack network list`.\ndata \"vkcs_networking_network\" \"cdc\" {\n  name = \"cdc_net\"\n}\n\nmodule \"firewall\" {\n  source = \"https://github.com/vk-cs/terraform-vkcs-firewall/archive/refs/tags/v0.0.3.zip//terraform-vkcs-firewall-0.0.3\"\n  name   = \"cdc-pg-pg\"\n  rules  = [\n    { protocol = \"tcp\", port = 22, remote_ip_prefix = \"0.0.0.0/0\" },   # ssh\n    { protocol = \"tcp\", port = 5432, remote_ip_prefix = \"0.0.0.0/0\" }, # pg sink\n    { protocol = \"tcp\", port = 5433, remote_ip_prefix = \"0.0.0.0/0\" }, # pg source\n    { protocol = \"icmp\", remote_ip_prefix = \"0.0.0.0/0\" },\n  ]\n}\n\n# cloud-init: just install docker (the image push + `docker run` happen in\n# step 0b — Docker Hub rate-limits anonymous pulls from the shared cloud\n# egress IP, so we don't pull here).\nlocals {\n  ci_docker = <<-CI\n    #cloud-config\n    package_update: true\n    packages: [docker.io]\n    runcmd:\n      - systemctl enable --now docker\n      - usermod -aG docker cloud-user\n    CI\n}\n\nmodule \"source_vm\" {\n  source            = \"https://github.com/vk-cs/terraform-vkcs-compute/archive/refs/tags/v0.0.3.zip//terraform-vkcs-compute-0.0.3\"\n  name              = \"cdc-pg-source\"\n  availability_zone = \"OST1\"         # `openstack availability zone list`\n  flavor_name       = \"Standard-2-4\" # 2 vCPU / 4 GB — `openstack flavor list`\n  key_pair          = vkcs_compute_keypair.kp.name\n  user_data         = local.ci_docker\n  # image_id: list images with `openstack image list --status active | grep -i ubuntu`\n  # and take the ID column (names vary per cloud, so pin the id, not the name).\n  volumes = [{ image_id = \"c0415eeb-ceff-4519-b5e5-8bf83ceb68f4\", type = \"ceph-ssd\", size = 20 }]\n  # floatingip_pool: the EXTERNAL network whose router already has an interface in\n  # cdc_net — the plain `ext-net` is not reachable from cdc_subnet and floating IP\n  # allocation fails. Find it: `openstack router show <cdc-net's router> -c external_gateway_info`.\n  ports = [{ network_id = data.vkcs_networking_network.cdc.id, security_group_ids = [module.firewall.secgroup_id], floatingip_pool = \"CDCTARANTOOLPERFTEST\" }]\n}\n\nmodule \"sink_vm\" {\n  source            = \"https://github.com/vk-cs/terraform-vkcs-compute/archive/refs/tags/v0.0.3.zip//terraform-vkcs-compute-0.0.3\"\n  name              = \"cdc-pg-sink\"\n  availability_zone = \"OST1\"\n  flavor_name       = \"Standard-2-4\"\n  key_pair          = vkcs_compute_keypair.kp.name\n  user_data         = local.ci_docker\n  volumes = [{ image_id = \"c0415eeb-ceff-4519-b5e5-8bf83ceb68f4\", type = \"ceph-ssd\", size = 20 }]\n  ports = [{ network_id = data.vkcs_networking_network.cdc.id, security_group_ids = [module.firewall.secgroup_id], floatingip_pool = \"CDCTARANTOOLPERFTEST\" }]\n}\n\n# floating IPs — reach the VMs over ssh/psql from your laptop (outside the cloud)\noutput \"source_ip\" { value = module.source_vm.instances[0].ports[0].floating_ip }\noutput \"sink_ip\"   { value = module.sink_vm.instances[0].ports[0].floating_ip }\n# internal cdc_net IPs (10.0.0.x) — what the in-cluster worker connects to\noutput \"source_internal_ip\" { value = module.source_vm.instances[0].ports[0].fixed_ip }\noutput \"sink_internal_ip\"   { value = module.sink_vm.instances[0].ports[0].fixed_ip }\nEOF\n\nterraform init\nterraform apply -auto-approve\nSRC_IP=$(terraform output -raw source_ip)              # floating, for ssh/psql\nSINK_IP=$(terraform output -raw sink_ip)\nSRC_INTERNAL_IP=$(terraform output -raw source_internal_ip)   # 10.0.0.x, for helm\nSINK_INTERNAL_IP=$(terraform output -raw sink_internal_ip)\necho \"source ext=$SRC_IP int=$SRC_INTERNAL_IP:5433  sink ext=$SINK_IP int=$SINK_INTERNAL_IP:5432\"\n\n# --- 0b. Ship the postgres:16 image to both VMs and start the containers ---\n# Docker Hub rate-limits anonymous pulls from the shared cloud egress IP\n# (`429 Too Many Requests`), so pull once on your laptop, copy the image over\n# ssh, then start the container on each VM. Same trust-auth defaults as the\n# local stand (user/db `postgres`, no password). Source needs wal_level=logical.\ndocker pull postgres:16\ndocker save postgres:16 -o /tmp/postgres16.tar\n# (add `-o ProxyJump=<bastion>` to scp/ssh if the VMs sit behind one)\nscp /tmp/postgres16.tar cloud-user@$SRC_IP:/tmp/\nssh cloud-user@$SRC_IP 'sudo docker load -i /tmp/postgres16.tar && sudo docker run -d --name pg-source -p 5433:5432 \\\n  -e POSTGRES_HOST_AUTH_METHOD=trust \\\n  postgres:16 -c wal_level=logical'\nscp /tmp/postgres16.tar cloud-user@$SINK_IP:/tmp/\nssh cloud-user@$SINK_IP 'sudo docker load -i /tmp/postgres16.tar && sudo docker run -d --name pg-sink -p 5432:5432 \\\n  -e POSTGRES_HOST_AUTH_METHOD=trust postgres:16'\n\n# Check the source is up and logical:\n#   psql -h $SRC_IP -p 5433 -U postgres -d postgres -c 'show wal_level;'\n# The helm values below use the INTERNAL IPs ($SRC_INTERNAL_IP / $SINK_INTERNAL_IP)\n# — the in-cluster worker can't reach the floating $SRC_IP/$SINK_IP.\n# Tear the whole stand down afterwards with:  terraform destroy -auto-approve\n#\ncd ..   # back out of ./infrastructure so $CHART (./cdc) resolves again\n# The chart ships in the CDC delivery bundle (helm-chart-cdc-*.tar.gz next to the image);\n# unpack it — it extracts into a ./cdc dir — and point CHART there. From a repo checkout\n# it is k8s/helm-chart-cdc. Values are inlined below.\n\nCHART=./cdc   # unpacked from the delivery bundle's helm-chart-cdc-*.tar.gz\n\ncat > cdc-values.yaml <<EOF\n# These addresses point at the source/sink stood up above (pg VMs by their cdc_net\n# IP, TQE by its in-cluster gRPC service). The root.* blocks feed the\n# application-<profile>.yml placeholders (pg.source.*, pg.sink.*, tqe.source.*,\n# tqe.sink.*), same as the --pg.source.host=... CLI overrides do locally.\nsources:\n  postgresql:\n    common:\n      root:\n        pg:\n          source:\n            host: $SRC_INTERNAL_IP\n            port: \"5433\"\n            tables: public.User,public.debezium_signal\nsinks:\n  postgresql:\n    common:\n      # schema.evolution=basic lets the sink auto-create/alter target tables,\n      # same flag we pass locally as --sink.connector.schema.evolution=basic.\n      connector:\n        schema.evolution: basic\n      root:\n        pg:\n          sink:\n            url: jdbc:postgresql://$SINK_INTERNAL_IP:5432/postgres\n\nglobal:\n  imagePullSecrets:\n    - name: registry-gitlab\nimage:\n  # cdc-worker-all bundles every connector (pg + tqe); the pg-preset-only image does\n  # not carry the TQE connectors, so use the full image for tqe flows. The registry\n  # below is our internal gitlab mirror — repoint it at your own registry if you pull\n  # the image from elsewhere. The tag is an example: pick a published one from the\n  # registry / releases (1.0.0-SNAPSHOT is only a local build, not in the registry).\n  repository: registry-gitlab.corp.mail.ru/tarantool/cdc/v9/tarantool-cdc/cdc-worker-all\n  tag: 1.0.0-SNAPSHOT\n  pullPolicy: IfNotPresent\n\nflow:\n  - source: postgresql\n    sink: postgresql\n    resources:\n      requests: { cpu: 1500m, memory: 1Gi }\n      limits: { cpu: 2, memory: 3Gi }\n    env:\n      JAVA_OPTS: -XX:MaxDirectMemorySize=256M\n      PRESET: pg-pg-local-docker\nEOF\n\nhelm --namespace transfer install cdc \"$CHART\" -f cdc-values.yaml\n\n# --- Verify ---\nkubectl -n transfer rollout status deploy -l app.kubernetes.io/instance=cdc --timeout=120s\nkubectl -n transfer logs -l app.kubernetes.io/instance=cdc --tail=50 -f\n# The worker exposes actuator/prometheus on port 8000 in the pod; port-forward to check:\n#   kubectl -n transfer port-forward deploy/cdc 8000:8000 &\n#   curl -s localhost:8000/actuator/health\n\n# --- Smoke: push rows into the source VM and read them back from the sink ---\n# Tunnel both PGs to localhost over ssh (via the floating IPs) so the psql\n# below talks to plain localhost:5433 / :5432 — no cluster-internal IP needed.\nssh -f -N -L 5433:localhost:5433 cloud-user@$SRC_IP\nssh -f -N -L 5432:localhost:5432 cloud-user@$SINK_IP\n# --- 1. Create the source table & insert sample rows ---\npsql -h localhost -p 5433 -U postgres -d postgres <<'EOF'\nCREATE TABLE \"User\" (\n    \"id\" BIGINT PRIMARY KEY,\n    \"name\" VARCHAR(128) NOT NULL,\n    \"surname\" VARCHAR(128),\n    \"gender\" VARCHAR(100) NOT NULL,\n    \"birthDate\" DATE NOT NULL,\n    \"timestamp\" TIMESTAMPTZ,\n    \"datetime\" TIMESTAMPTZ,\n    \"age\" BIGINT,\n    \"metadata\" JSONB,\n    \"description\" TEXT,\n    \"enabled\" BOOLEAN\n);\nINSERT INTO \"User\" (\"id\",\"name\",\"surname\",\"gender\",\"birthDate\",\"timestamp\",\"datetime\",\"age\",\"metadata\",\"description\",\"enabled\") VALUES\n  (1,'Alice','Johnson','female','1990-03-15','2026-07-02 10:00:00+00','2026-07-02 10:00:00+00',36,'{\"role\":\"admin\",\"tags\":[\"a\",\"b\"]}','First user',true),\n  (2,'Bob','Smith','male','1985-11-02','2026-07-01 08:30:00+00','2026-07-01 08:30:00+00',40,'{\"role\":\"user\"}','Second user',false),\n  (3,'Carol',NULL,'female','2000-06-21',NULL,NULL,NULL,NULL,NULL,NULL);\nEOF\n\n# --- 2. Verify replication landed in the target ---\npsql -h localhost -p 5432 -U postgres -d postgres \\\n    -c 'SELECT id, name, surname, gender, \"birthDate\", age, enabled FROM \"User\" ORDER BY id;'\n# tear the tunnels down when done: pkill -f 'ssh -f -N -L 543'\n# ========================================", "--help-pg-pg-local-helm --simple": "# The chart ships in the CDC delivery bundle (helm-chart-cdc-*.tar.gz next to the image);\n# unpack it — it
